<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量生成 - Ai创作工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="/static/state-manager.js"></script>
    <link rel="stylesheet" href="/static/sidebar-nav.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .content {
            padding: 20px;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .import-area {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
            padding: 6px 12px;
            font-size: 0.9em;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .batch-table-container {
            overflow-x: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        
        .batch-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }
        
        .batch-table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #dee2e6;
            position: sticky;
            top: 0;
        }
        
        .batch-table td {
            padding: 10px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .batch-table input,
        .batch-table select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.9em;
        }
        
        .batch-table textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.9em;
            resize: vertical;
            min-height: 60px;
        }
        
        .ref-images-input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        
        .ref-images-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }
        
        .sample-select-btn {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            width: 100%;
        }
        
        .sample-select-btn:hover {
            background: #5568d3;
        }
        
        .selected-samples {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        
        .selected-sample-tag {
            background: #e7f3ff;
            color: #0066cc;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.75em;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .selected-sample-tag .remove {
            cursor: pointer;
            font-weight: bold;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        
        .modal-close:hover {
            color: #333;
        }
        
        .sample-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        
        .sample-item {
            position: relative;
            cursor: pointer;
            border: 3px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .sample-item:hover {
            border-color: #667eea;
            transform: scale(1.05);
        }
        
        .sample-item.selected {
            border-color: #667eea;
            box-shadow: 0 0 0 2px #667eea;
        }
        
        .sample-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }
        
        .sample-check {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #667eea;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .sample-item.selected .sample-check {
            display: flex;
        }
        
        .progress-area {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .progress-area.active {
            display: block;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .progress-log {
            max-height: 200px;
            overflow-y: auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .progress-log div {
            margin-bottom: 5px;
        }
        
        .progress-log .success {
            color: #28a745;
        }
        
        .progress-log .error {
            color: #dc3545;
        }
        
        .progress-log .info {
            color: #17a2b8;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .file-input-label {
            display: inline-block;
            padding: 12px 24px;
            background: #6c757d;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .file-input-label:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <!-- 左侧导航栏 -->
    <nav class="sidebar-nav" id="sidebarNav">
        <div class="sidebar-nav-header">
            <div class="sidebar-nav-title">Ai创作工具</div>
            <button class="sidebar-nav-toggle" onclick="toggleSidebar()" title="收缩/展开">
                <span id="toggleIcon">‹</span>
            </button>
        </div>
        <div class="sidebar-nav-menu">
            <a href="/" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🎨</span>
                <span class="sidebar-nav-text">单图生成</span>
            </a>
            <a href="/batch" class="sidebar-nav-item active">
                <span class="sidebar-nav-icon">📦</span>
                <span class="sidebar-nav-text">批量生成</span>
            </a>
            <a href="/records" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📊</span>
                <span class="sidebar-nav-text">生图任务</span>
            </a>
            <a href="/video-generate" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🎬</span>
                <span class="sidebar-nav-text">视频生成</span>
            </a>
            <a href="/video-tasks" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📹</span>
                <span class="sidebar-nav-text">视频任务</span>
            </a>
            <a href="/script-analysis" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🎬</span>
                <span class="sidebar-nav-text">剧本分析</span>
            </a>
            <a href="/content-management" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📚</span>
                <span class="sidebar-nav-text">内容管理</span>
            </a>
            {% if user.username == 'system_admin' %}
            <div class="sidebar-nav-divider"></div>
            <a href="/stats" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📈</span>
                <span class="sidebar-nav-text">系统统计</span>
            </a>
            {% endif %}
        </div>
        <div class="sidebar-nav-user">
            <div class="sidebar-nav-user-info">
                <div class="sidebar-nav-user-avatar">👤</div>
                <div class="sidebar-nav-user-name">{{ user.username }}</div>
            </div>
            <a href="/logout" class="sidebar-nav-logout">登出</a>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="container">
        <div class="content" style="padding-top: 20px;">
            <!-- 导入/导出区域 -->
            <div class="section">
                <div class="section-title">📥 导入/导出</div>
                <div class="import-area">
                    <label for="excelFile" class="file-input-label">📂 导入 Excel</label>
                    <input type="file" id="excelFile" accept=".xlsx,.xls" onchange="importExcel(event)">
                    
                    <button class="btn btn-secondary" onclick="downloadTemplate()">
                        📄 下载模板
                    </button>
                    
                    <button class="btn btn-secondary" onclick="exportToExcel()">
                        💾 导出当前表格
                    </button>
                </div>
            </div>
            
            <!-- 批量表格 -->
            <div class="section">
                <div class="section-title">📝 批量任务列表</div>
                <button class="btn btn-success" onclick="addRow()" style="margin-bottom: 15px;">
                    ➕ 添加一行
                </button>
                
                <div class="batch-table-container">
                    <table class="batch-table" id="batchTable">
                        <thead>
                            <tr>
                                <th style="width: 60px;">序号</th>
                                <th style="width: 250px;">提示词 *</th>
                                <th style="width: 120px;">图片比例</th>
                                <th style="width: 100px;">分辨率</th>
                                <th style="width: 150px;">图片风格</th>
                                <th style="width: 200px;">参考图</th>
                                <th style="width: 100px;">生成数量</th>
                                <th style="width: 120px;">文件名</th>
                                <th style="width: 80px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="batchTableBody">
                            <!-- 动态添加行 -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- 生成按钮 -->
            <div class="section">
                <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 15px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="backgroundMode" checked>
                        <span>后台模式（推荐，可切换页面）</span>
                    </label>
                    <span style="color: #666; font-size: 0.9em;">
                        💡 后台模式下，任务提交后在服务端执行，不受页面切换影响
                    </span>
                </div>
                <div>
                    <button class="btn btn-primary" onclick="startBatchGeneration()" style="width: 100%; font-size: 1.2em;">
                        🚀 开始批量生成
                    </button>
                </div>
            </div>
            
            <!-- 进度显示 -->
            <div class="progress-area" id="progressArea">
                <h3>生成进度</h3>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%;">0%</div>
                </div>
                <div class="progress-log" id="progressLog"></div>
            </div>
        </div>
    </div>
    
    <!-- 示例图选择模态框 -->
    <div class="modal" id="sampleModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeSampleModal()">&times;</span>
            <div style="display:flex; align-items:center; gap:12px;">
                <h2>选择参考示例图</h2>
                <div style="margin-left:auto; display:flex; gap:8px;">
                    <button type="button" id="batchPersonBtn" class="btn btn-sm btn-primary">人物库</button>
                    <button type="button" id="batchSceneBtn" class="btn btn-sm">场景库</button>
                    <button type="button" id="batchRecentBtn" class="btn btn-sm">最近生成</button>
                </div>
            </div>
            <p style="color: #666; margin-top: 10px;">点击图片选择（最多4张）</p>
            <div class="sample-grid" id="modalSampleGrid">
                <!-- 动态加载示例图 -->
            </div>
            <div style="margin-top: 20px; text-align: center;">
                <button class="btn btn-primary" onclick="confirmSampleSelection()">
                    ✓ 确认选择
                </button>
            </div>
        </div>
    </div>
    
    <script>
        let batchData = [];
        let sampleImages = [];
        let currentRowIndex = -1;
        let selectedSamplesForRow = [];
        // 批量模态示例图类别（person/scene）
        let batchSampleCategory = 'person';
        // 图片风格列表
        let imageStyles = [];
        
        // 用于控制批量生成请求的 AbortController
        let batchGenerateAbortController = null;
        
        // 页面卸载时取消未完成的请求
        window.addEventListener('beforeunload', () => {
            if (batchGenerateAbortController) {
                batchGenerateAbortController.abort();
            }
        });
        
        // 保存批量数据到localStorage
        function saveBatchData() {
            try {
                localStorage.setItem('batchData', JSON.stringify(batchData));
            } catch (e) {
                console.error('保存数据失败:', e);
            }
        }
        
        // 从 localStorage 恢复数据
        function loadBatchData() {
            try {
                const saved = localStorage.getItem('batchData');
                if (saved) {
                    batchData = JSON.parse(saved);
                    if (batchData.length > 0) {
                        renderTable();
                        return true;
                    }
                }
            } catch (e) {
                console.error('恢复数据失败:', e);
            }
            return false;
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化批量模态类别按钮
            const btnP = document.getElementById('batchPersonBtn');
            const btnS = document.getElementById('batchSceneBtn');
            const btnR = document.getElementById('batchRecentBtn');
            if (btnP && btnS && btnR) {
                btnP.addEventListener('click', () => switchBatchSampleCategory('person'));
                btnS.addEventListener('click', () => switchBatchSampleCategory('scene'));
                btnR.addEventListener('click', () => switchBatchSampleCategory('recent'));
            }
            // 默认按 person 加载
            loadSampleImages(batchSampleCategory);
            
            // 加载图片风格列表
            loadImageStyles();

            // 尝试恢复保存的数据
            if (!loadBatchData()) {
                addRow(); // 默认添加一行
            }
            // (保持原有行为：不自动清除批量缓存)
        });
        
        // 加载图片风格列表
        async function loadImageStyles() {
            try {
                const response = await fetch('/api/image-styles');
                const data = await response.json();
                if (data.success && data.styles) {
                    imageStyles = data.styles;
                    // 如果表格已渲染，更新所有风格下拉框
                    updateAllStyleSelects();
                }
            } catch (error) {
                console.error('加载风格列表失败:', error);
            }
        }
        
        // 更新所有行的风格下拉框
        function updateAllStyleSelects() {
            batchData.forEach((row, index) => {
                const select = document.getElementById(`style_${index}`);
                if (select) {
                    // 保存当前选中的值
                    const currentValue = row.image_style || '';
                    
                    // 清空并重新填充选项
                    select.innerHTML = '<option value="">无（使用默认风格）</option>';
                    imageStyles.forEach(style => {
                        const option = document.createElement('option');
                        option.value = style.id;
                        option.textContent = style.name || style.id;
                        if (style.id === currentValue) {
                            option.selected = true;
                        }
                        select.appendChild(option);
                    });
                }
            });
        }
        
        // 加载示例图（按类别）
        async function loadSampleImages(category) {
            try {
                const response = await fetch('/api/sample-images?category=' + encodeURIComponent(category));
                const data = await response.json();
                if (data.success) {
                    sampleImages = data.images;
                } else {
                    sampleImages = [];
                }
            } catch (error) {
                console.error('加载示例图失败:', error);
                sampleImages = [];
            }
        }

        async function switchBatchSampleCategory(cat) {
            batchSampleCategory = cat;
            const btnP = document.getElementById('batchPersonBtn');
            const btnS = document.getElementById('batchSceneBtn');
            const btnR = document.getElementById('batchRecentBtn');
            if (btnP && btnS && btnR) {
                btnP.classList.toggle('btn-primary', cat === 'person');
                btnS.classList.toggle('btn-primary', cat === 'scene');
                btnR.classList.toggle('btn-primary', cat === 'recent');
            }
            
            if (cat === 'recent') {
                await loadRecentImages();
            } else {
                await loadSampleImages(cat);
            }

            // 如果模态已打开，实时刷新模态内的示例图
            const modal = document.getElementById('sampleModal');
            if (modal && modal.classList.contains('active')) {
                renderModalSampleGrid();
            }
        }
        
        // 加载最近生成的图片
        async function loadRecentImages() {
            try {
                const response = await fetch('/api/recent-images?limit=50');
                const data = await response.json();
                
                if (data.success && data.images) {
                    sampleImages = data.images;
                    renderModalSampleGrid();
                } else {
                    sampleImages = [];
                    const grid = document.getElementById('modalSampleGrid');
                    if (grid) {
                        grid.innerHTML = '<div style="text-align:center; padding:40px; color:#999;">暂无最近生成的图片</div>';
                    }
                }
            } catch (error) {
                console.error('加载最近生成图片失败:', error);
                sampleImages = [];
            }
        }

        // 在模态中渲染 sampleImages
        function renderModalSampleGrid() {
            const grid = document.getElementById('modalSampleGrid');
            if (!grid) return;
            grid.innerHTML = '';
            sampleImages.forEach((img, index) => {
                const isSelected = selectedSamplesForRow.some(s => s.url === img.url);
                const div = document.createElement('div');
                div.className = `sample-item ${isSelected ? 'selected' : ''}`;
                div.onclick = () => toggleSampleInModal(index);
                div.innerHTML = `
                    <img src="${img.url}" alt="${img.filename}">
                    <div class="sample-check">✓</div>
                `;
                grid.appendChild(div);
            });
        }
        
        // 添加行
        function addRow() {
            const rowIndex = batchData.length;
            batchData.push({
                prompt: '',
                aspect_ratio: '1:1',
                resolution: '2k',
                image_style: '',
                ref_images_text: '',
                sample_images: [],
                num_images: 1,
                filename: `batch_${rowIndex + 1}`
            });
            
            saveBatchData();
            renderTable();
            // 添加行后更新风格下拉框
            setTimeout(() => updateAllStyleSelects(), 100);
        }
        
        // 删除行
        function deleteRow(index) {
            if (confirm('确定删除这一行吗？')) {
                batchData.splice(index, 1);
                saveBatchData();
                renderTable();
            }
        }
        
        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('batchTableBody');
            tbody.innerHTML = '';
            
            batchData.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>
                        <textarea onchange="updateRow(${index}, 'prompt', this.value)"
                                  placeholder="描述你想要的图片...">${row.prompt}</textarea>
                    </td>
                    <td>
                        <select onchange="updateRow(${index}, 'aspect_ratio', this.value)">
                            <option value="1:1" ${row.aspect_ratio === '1:1' ? 'selected' : ''}>1:1</option>
                            <option value="2:3" ${row.aspect_ratio === '2:3' ? 'selected' : ''}>2:3</option>
                            <option value="3:2" ${row.aspect_ratio === '3:2' ? 'selected' : ''}>3:2</option>
                            <option value="3:4" ${row.aspect_ratio === '3:4' ? 'selected' : ''}>3:4</option>
                            <option value="4:3" ${row.aspect_ratio === '4:3' ? 'selected' : ''}>4:3</option>
                            <option value="16:9" ${row.aspect_ratio === '16:9' ? 'selected' : ''}>16:9</option>
                            <option value="9:16" ${row.aspect_ratio === '9:16' ? 'selected' : ''}>9:16</option>
                        </select>
                    </td>
                    <td>
                        <select onchange="updateRow(${index}, 'resolution', this.value)">
                            <option value="2k" ${row.resolution === '2k' ? 'selected' : ''}>2K</option>
                            <option value="4k" ${row.resolution === '4k' ? 'selected' : ''}>4K</option>
                        </select>
                    </td>
                    <td>
                        <select id="style_${index}" onchange="updateRow(${index}, 'image_style', this.value)" class="style-select">
                            <option value="">无（使用默认风格）</option>
                            ${imageStyles.map(style => 
                                `<option value="${style.id}" ${row.image_style === style.id ? 'selected' : ''}>${style.name || style.id}</option>`
                            ).join('')}
                        </select>
                    </td>
                    <td>
                        <input type="text" class="ref-images-input"

                    ${sample.filename.substring(0, 10)}...

        function updateRow(index, field, value) {
            batchData[index][field] = value;

        // 从行中移除示例图
        function removeSampleFromRow(rowIndex, sampleIndex) {
            batchData[rowIndex].sample_images.splice(sampleIndex, 1);

            batchData[rowIndex].ref_images_text = batchData[rowIndex].sample_images
                .map(img => img.filename.split('.')[0])
                .join(', ');
            saveBatchData();
            renderTable();
        }
        
        // 更新参考图（通过文本输入）
        function updateRefImages(rowIndex, text) {
            batchData[rowIndex].ref_images_text = text;
            
            // 自动匹配示例图
            const matchedSamples = [];
            if (text && text.trim()) {
                // 支持逗号、分号、空格分隔
                const filenames = text.split(/[,，;\s]+/).filter(f => f.trim());
                
                filenames.forEach(name => {
                    const trimmedName = name.trim();
                    // 在示例图中匹配文件名（模糊匹配）
                    const matched = sampleImages.find(img => 
                        img.filename.includes(trimmedName) || 
                        trimmedName.includes(img.filename.split('.')[0])
                    );
                    if (matched && !matchedSamples.find(m => m.url === matched.url) && matchedSamples.length < 4) {
                        matchedSamples.push(matched);
                    }
                });
            }
            
            batchData[rowIndex].sample_images = matchedSamples;
            saveBatchData();
            renderTable();
        }
        
        // 打开示例图选择模态框
        function openSampleModal(rowIndex) {
            currentRowIndex = rowIndex;
            selectedSamplesForRow = [...batchData[rowIndex].sample_images];
            
            const grid = document.getElementById('modalSampleGrid');
            grid.innerHTML = '';
            
            sampleImages.forEach((img, index) => {
                const isSelected = selectedSamplesForRow.some(s => s.url === img.url);
                const div = document.createElement('div');
                div.className = `sample-item ${isSelected ? 'selected' : ''}`;
                div.onclick = () => toggleSampleInModal(index);
                div.innerHTML = `
                    <img src="${img.url}" alt="${img.filename}">
                    <div class="sample-check">✓</div>
                `;
                grid.appendChild(div);
            });
            
            document.getElementById('sampleModal').classList.add('active');
        }
        
        // 切换示例图选择
        function toggleSampleInModal(index) {
            const img = sampleImages[index];
            const existingIndex = selectedSamplesForRow.findIndex(s => s.url === img.url);
            
            if (existingIndex >= 0) {
                selectedSamplesForRow.splice(existingIndex, 1);
            } else {
                if (selectedSamplesForRow.length >= 4) {
                    alert('最多选择4张示例图');
                    return;
                }
                selectedSamplesForRow.push(img);
            }
            
            // 更新UI
            const items = document.querySelectorAll('#modalSampleGrid .sample-item');
            items[index].classList.toggle('selected');
        }

        function confirmSampleSelection() {
            batchData[currentRowIndex].sample_images = [...selectedSamplesForRow];
            // 同步更新文本输入框
            batchData[currentRowIndex].ref_images_text = selectedSamplesForRow
                .map(img => img.filename.split('.')[0])
                .join(', ');

        // 导入Excel
        function importExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet);
                
                batchData = rows.map(row => {
                    // 解析参考图文件名（兼容旧的"示例图文件名"列）
                    const sampleFilenames = row['参考图'] || row['示例图文件名'] || '';
                    const matchedSamples = [];
                    
                    if (sampleFilenames && sampleFilenames.trim()) {
                        // 支持逗号、中文逗号、分号、空格分隔
                        const filenames = sampleFilenames.split(/[,，;\s]+/).filter(f => f.trim());
                        
                        filenames.forEach(name => {
                            const trimmedName = name.trim();
                            // 在示例图中匹配文件名（模糊匹配）
                            const matched = sampleImages.find(img => 
                                img.filename.includes(trimmedName) || 
                                trimmedName.includes(img.filename.split('.')[0])
                            );
                            if (matched && !matchedSamples.find(m => m.url === matched.url) && matchedSamples.length < 4) {
                                matchedSamples.push(matched);
                            }
                        });
                    }
                    
                    // 处理图片比例（Excel可能将1:1解析为数字1）
                    let aspectRatio = row['图片比例'] || '1:1';
                    if (typeof aspectRatio === 'number') {
                        // 如果是数字，转换回比例格式
                        if (aspectRatio === 1) aspectRatio = '1:1';
                        else if (Math.abs(aspectRatio - 0.6667) < 0.01) aspectRatio = '2:3';
                        else if (Math.abs(aspectRatio - 1.5) < 0.01) aspectRatio = '3:2';
                        else if (Math.abs(aspectRatio - 0.75) < 0.01) aspectRatio = '3:4';
                        else if (Math.abs(aspectRatio - 1.3333) < 0.01) aspectRatio = '4:3';
                        else if (Math.abs(aspectRatio - 1.7778) < 0.01) aspectRatio = '16:9';
                        else if (Math.abs(aspectRatio - 0.5625) < 0.01) aspectRatio = '9:16';
                        else aspectRatio = '1:1'; // 默认值
                    }
                    
                    return {
                        prompt: row['提示词'] || '',
                        aspect_ratio: String(aspectRatio),
                        resolution: row['分辨率'] || '2k',
                        image_style: row['图片风格'] || row['风格'] || '',
                        ref_images_text: row['参考图'] || row['示例图文件名'] || '',
                        sample_images: matchedSamples,
                        num_images: row['生成数量'] || 1,
                        filename: row['文件名'] || 'generated'
                    };
                });
                
                saveBatchData(); // 保存到localStorage
                renderTable();
                // 导入后更新风格下拉框
                setTimeout(() => updateAllStyleSelects(), 100);
                
                const totalMatched = batchData.reduce((sum, row) => sum + row.sample_images.length, 0);
                alert(`成功导入 ${batchData.length} 行数据，匹配 ${totalMatched} 个示例图`);
            };
            reader.readAsArrayBuffer(file);
        }

        // 批量生成状态
        let isGenerating = false;
        let generationStartTime = null;
        let generationLogs = [];
        let currentBatchId = null;
        let progressPollingInterval = null;
        
        // 页面加载时恢复进度日志
        window.addEventListener('load', function() {
            const savedBatchId = localStorage.getItem('currentBatchId');
            const savedProgress = localStorage.getItem('batchProgress');
            const savedLogs = localStorage.getItem('batchLogs');
            
            if (savedLogs) {
                try {
                    generationLogs = JSON.parse(savedLogs);
                    const progressLog = document.getElementById('progressLog');
                    progressLog.innerHTML = '';
                    generationLogs.forEach(log => {
                        const logDiv = document.createElement('div');
                        logDiv.className = 'log-' + log.type;
                        logDiv.textContent = log.message;
                        progressLog.appendChild(logDiv);
                    });
                    
                    // 如果有日志，显示进度区域
                    if (generationLogs.length > 0) {
                        document.getElementById('progressArea').classList.add('active');
                    }
                } catch (e) {
                    console.error('恢复日志失败:', e);
                }
            }
            
            // 如果有正在进行的批次ID，恢复轮询
            if (savedBatchId) {
                currentBatchId = savedBatchId;
                isGenerating = true;
                
                if (savedProgress) {
                    try {
                        const data = JSON.parse(savedProgress);
                        generationStartTime = data.startTime;
                    } catch (e) {
                        generationStartTime = Date.now();
                    }
                } else {
                    generationStartTime = Date.now();
                }
                
                document.getElementById('progressArea').classList.add('active');
                addLog('🔄 检测到后台任务，恢复进度轮询...', 'info');
                
                // 立即查询一次进度
                fetch(`/api/batch-progress/${currentBatchId}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            const progress = data.progress;
                            const total = progress.total;
                            
                            // 开始轮询
                            startProgressPolling(currentBatchId, total);
                        } else {
                            // 批次不存在，清理
                            localStorage.removeItem('currentBatchId');
                            localStorage.removeItem('batchProgress');
                            isGenerating = false;
                            addLog('⚠️ 批次任务不存在或已过期', 'error');
                        }
                    })
                    .catch(error => {
                        console.error('查询进度失败:', error);
                        addLog('❌ 无法连接到服务器', 'error');
                    });
            }
            
            if (savedProgress && !savedBatchId) {
                try {
                    const data = JSON.parse(savedProgress);
                    const elapsed = Math.round((Date.now() - data.startTime) / 1000);
                    
                    // 如果是进行中的任务（1小时内）但没有批次ID（旧版本）
                    if (data.completed < data.total && elapsed < 3600) {
                        isGenerating = true;
                        generationStartTime = data.startTime;
                        document.getElementById('progressArea').classList.add('active');
                        const percent = Math.round((data.completed / data.total) * 100);
                        document.getElementById('progressFill').style.width = percent + '%';
                        document.getElementById('progressFill').textContent = percent + '%';
                        addLog(`页面已返回，当前进度: ${data.completed}/${data.total} (${percent}%)`, 'info');
                    }
                } catch (e) {
                    console.error('恢复进度失败:', e);
                }
            }
        });
        
        // 开始批量生成
        async function startBatchGeneration() {
            // 验证数据
            if (batchData.length === 0) {
                alert('请至少添加一行任务');
                return;
            }
            
            for (let i = 0; i < batchData.length; i++) {
                if (!batchData[i].prompt.trim()) {
                    alert(`第 ${i + 1} 行缺少提示词`);
                    return;
                }
            }
            
            // 检查是否使用后台模式
            const backgroundMode = document.getElementById('backgroundMode').checked;
            
            if (backgroundMode) {
                // 后台模式：一次性提交所有任务
                if (!confirm(`确定要生成 ${batchData.length} 个任务吗？\n\n✅ 后台模式：\n• 任务将在服务端处理\n• 可以自由切换页面或关闭浏览器\n• 完成后到"生图任务"查看结果\n• 估计耗时: ${batchData.length * 15}~${batchData.length * 30} 秒`)) {
                    return;
                }
                await startBackgroundBatchGeneration();
            } else {
                // 前台模式：逐个生成（旧方式）
                if (!confirm(`确定要生成 ${batchData.length} 个任务吗？\n\n⚠️ 前台模式：\n• 需要保持页面打开\n• 可以看到实时进度\n• 切换页面可能影响生成`)) {
                    return;
                }
                await startForegroundBatchGeneration();
            }
        }
        
        // 后台批量生成（服务端处理）
        async function startBackgroundBatchGeneration() {
            
            const progressArea = document.getElementById('progressArea');
            const progressFill = document.getElementById('progressFill');
            const progressLog = document.getElementById('progressLog');
            
            // 如果有正在进行的请求，先取消它
            if (batchGenerateAbortController) {
                batchGenerateAbortController.abort();
            }
            
            // 创建新的 AbortController
            batchGenerateAbortController = new AbortController();
            
            progressArea.classList.add('active');
            progressLog.innerHTML = '';
            
            // 清空旧日志，开始新的生成任务
            generationLogs = [];
            localStorage.removeItem('batchLogs');
            
            addLog('========================================', 'info');
            addLog(`🚀 提交批量任务到服务端`, 'info');
            addLog(`📦 总任务数: ${batchData.length}`, 'info');
            addLog('========================================', 'info');
            
            try {
                const response = await fetch('/api/batch-generate-all', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ tasks: batchData }),
                    signal: batchGenerateAbortController.signal,
                    keepalive: true  // 保持请求活跃，即使页面卸载也继续处理
                });
                
                const result = await response.json();
                
                if (result.success) {
                    currentBatchId = result.batch_id;
                    isGenerating = true;
                    generationStartTime = Date.now();
                    
                    // 保存批次ID
                    localStorage.setItem('currentBatchId', currentBatchId);
                    
                    addLog(`✅ 任务已成功提交到服务端`, 'success');
                    addLog(`📋 批次ID: ${result.batch_id}`, 'info');
                    addLog(`🔄 任务正在后台执行中...`, 'info');
                    addLog('', 'info');
                    addLog('💡 提示:', 'info');
                    addLog('• 您现在可以关闭此页面或切换到其他页面', 'info');
                    addLog('• 任务会在服务端继续执行', 'info');
                    addLog('• 页面会自动更新进度', 'info');
                    addLog(`• 预计完成时间: ${Math.ceil(result.total_tasks * 20 / 60)} 分钟`, 'info');
                    
                    // 开始轮询进度
                    startProgressPolling(currentBatchId, result.total_tasks);
                } else {
                    addLog(`❌ 提交失败: ${result.error}`, 'error');
                    alert('提交失败: ' + result.error);
                }
            } catch (error) {
                // 判断是否是由于页面卸载导致的中止
                if (error.name === 'AbortError') {
                    console.log('批量生成请求被中止');
                    addLog('❌ 提交被中止（可能是页面切换）', 'error');
                    return;
                }
                
                let errorMsg = error.message;
                if (error.message === 'Failed to fetch') {
                    errorMsg = '网络连接失败，请检查网络连接后重试';
                }
                
                addLog(`❌ 提交出错: ${errorMsg}`, 'error');
                alert('提交失败: ' + errorMsg);
            } finally {
                batchGenerateAbortController = null;
            }
        }
        
        // 前台批量生成（客户端逐个生成）
        async function startForegroundBatchGeneration() {
            const progressArea = document.getElementById('progressArea');
            const progressFill = document.getElementById('progressFill');
            const progressLog = document.getElementById('progressLog');
            
            // 如果有正在进行的请求，先取消它
            if (batchGenerateAbortController) {
                batchGenerateAbortController.abort();
            }
            
            // 创建新的 AbortController
            batchGenerateAbortController = new AbortController();
            
            progressArea.classList.add('active');
            progressLog.innerHTML = '';
            isGenerating = true;
            generationStartTime = Date.now();
            
            // 清空旧日志，开始新的生成任务
            generationLogs = [];
            localStorage.removeItem('batchLogs');
            
            let completed = 0;
            const total = batchData.length;
            
            addLog('========================================', 'info');
            addLog(`开始批量生成 ${total} 个任务`, 'info');
            addLog('提示：您可以切换到其他页面，生成会继续进行', 'info');
            addLog('========================================', 'info');
            
            for (let i = 0; i < batchData.length; i++) {
                const task = batchData[i];
                const logPrefix = `[${i + 1}/${total}]`;
                
                // 添加日志
                addLog(`${logPrefix} 开始生成: ${task.prompt.substring(0, 30)}...`, 'info');
                
                try {
                    // 使用 keepalive 确保请求不会被中断
                    const response = await fetch('/api/batch-generate', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(task),
                        signal: batchGenerateAbortController.signal,
                        keepalive: true  // 关键：保持请求活跃
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        addLog(`${logPrefix} ✓ 成功生成 ${result.images.length} 张图片`, 'success');
                    } else {
                        addLog(`${logPrefix} ✗ 失败: ${result.error}`, 'error');
                    }
                } catch (error) {
                    // 判断是否是由于页面卸载导致的中止
                    if (error.name === 'AbortError') {
                        console.log('批量生成被中止');
                        break;  // 跳出循环
                    }
                    
                    let errorMsg = error.message;
                    if (error.message === 'Failed to fetch') {
                        errorMsg = '网络连接失败';
                    }
                    
                    addLog(`${logPrefix} ✗ 错误: ${errorMsg}`, 'error');
                }
                
                completed++;
                const percent = Math.round((completed / total) * 100);
                progressFill.style.width = percent + '%';
                progressFill.textContent = percent + '%';
                
                // 保存进度到 localStorage
                localStorage.setItem('batchProgress', JSON.stringify({
                    completed: completed,
                    total: total,
                    startTime: generationStartTime
                }));
            }
            
            const elapsed = Math.round((Date.now() - generationStartTime) / 1000);
            addLog('========================================', 'info');
            addLog(`批量生成完成！共 ${completed}/${total} 个任务，耗时 ${elapsed} 秒`, 'success');
            addLog('请前往"生图任务"页面查看结果', 'info');
            addLog('提示：此日志将保留到下次生成', 'info');
            
            isGenerating = false;
            batchGenerateAbortController = null;
            localStorage.removeItem('batchProgress');
            // 注意：不删除 batchLogs，保留日志直到下次生成
            
            alert('批量生成完成！请前往"生图任务"页面查看结果。');
        }
        
        // 监听页面可见性变化
        document.addEventListener('visibilitychange', function() {
            if (document.hidden && isGenerating) {
                console.log('页面已切换，批量生成任务将继续在后台执行');
                addLog('💡 您已切换页面，任务将继续在后台执行', 'info');
                // 可以在这里添加通知逻辑
            } else if (!document.hidden) {
                // 页面返回时，不管是否正在生成，都确保进度区域可见
                const savedLogs = localStorage.getItem('batchLogs');
                if (savedLogs && JSON.parse(savedLogs).length > 0) {
                    document.getElementById('progressArea').classList.add('active');
                }
                
                if (isGenerating) {
                    console.log('页面已返回，批量生成任务正在进行中');
                    // 恢复显示进度
                    const progress = localStorage.getItem('batchProgress');
                    if (progress) {
                        const data = JSON.parse(progress);
                        const percent = Math.round((data.completed / data.total) * 100);
                        document.getElementById('progressFill').style.width = percent + '%';
                        document.getElementById('progressFill').textContent = percent + '%';
                        addLog(`✅ 页面已返回，当前进度: ${data.completed}/${data.total} (${percent}%)`, 'info');
                    }
                } else {
                    console.log('页面已返回，显示之前的生成日志');
                }
            }
        });
        
        // 开始轮询进度
        function startProgressPolling(batchId, totalTasks) {
            // 清除已有的轮询
            if (progressPollingInterval) {
                clearInterval(progressPollingInterval);
            }
            
            // 每2秒轮询一次
            progressPollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/batch-progress/${batchId}`);
                    const data = await response.json();
                    
                    if (data.success) {
                        const progress = data.progress;
                        const completed = progress.completed + progress.failed;
                        const percent = Math.round((completed / progress.total) * 100);
                        
                        // 更新进度条
                        const progressFill = document.getElementById('progressFill');
                        progressFill.style.width = percent + '%';
                        progressFill.textContent = `${completed}/${progress.total} (${percent}%)`;
                        
                        if (progress.status === 'completed') {
                            progressFill.style.background = '#28a745';
                        } else {
                            progressFill.style.background = 'linear-gradient(90deg, #667eea 0%, #764ba2 100%)';
                        }
                        
                        // 更新进度到localStorage
                        localStorage.setItem('batchProgress', JSON.stringify({
                            completed: completed,
                            total: progress.total,
                            startTime: generationStartTime
                        }));
                        
                        // 如果完成，停止轮询
                        if (progress.status === 'completed') {
                            clearInterval(progressPollingInterval);
                            progressPollingInterval = null;
                            isGenerating = false;
                            localStorage.removeItem('currentBatchId');
                            localStorage.removeItem('batchProgress');
                            
                            const elapsed = Math.round((Date.now() - generationStartTime) / 1000);
                            addLog('========================================', 'info');
                            addLog(`🎉 批量生成完成！`, 'success');
                            addLog(`✅ 成功: ${progress.completed} 个`, 'success');
                            if (progress.failed > 0) {
                                addLog(`❌ 失败: ${progress.failed} 个`, 'error');
                            }
                            addLog(`⏱️ 总耗时: ${elapsed} 秒`, 'info');
                            addLog('📊 请前往"生图任务"页面查看结果', 'info');
                            
                            alert(`🎉 批量生成完成！\n\n成功: ${progress.completed} 个\n失败: ${progress.failed} 个\n耗时: ${elapsed} 秒\n\n请到"生图任务"页面查看结果。`);
                        }
                    }
                } catch (error) {
                    console.error('轮询进度失败:', error);
                }
            }, 2000);
        }
        
        // 停止轮询
        function stopProgressPolling() {
            if (progressPollingInterval) {
                clearInterval(progressPollingInterval);
                progressPollingInterval = null;
            }
        }

        // 保持原有行为：不提供重新生成/清除缓存功能
        
        // 添加日志
        function addLog(message, type = 'info') {
            const log = document.getElementById('progressLog');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            
            // 保存日志到 localStorage
            generationLogs.push({ message: message, type: type, time: Date.now() });
            // 只保留最近500条日志
            if (generationLogs.length > 500) {
                generationLogs = generationLogs.slice(-500);
            }
            localStorage.setItem('batchLogs', JSON.stringify(generationLogs));
        }
    </script>
</body>
</html>
