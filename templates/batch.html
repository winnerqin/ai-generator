<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量生成 - Ai创作工具</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/sidebar-nav.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        .app-shell { display: flex; min-height: 100vh; }
        .main-content { padding: 0; }
        .page-wrap { padding: 20px 24px 36px; }
        .page-title { font-size: 1.4rem; font-weight: 600; }
        .panel { border-radius: 16px; padding: 16px; }
        .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .row.space { justify-content: space-between; }
        .table-wrap { overflow-x: auto; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th, td { padding: 8px; border-bottom: 1px solid rgba(86,111,255,0.2); }
        th { text-align: left; }
        textarea { min-height: 64px; height: 64px; resize: vertical; box-sizing: border-box; }
        .table-wrap select, .table-wrap input[type="number"], .table-wrap input[type="text"], .table-wrap input:not([type]) { height: 32px; box-sizing: border-box; }
        .sample-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px,1fr)); gap: 8px; }
        .sample-item { border-radius: 8px; overflow: hidden; border: 1px solid rgba(86,111,255,0.2); cursor: pointer; position: relative; }
        .sample-item.selected::after {
            content: '✓'; position: absolute; top: 6px; right: 6px;
            width: 18px; height: 18px; border-radius: 50%;
            background: rgba(86,111,255,0.85); color: #fff; font-size: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .sample-item img { width: 100%; height: 90px; object-fit: contain; display: block; background: rgba(0,0,0,0.12); }
        .modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(6,10,20,0.7); z-index: 2000; }
        .modal-card { width: min(900px, 92vw); max-height: 86vh; overflow: auto; padding: 16px; border-radius: 16px; }
        .progress-bar { height: 10px; background: rgba(86,111,255,0.15); border-radius: 999px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(135deg, #5871ff, #3b7bff); }
        .log-box { max-height: 220px; overflow: auto; padding: 10px; border-radius: 12px; }
        .log-info { color: #9aa3c7; }
        .log-success { color: #89f7c0; }
        .log-error { color: #ff9aa2; }
    </style>
</head>
<body>
    <div id="reactApp"></div>
    <script>
        window.__APP_CONTEXT__ = { username: "{{ user.username }}", is_system_admin: {{ 'true' if user.username == 'system_admin' else 'false' }} };
    </script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="/static/sidebar-react.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    {% raw %}
    <script type="text/babel">
        const { useEffect, useMemo, useState } = React;

        const DEFAULT_ROW = (index) => ({
            prompt: '',
            aspect_ratio: '1:1',
            resolution: '2k',
            image_style: '',
            ref_images_text: '',
            sample_images: [],
            num_images: 1,
            filename: `batch_${index + 1}`
        });

        const Sidebar = (props) => <window.AppSidebar {...props} activePage="batch" />;

        function App() {
            const [projects, setProjects] = useState([]);
            const [currentProjectId, setCurrentProjectId] = useState('');
            const [batchData, setBatchData] = useState([]);
            const [imageStyles, setImageStyles] = useState([]);
            const [sampleImages, setSampleImages] = useState([]);
            const [sampleCategory, setSampleCategory] = useState('image_material');
            const [modalOpen, setModalOpen] = useState(false);
            const [modalRowIndex, setModalRowIndex] = useState(-1);
            const [modalSelected, setModalSelected] = useState([]);
            const [backgroundMode, setBackgroundMode] = useState(true);
            const [logs, setLogs] = useState([]);
            const [progress, setProgress] = useState({ total: 0, completed: 0, failed: 0 });
            const [pollingId, setPollingId] = useState(null);

            useEffect(() => {
                document.body.classList.add('react-theme', 'sidebar-compact');
            }, []);

            useEffect(() => {
                fetch('/api/projects').then(res => res.json()).then(data => {
                    if (data.success) {
                        setProjects(data.projects || []);
                        setCurrentProjectId(String(data.current_project_id || ''));
                    }
                });
                fetch('/api/image-styles').then(res => res.json()).then(data => {
                    if (data.success) setImageStyles(data.styles || []);
                });
                const saved = localStorage.getItem('batchData');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setBatchData(parsed.length ? parsed : [DEFAULT_ROW(0)]);
                    } catch {
                        setBatchData([DEFAULT_ROW(0)]);
                    }
                } else {
                    setBatchData([DEFAULT_ROW(0)]);
                }
                const savedLogs = localStorage.getItem('batchLogs');
                const savedBatchId = localStorage.getItem('currentBatchId');
                const savedProgress = localStorage.getItem('batchProgress');
                if (savedLogs) {
                    try { setLogs(JSON.parse(savedLogs)); } catch {}
                }
                if (savedProgress) {
                    try { setProgress(JSON.parse(savedProgress)); } catch {}
                }
                if (savedBatchId) {
                    startPolling(savedBatchId);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('batchData', JSON.stringify(batchData));
            }, [batchData]);

            useEffect(() => {
                if (sampleCategory === 'recent') {
                    fetch('/api/recent-images?limit=50').then(res => res.json()).then(data => {
                        if (data.success) setSampleImages(data.images || []);
                        else setSampleImages([]);
                    });
                    return;
                }
                if (sampleCategory === 'image_material') {
                    fetch('/api/content-library?type=image_material').then(res => res.json()).then(data => {
                        if (data.success) setSampleImages(data.assets || []);
                        else setSampleImages([]);
                    });
                    return;
                }
                fetch(`/api/sample-images?category=${sampleCategory}`).then(res => res.json()).then(data => {
                    if (data.success) setSampleImages(data.images || []);
                    else setSampleImages([]);
                });
            }, [sampleCategory]);

            useEffect(() => {
                localStorage.setItem('batchLogs', JSON.stringify(logs));
            }, [logs]);

            useEffect(() => {
                localStorage.setItem('batchProgress', JSON.stringify(progress));
            }, [progress]);

            const addLog = (message, type = 'info') => {
                setLogs(prev => prev.concat({ message, type, time: Date.now() }));
            };

            const updateRow = (index, field, value) => {
                setBatchData(prev => prev.map((row, i) => i === index ? { ...row, [field]: value } : row));
            };

            const addRow = () => {
                setBatchData(prev => prev.concat(DEFAULT_ROW(prev.length)));
            };

            const deleteRow = (index) => {
                if (!confirm('确定删除这一行吗？')) return;
                setBatchData(prev => prev.filter((_, i) => i !== index));
            };

            const updateRefImages = (rowIndex, text) => {
                const filenames = text.split(/[,，;\s]+/).filter(Boolean);
                const matched = [];
                filenames.forEach(name => {
                    const matchedImg = sampleImages.find(img =>
                        img.filename.includes(name) || name.includes(img.filename.split('.')[0])
                    );
                    if (matchedImg && !matched.find(m => m.url === matchedImg.url) && matched.length < 4) {
                        matched.push(matchedImg);
                    }
                });
                setBatchData(prev => prev.map((row, i) => i === rowIndex ? {
                    ...row,
                    ref_images_text: text,
                    sample_images: matched
                } : row));
            };

            const openModal = (rowIndex) => {
                setModalRowIndex(rowIndex);
                setModalSelected(batchData[rowIndex].sample_images || []);
                setModalOpen(true);
            };

            const toggleModalSample = (img) => {
                setModalSelected(prev => {
                    const exists = prev.find(s => s.url === img.url);
                    if (exists) return prev.filter(s => s.url !== img.url);
                    if (prev.length >= 4) return prev;
                    return prev.concat(img);
                });
            };

            const confirmModal = () => {
                setBatchData(prev => prev.map((row, i) => i === modalRowIndex ? {
                    ...row,
                    sample_images: modalSelected,
                    ref_images_text: modalSelected.map(s => s.filename.split('.')[0]).join(', ')
                } : row));
                setModalOpen(false);
                setModalRowIndex(-1);
                setModalSelected([]);
            };

            const importExcel = (file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(firstSheet);
                    const mapped = rows.map(row => {
                        const sampleText = row['参考图'] || row['示例图文件名'] || '';
                        let aspectRatio = row['图片比例'] || '1:1';
                        if (typeof aspectRatio === 'number') {
                            if (aspectRatio === 1) aspectRatio = '1:1';
                            else if (Math.abs(aspectRatio - 0.6667) < 0.01) aspectRatio = '2:3';
                            else if (Math.abs(aspectRatio - 1.5) < 0.01) aspectRatio = '3:2';
                            else if (Math.abs(aspectRatio - 0.75) < 0.01) aspectRatio = '3:4';
                            else if (Math.abs(aspectRatio - 1.3333) < 0.01) aspectRatio = '4:3';
                            else if (Math.abs(aspectRatio - 1.7778) < 0.01) aspectRatio = '16:9';
                            else if (Math.abs(aspectRatio - 0.5625) < 0.01) aspectRatio = '9:16';
                            else aspectRatio = '1:1';
                        }
                        const filenames = sampleText.split(/[,，;\s]+/).filter(Boolean);
                        const matched = [];
                        filenames.forEach(name => {
                            const matchedImg = sampleImages.find(img =>
                                img.filename.includes(name) || name.includes(img.filename.split('.')[0])
                            );
                            if (matchedImg && !matched.find(m => m.url === matchedImg.url) && matched.length < 4) {
                                matched.push(matchedImg);
                            }
                        });
                        return {
                            prompt: row['提示词'] || '',
                            aspect_ratio: String(aspectRatio),
                            resolution: row['分辨率'] || '2k',
                            image_style: row['图片风格'] || row['风格'] || '',
                            ref_images_text: sampleText,
                            sample_images: matched,
                            num_images: row['生成数量'] || 1,
                            filename: row['文件名'] || 'generated'
                        };
                    });
                    setBatchData(mapped);
                    addLog(`成功导入 ${mapped.length} 行数据`, 'success');
                };
                reader.readAsArrayBuffer(file);
            };

            const downloadTemplate = () => {
                const template = [
                    { '提示词': '一只可爱的猫咪', '图片比例': '1:1', '分辨率': '2k', '参考图': 'sdk_generated', '生成数量': 1, '文件名': 'cat_01' },
                    { '提示词': '美丽的风景画', '图片比例': '16:9', '分辨率': '2k', '参考图': '', '生成数量': 2, '文件名': 'landscape_01' }
                ];
                const ws = XLSX.utils.json_to_sheet(template);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, '批量生成模板');
                XLSX.writeFile(wb, '批量生成模板.xlsx');
            };

            const exportToExcel = () => {
                const exportData = batchData.map((row, index) => ({
                    '序号': index + 1,
                    '提示词': row.prompt,
                    '图片比例': row.aspect_ratio,
                    '分辨率': row.resolution,
                    '图片风格': row.image_style || '',
                    '参考图': row.ref_images_text || row.sample_images.map(img => img.filename.split('.')[0]).join(', '),
                    '生成数量': row.num_images,
                    '文件名': row.filename
                }));
                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, '批量任务');
                XLSX.writeFile(wb, `批量任务_${new Date().toISOString().slice(0,10)}.xlsx`);
            };

            const startPolling = (batchId) => {
                if (pollingId) clearInterval(pollingId);
                const id = setInterval(async () => {
                    const resp = await fetch(`/api/batch-progress/${batchId}`);
                    const data = await resp.json();
                    if (data.success) {
                        const p = data.progress;
                        setProgress({ total: p.total, completed: p.completed, failed: p.failed });
                        if (Array.isArray(p.logs)) {
                            setLogs(prev => prev.concat(p.logs.slice(-5).map(l => ({ message: l.message, type: l.type }))));
                        }
                        if (p.status === 'completed') {
                            clearInterval(id);
                            setPollingId(null);
                            localStorage.removeItem('currentBatchId');
                        }
                    }
                }, 3000);
                setPollingId(id);
            };

            const startBackgroundBatch = async () => {
                const resp = await fetch('/api/batch-generate-all', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tasks: batchData })
                });
                const data = await resp.json();
                if (!data.success) {
                    addLog(data.error || '后台任务创建失败', 'error');
                    return;
                }
                localStorage.setItem('currentBatchId', data.batch_id);
                addLog(`后台任务已启动，批次 ${data.batch_id}`, 'info');
                setProgress({ total: data.total_tasks, completed: 0, failed: 0 });
                startPolling(data.batch_id);
            };

            const startForegroundBatch = async () => {
                const total = batchData.length;
                setProgress({ total, completed: 0, failed: 0 });
                for (let i = 0; i < batchData.length; i++) {
                    const task = batchData[i];
                    addLog(`开始任务 ${i + 1}/${total}`, 'info');
                    const resp = await fetch('/api/batch-generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(task)
                    });
                    const data = await resp.json();
                    if (data.success) {
                        setProgress(prev => ({ ...prev, completed: prev.completed + 1 }));
                        addLog(`✓ 任务 ${i + 1} 完成`, 'success');
                    } else {
                        setProgress(prev => ({ ...prev, failed: prev.failed + 1 }));
                        addLog(`✗ 任务 ${i + 1} 失败: ${data.error || '未知错误'}`, 'error');
                    }
                }
            };

            const startBatch = async () => {
                if (batchData.length === 0) {
                    alert('请至少添加一行任务');
                    return;
                }
                for (let i = 0; i < batchData.length; i++) {
                    if (!batchData[i].prompt.trim()) {
                        alert(`第 ${i + 1} 行缺少提示词`);
                        return;
                    }
                }
                if (backgroundMode) {
                    if (!confirm(`确定要生成 ${batchData.length} 个任务吗？`)) return;
                    await startBackgroundBatch();
                } else {
                    if (!confirm(`确定要生成 ${batchData.length} 个任务吗？`)) return;
                    await startForegroundBatch();
                }
            };

            const totalPercent = useMemo(() => {
                if (!progress.total) return 0;
                return Math.round(((progress.completed + progress.failed) / progress.total) * 100);
            }, [progress]);

            return (
                <div className="app-shell">
                    <Sidebar
                        username={window.__APP_CONTEXT__?.username || 'user'}
                        projects={projects}
                        currentProjectId={currentProjectId}
                        onProjectChange={async (pid) => {
                            const resp = await fetch('/api/projects/switch', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ project_id: pid })
                            });
                            const data = await resp.json();
                            if (data.success) window.location.reload();
                        }}
                    />
                    <div className="main-content">
                        <div className="page-wrap">
                            <div className="page-title">📦 批量生成</div>
                            <div className="panel" style={{ marginTop: '16px' }}>
                                <div className="row space">
                                    <div className="row">
                                        <label className="btn btn-secondary">
                                            导入Excel
                                            <input type="file" accept=".xlsx,.xls" style={{ display: 'none' }} onChange={(e) => importExcel(e.target.files[0])} />
                                        </label>
                                        <button className="btn btn-secondary" onClick={downloadTemplate}>下载模板</button>
                                        <button className="btn btn-secondary" onClick={exportToExcel}>导出Excel</button>
                                        <button className="btn btn-primary" onClick={addRow}>添加行</button>
                                    </div>
                                    <div className="row">
                                        <label className="small-hint">后台模式</label>
                                        <input type="checkbox" checked={backgroundMode} onChange={(e) => setBackgroundMode(e.target.checked)} />
                                        <button className="btn btn-primary" onClick={startBatch}>开始生成</button>
                                    </div>
                                </div>
                            </div>

                            <div className="panel" style={{ marginTop: '16px' }}>
                                <div className="section-title">任务列表</div>
                                <div className="table-wrap">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>序号</th>
                                                <th>提示词</th>
                                                <th>比例</th>
                                                <th>分辨率</th>
                                                <th>风格</th>
                                                <th>参考图</th>
                                                <th>数量</th>
                                                <th>文件名</th>
                                                <th>操作</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {batchData.map((row, index) => (
                                                <tr key={index}>
                                                    <td>{index + 1}</td>
                                                    <td><textarea value={row.prompt} onChange={(e) => updateRow(index, 'prompt', e.target.value)} placeholder="描述你想要的图片..." /></td>
                                                    <td>
                                                        <select value={row.aspect_ratio} onChange={(e) => updateRow(index, 'aspect_ratio', e.target.value)}>
                                                            {['1:1','2:3','3:2','3:4','4:3','16:9','9:16'].map(r => (
                                                                <option key={r} value={r}>{r}</option>
                                                            ))}
                                                        </select>
                                                    </td>
                                                    <td>
                                                        <select value={row.resolution} onChange={(e) => updateRow(index, 'resolution', e.target.value)}>
                                                            <option value="2k">2K</option>
                                                            <option value="4k">4K</option>
                                                        </select>
                                                    </td>
                                                    <td>
                                                        <select value={row.image_style} onChange={(e) => updateRow(index, 'image_style', e.target.value)}>
                                                            <option value="">无</option>
                                                            {imageStyles.map(style => (
                                                                <option key={style.id} value={style.id}>{style.name || style.id}</option>
                                                            ))}
                                                        </select>
                                                    </td>
                                                    <td>
                                                        <input value={row.ref_images_text} onChange={(e) => updateRefImages(index, e.target.value)} placeholder="文件名逗号分隔" />
                                                        <button className="btn btn-secondary" onClick={() => openModal(index)}>选择 ({row.sample_images.length})</button>
                                                    </td>
                                                    <td>
                                                        <input type="number" min="1" max="10" value={row.num_images} onChange={(e) => updateRow(index, 'num_images', Number(e.target.value))} />
                                                    </td>
                                                    <td>
                                                        <input value={row.filename} onChange={(e) => updateRow(index, 'filename', e.target.value)} />
                                                    </td>
                                                    <td><button className="btn btn-danger" onClick={() => deleteRow(index)}>删除</button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div className="panel" style={{ marginTop: '16px' }}>
                                <div className="section-title">进度</div>
                                <div className="progress-bar">
                                    <div className="progress-fill" style={{ width: `${totalPercent}%` }} />
                                </div>
                                <div className="small-hint" style={{ marginTop: '6px' }}>
                                    {progress.completed}/{progress.total} 完成，失败 {progress.failed}
                                </div>
                                <div className="log-box" style={{ marginTop: '10px' }}>
                                    {logs.map((log, idx) => (
                                        <div key={idx} className={`log-${log.type || 'info'}`}>{log.message}</div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {modalOpen && (
                        <div className="modal">
                            <div className="modal-card panel">
                                <div className="row space">
                                    <div className="section-title">选择示例图</div>
                                    <button className="btn btn-secondary" onClick={() => setModalOpen(false)}>关闭</button>
                                </div>
                                <div className="row" style={{ margin: '10px 0' }}>
                                    <button className={`btn ${sampleCategory === 'image_material' ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setSampleCategory('image_material')}>图片素材</button>
                                    <button className={`btn ${sampleCategory === 'recent' ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setSampleCategory('recent')}>最近</button>
                                </div>
                                <div className="sample-grid">
                                    {sampleImages.map((img, idx) => (
                                        <div
                                            key={idx}
                                            className={`sample-item ${modalSelected.find(s => s.url === img.url) ? 'selected' : ''}`}
                                            onClick={() => toggleModalSample(img)}
                                        >
                                            <img src={img.url} alt={img.filename} />
                                        </div>
                                    ))}
                                </div>
                                <div className="row" style={{ marginTop: '12px' }}>
                                    <button className="btn btn-primary" onClick={confirmModal}>确认选择</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('reactApp')).render(<App />);
    </script>
    {% endraw %}
    <script src="/static/sidebar-nav.js"></script>
</body>
</html>
