<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image2 生图 - Ai创作工具</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/sidebar-nav.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        .app-shell { display: flex; min-height: 100vh; overflow-x: hidden; }
        .main-content { padding: 0; flex: 1; min-width: 0; max-width: 100%; overflow-x: hidden; }
        .page-wrap { padding: 20px 24px 36px; max-width: 100%; min-width: 0; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .page-title { font-size: 1.4rem; font-weight: 600; }
        .grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 18px; }
        .grid > .panel { min-width: 0; }
        .panel { border-radius: 16px; }
        .panel-body { display: grid; gap: 14px; }
        .panel-body label { display: inline-block; margin-bottom: 0.6em; }
        .prompt-row { display: flex; gap: 12px; align-items: flex-start; }
        .prompt-row textarea { flex: 1; min-width: 0; height: 96px; min-height: 96px; }
        .btn-generate { flex-shrink: 0; background: linear-gradient(135deg, #7eb8ff 0%, #5a9cf5 100%); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .btn-generate:disabled { opacity: 0.7; cursor: not-allowed; }
        .form-row { display: grid; gap: 12px; }
        .form-row.two { grid-template-columns: 1fr 1fr; }
        .form-row.three { grid-template-columns: repeat(3, 1fr); }
        .panel-body select, .panel-body input[type="text"], .panel-body input[type="number"], .panel-body input[type="file"] { height: 32px; padding: 4px 10px; box-sizing: border-box; width: 100%; }
        .sample-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
        .sample-scroll { height: 430px; overflow-y: auto; padding: 10px; margin-top: 10px; border: 1px solid rgba(86, 111, 255, 0.2); border-radius: 12px; background: rgba(10, 18, 35, 0.16); }
        .sample-scroll .sample-grid { align-content: start; }
        .sample-item { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid rgba(86, 111, 255, 0.2); cursor: pointer; }
        .sample-item.selected::after { content: '✓'; position: absolute; top: 6px; right: 6px; background: rgba(86, 111, 255, 0.8); color: #fff; width: 20px; height: 20px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .sample-item img { width: 100%; height: 90px; object-fit: contain; display: block; background: rgba(0,0,0,0.12); }
        .sample-filename { position: absolute; left: 0; right: 0; bottom: 0; padding: 4px 6px; background: linear-gradient(180deg, transparent, rgba(0,0,0,0.78)); color: #fff; font-size: 11px; line-height: 1.25; word-break: break-all; text-shadow: 0 1px 2px rgba(0,0,0,0.7); }
        .sample-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .sample-pagination { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .sample-page-status { min-width: 92px; text-align: center; color: rgba(255,255,255,0.72); font-size: 0.85rem; }
        .upload-ref-thumbs { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 8px; max-width: 100%; min-width: 0; }
        .upload-ref-thumb { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid rgba(86, 111, 255, 0.25); cursor: pointer; aspect-ratio: 1; background: rgba(0,0,0,0.2); }
        .upload-ref-thumb img { width: 100%; height: 100%; object-fit: contain; display: block; background: rgba(0,0,0,0.12); }
        .upload-ref-thumb .remove-ref-btn { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; border: none; background: rgba(0,0,0,0.6); color: #fff; cursor: pointer; }
        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .result-image { border-radius: 12px; overflow: hidden; border: 1px solid rgba(86,111,255,0.22); background: rgba(8,15,30,0.25); }
        .result-image img { width: 100%; aspect-ratio: 1; object-fit: contain; display: block; background: rgba(0,0,0,0.16); }
        .result-meta { padding: 8px; display: flex; justify-content: space-between; gap: 8px; align-items: center; font-size: 0.82rem; }
        .result-meta a { color: #9dccff; text-decoration: none; }
        .small-hint { color: rgba(255,255,255,0.62); font-size: 0.86rem; }
        @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } .prompt-row { flex-direction: column; } .btn-generate { width: 100%; } }
    </style>
</head>
<body>
    <div id="reactApp"></div>
    <script>
        window.__APP_CONTEXT__ = { username: "{{ user.username }}", role_code: "{{ user.role_code or '' }}", is_system_admin: {{ 'true' if user.role_code == 'system_admin' or user.username == 'system_admin' else 'false' }} };
    </script>
    <script src="/static/vendor/react.production.min.js"></script>
    <script src="/static/vendor/react-dom.production.min.js"></script>
    <script src="/static/vendor/babel.min.js"></script>
    <script src="/static/sidebar-react.js"></script>
    {% raw %}
    <script type="text/babel">
        const { useEffect, useMemo, useRef, useState } = React;
        const SAMPLE_PAGE_SIZE = 50;
        const Sidebar = (props) => <window.AppSidebar {...props} activePage="image2" />;

        function App() {
            const [projects, setProjects] = useState([]);
            const [currentProjectId, setCurrentProjectId] = useState('');
            const [prompt, setPrompt] = useState('');
            const [quality, setQuality] = useState('auto');
            const [size, setSize] = useState('1024x1024');
            const [customWidth, setCustomWidth] = useState(1024);
            const [customHeight, setCustomHeight] = useState(1024);
            const [numImages, setNumImages] = useState(1);
            const [uploadedFiles, setUploadedFiles] = useState([]);
            const [selectedSample, setSelectedSample] = useState([]);
            const [sampleCategory, setSampleCategory] = useState('image_material');
            const [sampleImages, setSampleImages] = useState([]);
            const [samplePage, setSamplePage] = useState(1);
            const [sampleTotal, setSampleTotal] = useState(0);
            const [sampleLoading, setSampleLoading] = useState(false);
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState('');
            const [images, setImages] = useState([]);
            const [usage, setUsage] = useState(null);
            const sampleScrollRef = useRef(null);

            useEffect(() => {
                document.body.classList.add('react-theme', 'sidebar-compact');
                fetch('/api/projects').then(res => res.json()).then(data => {
                    if (data.success) {
                        setProjects(data.projects || []);
                        setCurrentProjectId(String(data.current_project_id || ''));
                    }
                });
                return () => {
                    uploadedFiles.forEach((item) => URL.revokeObjectURL(item.preview));
                };
            }, []);

            useEffect(() => {
                const controller = new AbortController();
                let active = true;
                const pageParam = `page=${samplePage}&page_size=${SAMPLE_PAGE_SIZE}`;
                const projectParam = currentProjectId ? `&project_id=${currentProjectId}` : '';
                const opts = { cache: 'no-store', signal: controller.signal };
                if (sampleScrollRef.current) sampleScrollRef.current.scrollTop = 0;
                setSampleLoading(true);
                const applyImages = (data, key) => {
                    if (!active) return;
                    if (data.success) {
                        setSampleImages(data[key] || []);
                        setSampleTotal(Number(data.total || 0));
                    } else {
                        setSampleImages([]);
                        setSampleTotal(0);
                    }
                };
                const failImages = (err) => {
                    if (!active || err.name === 'AbortError') return;
                    setSampleImages([]);
                    setSampleTotal(0);
                };
                const finishLoading = () => { if (active) setSampleLoading(false); };
                if (sampleCategory === 'recent') {
                    fetch(`/api/recent-images?${pageParam}${projectParam}`, opts).then(res => res.json()).then(data => applyImages(data, 'images')).catch(failImages).finally(finishLoading);
                } else {
                    fetch(`/api/content-library?type=image_material&${pageParam}${projectParam}`, opts).then(res => res.json()).then(data => applyImages(data, 'assets')).catch(failImages).finally(finishLoading);
                }
                return () => {
                    active = false;
                    controller.abort();
                };
            }, [sampleCategory, currentProjectId, samplePage]);

            const sizeError = useMemo(() => {
                if (size !== 'custom') return '';
                const width = Number(customWidth);
                const height = Number(customHeight);
                if (!width || !height) return '请输入自定义宽高';
                if (width % 16 !== 0 || height % 16 !== 0) return '宽高必须都能被 16 整除';
                if (width > 3840 || height > 2160) return '最大分辨率为 3840x2160';
                return '';
            }, [size, customWidth, customHeight]);

            const sampleTotalPages = Math.max(1, Math.ceil(sampleTotal / SAMPLE_PAGE_SIZE));
            const referenceCount = selectedSample.length + uploadedFiles.length;

            function switchSampleCategory(category) {
                setSampleCategory(category);
                setSamplePage(1);
            }

            function toggleSample(image) {
                if (!image?.url) return;
                setSelectedSample((prev) => {
                    if (prev.includes(image.url)) return prev.filter((url) => url !== image.url);
                    if (prev.length + uploadedFiles.length >= 16) {
                        setStatus('参考图最多 16 张');
                        return prev;
                    }
                    return prev.concat(image.url);
                });
            }

            function extractReferenceNames() {
                const matches = Array.from(prompt.matchAll(/@([^\s@，。！？,.!?；;：:、（）()【】\\[\\]{}]+)/g));
                return Array.from(new Set(matches.map((match) => match[1].trim()).filter(Boolean)));
            }

            function fileStem(filename) {
                return String(filename || '').replace(/\.[^.]+$/, '');
            }

            function bestFilenameMatch(items, name) {
                const normalizedName = String(name || '').toLowerCase();
                return (items || []).find((item) => fileStem(item.filename).toLowerCase() === normalizedName)
                    || (items || []).find((item) => String(item.filename || '').toLowerCase().includes(normalizedName));
            }

            async function autoSelectReferences() {
                const names = extractReferenceNames();
                if (names.length === 0) {
                    alert('提示词中未找到 @名字，例如：@徐获');
                    return;
                }
                const foundUrls = [];
                const missingNames = [];
                for (const name of names) {
                    const pageParam = `page=1&page_size=16`;
                    const projectParam = currentProjectId ? `&project_id=${currentProjectId}` : '';
                    const searchParam = `&search=${encodeURIComponent(name)}`;
                    const response = await fetch(`/api/content-library?type=image_material&${pageParam}${projectParam}${searchParam}`, { cache: 'no-store' });
                    const data = await response.json();
                    const match = data.success ? bestFilenameMatch(data.assets || [], name) : null;
                    if (match?.url) foundUrls.push(match.url);
                    else missingNames.push(name);
                }
                if (missingNames.length > 0) {
                    alert(`未在图片素材中找到对应图片，请上传文件名为 ${missingNames.join('、')} 的图片。`);
                }
                if (foundUrls.length > 0) {
                    setSelectedSample((prev) => {
                        const next = [...prev];
                        for (const url of foundUrls) {
                            if (next.includes(url)) continue;
                            if (next.length + uploadedFiles.length >= 16) break;
                            next.push(url);
                        }
                        return next;
                    });
                    setSampleCategory('image_material');
                    setStatus(`已自动选择 ${foundUrls.length} 张参考图`);
                }
            }

            function handleUploadFiles(fileList) {
                const files = Array.from(fileList || []);
                const allowedTypes = new Set(['image/png', 'image/webp', 'image/jpeg']);
                const nextItems = [];
                for (const file of files) {
                    if (!allowedTypes.has(file.type)) {
                        setStatus('上传参考图仅支持 png、webp、jpg');
                        continue;
                    }
                    if (selectedSample.length + uploadedFiles.length + nextItems.length >= 16) {
                        setStatus('参考图最多 16 张');
                        break;
                    }
                    nextItems.push({ file, preview: URL.createObjectURL(file) });
                }
                if (nextItems.length) setUploadedFiles((prev) => prev.concat(nextItems));
            }

            function removeUploaded(index) {
                setUploadedFiles((prev) => {
                    const target = prev[index];
                    if (target?.preview) URL.revokeObjectURL(target.preview);
                    return prev.filter((_, itemIndex) => itemIndex !== index);
                });
            }

            async function handleProjectChange(projectId) {
                const response = await fetch('/api/projects/switch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project_id: projectId })
                });
                const data = await response.json();
                if (data.success) window.location.reload();
            }

            async function handleSubmit(event) {
                event.preventDefault();
                if (!prompt.trim()) {
                    setStatus('提示词不能为空');
                    return;
                }
                if (sizeError) {
                    setStatus(sizeError);
                    return;
                }
                const count = Number(numImages) || 1;
                if (count > 10) {
                    setStatus('生成数量最大为 10');
                    return;
                }

                setLoading(true);
                setStatus(referenceCount > 0 ? '正在使用参考图编辑生成…' : '正在纯文本生成…');
                try {
                    const formData = new FormData();
                    formData.append('prompt', prompt);
                    formData.append('quality', quality);
                    formData.append('size', size);
                    formData.append('custom_width', customWidth);
                    formData.append('custom_height', customHeight);
                    formData.append('num_images', count);
                    selectedSample.forEach((url) => formData.append('reference_image_urls', url));
                    uploadedFiles.forEach((item) => formData.append('reference_images', item.file));
                    const response = await fetch('/api/image2/generate', { method: 'POST', body: formData });
                    const data = await response.json();
                    console.log('[image2][response]', data);
                    if (!response.ok || !data.success) throw new Error(data.error || data.message || '生成失败');
                    setImages(data.data.images || []);
                    setUsage(data.data.usage || { total_tokens: data.data.total_tokens || 0 });
                    setStatus(`生成成功：${(data.data.images || []).length} 张，接口：${data.data.endpoint}，Token：${data.data.total_tokens || 0}`);
                } catch (error) {
                    console.error('[image2][error]', error);
                    setStatus(error.message || '生成失败');
                } finally {
                    setLoading(false);
                }
            }

            return (
                <div className="app-shell">
                    <Sidebar
                        username={window.__APP_CONTEXT__?.username || 'user'}
                        projects={projects}
                        currentProjectId={currentProjectId}
                        onProjectChange={handleProjectChange}
                    />
                    <main className="main-content">
                        <div className="page-wrap">
                            <div className="page-header">
                                <div className="page-title">🖌️ Image2 生图</div>
                                <div className="react-shell-badge">gpt-image-2</div>
                            </div>
                            <div className="grid">
                                <div className="panel">
                                    <div className="panel-title">生成参数</div>
                                    <form className="panel-body" onSubmit={handleSubmit}>
                                        <div className="prompt-row">
                                            <textarea value={prompt} onChange={(event) => setPrompt(event.target.value)} placeholder="输入提示词..." required />
                                            <div style={{ display: 'grid', gap: '8px', flexShrink: 0 }}>
                                                <button className="btn btn-generate" type="submit" disabled={loading || Boolean(sizeError)}>{loading ? '生成中...' : '开始生成'}</button>
                                                <button className="btn btn-secondary" type="button" disabled={loading} onClick={autoSelectReferences}>调用参考图上</button>
                                            </div>
                                        </div>
                                        <div className="form-row three">
                                            <div>
                                                <label>图片质量</label>
                                                <select value={quality} onChange={(event) => setQuality(event.target.value)}>
                                                    {['standard', 'hd', 'low', 'medium', 'high', 'auto'].map((item) => <option key={item} value={item}>{item}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label>Size</label>
                                                <select value={size} onChange={(event) => setSize(event.target.value)}>
                                                    <option value="1024x1024">1024x1024</option>
                                                    <option value="1024x1536">1024x1536</option>
                                                    <option value="1536x1024">1536x1024</option>
                                                    <option value="custom">自定义</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label>生成数量</label>
                                                <input type="number" min="1" max="10" value={numImages} onChange={(event) => setNumImages(event.target.value)} />
                                            </div>
                                        </div>
                                        {size === 'custom' && (
                                            <div className="form-row two">
                                                <div>
                                                    <label>宽度</label>
                                                    <input type="number" min="16" max="3840" step="16" value={customWidth} onChange={(event) => setCustomWidth(event.target.value)} />
                                                </div>
                                                <div>
                                                    <label>高度</label>
                                                    <input type="number" min="16" max="2160" step="16" value={customHeight} onChange={(event) => setCustomHeight(event.target.value)} />
                                                </div>
                                            </div>
                                        )}
                                        <div className="small-hint">输出格式固定 JPEG；无参考图走 /images/generations，有参考图走 /images/edits。</div>
                                        {sizeError && <div className="small-hint" style={{ color: '#ff9aa2' }}>{sizeError}</div>}
                                        <div>
                                            <div className="panel-title" style={{ marginBottom: '6px' }}>参考图</div>
                                            <div className="upload-ref-thumbs">
                                                {selectedSample.map((url) => (
                                                    <div key={url} className="upload-ref-thumb">
                                                        <img src={url} alt="图库参考图" />
                                                        <button type="button" className="remove-ref-btn" onClick={() => toggleSample({ url })}>×</button>
                                                    </div>
                                                ))}
                                                {uploadedFiles.map((item, index) => (
                                                    <div key={`${item.file.name}-${index}`} className="upload-ref-thumb">
                                                        <img src={item.preview} alt={item.file.name} />
                                                        <button type="button" className="remove-ref-btn" onClick={() => removeUploaded(index)}>×</button>
                                                    </div>
                                                ))}
                                            </div>
                                            {referenceCount === 0 && <div className="small-hint">未选择参考图，可从右侧图库选择或上传</div>}
                                            <label style={{ marginTop: '12px', display: 'block' }}>上传参考图（最多 16 张，png/webp/jpg）</label>
                                            <input type="file" accept="image/png,image/webp,image/jpeg" multiple onChange={(event) => { handleUploadFiles(event.target.files); event.target.value = ''; }} />
                                        </div>
                                        {status && <div className="small-hint">{status}</div>}
                                        {usage && <div className="small-hint">Token 用量：{usage.total_tokens || 0}{usage.input_tokens != null ? ` / 输入 ${usage.input_tokens}` : ''}{usage.output_tokens != null ? ` / 输出 ${usage.output_tokens}` : ''}</div>}
                                    </form>
                                </div>

                                <div className="panel">
                                    <div className="panel-title">示例图库</div>
                                    <div className="form-row two">
                                        <button type="button" className={`btn ${sampleCategory === 'image_material' ? 'btn-primary' : 'btn-secondary'}`} disabled={sampleLoading} onClick={() => switchSampleCategory('image_material')}>图片素材</button>
                                        <button type="button" className={`btn ${sampleCategory === 'recent' ? 'btn-primary' : 'btn-secondary'}`} disabled={sampleLoading} onClick={() => switchSampleCategory('recent')}>最近生成</button>
                                    </div>
                                    <div className="sample-scroll" ref={sampleScrollRef}>
                                        <div className="sample-grid">
                                            {sampleLoading && <div className="small-hint">加载中...</div>}
                                            {!sampleLoading && sampleImages.length === 0 && <div className="small-hint">暂无图片</div>}
                                            {!sampleLoading && sampleImages.map((image, index) => (
                                                <div
                                                    key={image.id || image.key || image.url || index}
                                                    className={`sample-item ${selectedSample.includes(image.url) ? 'selected' : ''}`}
                                                    onClick={() => toggleSample(image)}
                                                >
                                                    <img src={image.url} alt={image.filename || 'sample'} loading="lazy" />
                                                    <div className="sample-filename" title={image.filename || ''}>{image.filename || '未命名图片'}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="sample-toolbar">
                                        <div className="small-hint">共 {sampleTotal} 张，每页 {SAMPLE_PAGE_SIZE} 张</div>
                                        <div className="sample-pagination">
                                            <button type="button" className="btn btn-secondary" disabled={samplePage <= 1 || sampleLoading} onClick={() => setSamplePage((page) => Math.max(1, page - 1))}>上一页</button>
                                            <div className="sample-page-status">{samplePage} / {sampleTotalPages}</div>
                                            <button type="button" className="btn btn-secondary" disabled={samplePage >= sampleTotalPages || sampleLoading} onClick={() => setSamplePage((page) => Math.min(sampleTotalPages, page + 1))}>下一页</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="panel" style={{ marginTop: '18px' }}>
                                <div className="panel-title">生成结果</div>
                                {images.length === 0 ? (
                                    <div className="small-hint">生成后的图片会以 URL 形式显示，并自动保存到图片库。</div>
                                ) : (
                                    <div className="results">
                                        {images.map((image, index) => (
                                            <div className="result-image" key={`${image.url}-${index}`}>
                                                <img src={image.url} alt={`生成图片 ${index + 1}`} />
                                                <div className="result-meta">
                                                    <span>{image.filename}</span>
                                                    <a href={image.url} target="_blank" rel="noreferrer">打开URL</a>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('reactApp'));
    </script>
    {% endraw %}
</body>
</html>
