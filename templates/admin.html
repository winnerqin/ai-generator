<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理 - Ai创作工具</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/sidebar-nav.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        .app-shell { display: flex; min-height: 100vh; }
        .main-content { padding: 0; flex: 1; min-width: 0; }
        .page-wrap { padding: 20px 24px 36px; }
        .page-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 16px; }
        .panel { border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .admin-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .admin-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
        .admin-input { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(86,111,255,0.3); background: rgba(11,15,26,0.6); color: #e6ebff; font-size: 0.9rem; min-width: 220px; }
        .admin-select { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(86,111,255,0.3); background: rgba(11,15,26,0.6); color: #e6ebff; font-size: 0.9rem; }
        .admin-table-wrap { overflow-x: auto; margin-top: 10px; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .admin-table th, .admin-table td { padding: 8px 10px; border: 1px solid rgba(86,111,255,0.25); text-align: left; vertical-align: top; }
        .admin-table th { background: rgba(86,111,255,0.15); font-weight: 600; }
        .tag { display: inline-block; padding: 2px 8px; margin: 2px 6px 2px 0; border-radius: 999px; border: 1px solid rgba(86,111,255,0.35); background: rgba(86,111,255,0.12); color: #c8d2ff; font-size: 0.78rem; }
    </style>
</head>
<body>
    <div id="reactApp"></div>
    <script>
        window.__APP_CONTEXT__ = { username: "{{ user.username }}", role_code: "{{ user.role_code or '' }}", is_system_admin: {{ 'true' if user.role_code == 'system_admin' or user.username == 'system_admin' else 'false' }} };
    </script>
    <script src="/static/vendor/react.production.min.js"></script>
    <script src="/static/vendor/react-dom.production.min.js"></script>
    <script src="/static/vendor/babel.min.js"></script>
    <script src="/static/sidebar-react.js"></script>
    <script src="/static/sidebar-nav.js"></script>
    {% raw %}
    <script type="text/babel">
        const { useEffect, useMemo, useState } = React;

        const Sidebar = (props) => <window.AppSidebar {...props} activePage="admin" />;

        function App() {
            const [projects, setProjects] = useState([]);
            const [currentProjectId, setCurrentProjectId] = useState('');

            const [users, setUsers] = useState([]);
            const [projectsAdmin, setProjectsAdmin] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const [newUsername, setNewUsername] = useState('');
            const [newPassword, setNewPassword] = useState('');
            const [newRoleCode, setNewRoleCode] = useState('external_user');
            const [newProjectName, setNewProjectName] = useState('');
            const [assignUserByProject, setAssignUserByProject] = useState({});
            const [editRoleByUser, setEditRoleByUser] = useState({});
            const [modelPricingList, setModelPricingList] = useState([]);
            const [newModelCode, setNewModelCode] = useState('');
            const [newModelName, setNewModelName] = useState('');
            const [newModelCurrency, setNewModelCurrency] = useState('CNY');
            const [newModelResolution, setNewModelResolution] = useState('');
            const [newModelRefMode, setNewModelRefMode] = useState('any');
            const [newModelPriceYuan, setNewModelPriceYuan] = useState('');
            const [newModelEnabled, setNewModelEnabled] = useState(true);
            const [editingPricing, setEditingPricing] = useState(null);
            const [editModelName, setEditModelName] = useState('');
            const [editModelCurrency, setEditModelCurrency] = useState('CNY');
            const [editModelResolution, setEditModelResolution] = useState('');
            const [editModelRefMode, setEditModelRefMode] = useState('any');
            const [editModelPriceYuan, setEditModelPriceYuan] = useState('');
            const [editModelEnabled, setEditModelEnabled] = useState(true);

            useEffect(() => {
                document.body.classList.add('react-theme', 'sidebar-compact');
            }, []);

            useEffect(() => {
                fetch('/api/projects').then(res => res.json()).then(data => {
                    if (data.success) {
                        setProjects(data.projects || []);
                        setCurrentProjectId(String(data.current_project_id || ''));
                    }
                });
            }, []);

            const refresh = async () => {
                setLoading(true);
                setError('');
                try {
                    const [uRes, pRes] = await Promise.all([
                        fetch('/api/admin/users'),
                        fetch('/api/admin/projects')
                    ]);
                    const [uData, pData] = await Promise.all([uRes.json(), pRes.json()]);
                    if (!uData.success) throw new Error(uData.error || '加载用户失败');
                    if (!pData.success) throw new Error(pData.error || '加载项目失败');
                    setUsers(uData.users || []);
                    setProjectsAdmin(pData.projects || []);
                    const roleMap = {};
                    (uData.users || []).forEach((u) => {
                        roleMap[String(u.id)] = u.role_code || 'external_user';
                    });
                    setEditRoleByUser(roleMap);
                    const pricingResp = await fetch('/api/admin/model-pricing');
                    const pricingData = await pricingResp.json();
                    if (pricingData.success) {
                        setModelPricingList(pricingData.items || []);
                    }
                } catch (e) {
                    setError(e.message || '加载失败');
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { refresh(); }, []);

            useEffect(() => {
                const next = {};
                projectsAdmin.forEach(p => {
                    const key = String(p.id);
                    const current = assignUserByProject[key];
                    if (current) next[key] = current;
                    else if (users.length > 0) next[key] = String(users[0].id);
                    else next[key] = '';
                });
                setAssignUserByProject(next);
            }, [projectsAdmin, users]);

            const onProjectChange = async (pid) => {
                const r = await fetch('/api/projects/switch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project_id: pid })
                });
                const d = await r.json();
                if (d.success) window.location.reload();
            };

            const createUser = async () => {
                const username = (newUsername || '').trim();
                const password = newPassword || '';
                if (!username || !password) { setError('请输入用户名和初始密码'); return; }
                setError('');
                const resp = await fetch('/api/admin/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role_code: newRoleCode })
                });
                const data = await resp.json();
                if (!data.success) { setError(data.error || '创建失败'); return; }
                setNewUsername(''); setNewPassword(''); setNewRoleCode('external_user');
                refresh();
            };

            const deleteUser = async (userId) => {
                if (!confirm('确定删除该用户吗？')) return;
                const resp = await fetch(`/api/admin/users/${userId}`, { method: 'DELETE' });
                const data = await resp.json();
                if (!data.success) { setError(data.error || '删除失败'); return; }
                refresh();
            };

            const resetPassword = async (userId) => {
                const password = prompt('请输入新密码');
                if (!password) return;
                const resp = await fetch(`/api/admin/users/${userId}/password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await resp.json();
                if (!data.success) { setError(data.error || '修改失败'); return; }
                alert('密码已更新');
            };

            const adjustBalance = async (user) => {
                if ((user.role_code || 'external_user') !== 'external_user') {
                    setError('仅外部用户支持手动余额加减');
                    return;
                }
                const raw = prompt('请输入调整金额（元，可正可负，例如 100 或 -20）');
                if (raw == null) return;
                const amountYuan = Number(raw);
                if (!Number.isFinite(amountYuan) || amountYuan === 0) {
                    setError('金额格式错误');
                    return;
                }
                const amountCent = Math.round(amountYuan * 100);
                const resp = await fetch(`/api/admin/users/${user.id}/recharge`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount_cent: amountCent })
                });
                const data = await resp.json();
                if (!data.success) { setError(data.error || '余额调整失败'); return; }
                refresh();
            };

            const updateUserRole = async (userId) => {
                const roleCode = editRoleByUser[String(userId)];
                if (!roleCode) return;
                const resp = await fetch(`/api/admin/users/${userId}/role`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role_code: roleCode })
                });
                const data = await resp.json();
                if (!data.success) { setError(data.error || '角色更新失败'); return; }
                refresh();
            };

            const createProject = async () => {
                const name = (newProjectName || '').trim();
                if (!name) { setError('请输入项目名称'); return; }
                const resp = await fetch('/api/admin/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const data = await resp.json();
                if (!data.success) { setError(data.error || '创建失败'); return; }
                setNewProjectName('');
                refresh();
            };

            const assignUser = async (projectId) => {
                const uid = assignUserByProject[String(projectId)];
                if (!uid) return;
                const resp = await fetch(`/api/admin/projects/${projectId}/assign`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: uid })
                });
                const data = await resp.json();
                if (!data.success) { setError(data.error || '授权失败'); return; }
                refresh();
            };

            const revokeUser = async (projectId) => {
                const uid = assignUserByProject[String(projectId)];
                if (!uid) return;
                const resp = await fetch(`/api/admin/projects/${projectId}/revoke`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: uid })
                });
                const data = await resp.json();
                if (!data.success) { setError(data.error || '移除失败'); return; }
                refresh();
            };

            const deleteProject = async (projectId, projectName) => {
                if (!confirm(`确定删除项目“${projectName || projectId}”吗？该操作不可恢复。`)) return;
                const resp = await fetch(`/api/projects/${projectId}`, { method: 'DELETE' });
                const data = await resp.json();
                if (!data.success) { setError(data.error || '删除项目失败'); return; }
                refresh();
            };

            const createModelPricing = async () => {
                const modelCode = (newModelCode || '').trim();
                const modelName = (newModelName || '').trim();
                const priceYuan = Number(newModelPriceYuan);
                if (!modelCode || !modelName || !Number.isFinite(priceYuan) || priceYuan <= 0) {
                    setError('请填写完整且有效的模型价格信息');
                    return;
                }
                const resp = await fetch('/api/admin/model-pricing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model_code: modelCode,
                        model_name: modelName,
                        currency_code: newModelCurrency,
                        resolution_code: (newModelResolution || '').trim().toLowerCase(),
                        reference_video_mode: newModelRefMode,
                        price_per_million_token_cent: Math.round(priceYuan * 100),
                        enabled: !!newModelEnabled,
                    }),
                });
                const data = await resp.json();
                if (!data.success) { setError(data.error || '模型价格保存失败'); return; }
                setNewModelCode('');
                setNewModelName('');
                setNewModelCurrency('CNY');
                setNewModelResolution('');
                setNewModelRefMode('any');
                setNewModelPriceYuan('');
                setNewModelEnabled(true);
                refresh();
            };

            const openEditPricing = (item) => {
                setEditingPricing(item);
                setEditModelName(item.model_name || '');
                setEditModelCurrency(item.currency_code || 'CNY');
                setEditModelResolution(item.resolution_code || '');
                setEditModelRefMode(item.reference_video_mode || 'any');
                setEditModelPriceYuan(((Number(item.price_per_million_token_cent || 0)) / 100).toFixed(2));
                setEditModelEnabled(!!item.enabled);
            };

            const closeEditPricing = () => {
                setEditingPricing(null);
            };

            const updateModelPricing = async () => {
                if (!editingPricing) return;
                const modelName = (editModelName || '').trim();
                const priceYuan = Number(editModelPriceYuan);
                if (!modelName || !Number.isFinite(priceYuan) || priceYuan <= 0) {
                    setError('请填写有效的模型价格信息');
                    return;
                }
                const resp = await fetch(`/api/admin/model-pricing/${editingPricing.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model_name: modelName,
                        currency_code: editModelCurrency,
                        resolution_code: (editModelResolution || '').trim().toLowerCase(),
                        reference_video_mode: editModelRefMode,
                        price_per_million_token_cent: Math.round(priceYuan * 100),
                        enabled: !!editModelEnabled,
                    }),
                });
                const data = await resp.json();
                if (!data.success) { setError(data.error || '模型价格更新失败'); return; }
                closeEditPricing();
                refresh();
            };

            return (
                <div className="app-shell">
                    <Sidebar
                        username={window.__APP_CONTEXT__?.username || 'system_admin'}
                        projects={projects}
                        currentProjectId={currentProjectId}
                        onProjectChange={onProjectChange}
                    />
                    <div className="main-content">
                        <div className="page-wrap">
                            <div className="page-title">🛠️ 系统管理</div>
                            {error && <div className="small-hint" style={{ color: '#ff9aa2', marginBottom: 12 }}>{error}</div>}

                            <div className="panel admin-grid">
                                <div>
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, flexWrap: 'wrap' }}>
                                        <div style={{ fontWeight: 700 }}>用户管理</div>
                                        <button className="btn-export" type="button" onClick={refresh} disabled={loading}>{loading ? '刷新中...' : '刷新'}</button>
                                    </div>
                                    <div className="admin-actions" style={{ marginTop: 10 }}>
                                        <input className="admin-input" value={newUsername} onChange={(e) => setNewUsername(e.target.value)} placeholder="用户名" />
                                        <input className="admin-input" type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} placeholder="初始密码" />
                                        <select className="admin-select" value={newRoleCode} onChange={(e) => setNewRoleCode(e.target.value)}>
                                            <option value="external_user">外部用户</option>
                                            <option value="internal_user">内部用户</option>
                                            <option value="system_admin">系统管理员</option>
                                        </select>
                                        <button className="btn-convert" type="button" onClick={createUser} disabled={loading}>添加用户</button>
                                    </div>
                                    <div className="admin-table-wrap">
                                        <table className="admin-table">
                                            <thead>
                                                <tr>
                                                    <th style={{ width: 80 }}>ID</th>
                                                    <th>用户名</th>
                                                    <th>角色</th>
                                                    <th>余额(元)</th>
                                                    <th>创建时间</th>
                                                    <th>最后登录</th>
                                                    <th style={{ width: 360 }}>操作</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {users.length === 0 ? (
                                                    <tr><td colSpan="7" className="small-hint">暂无用户</td></tr>
                                                ) : users.map(u => (
                                                    <tr key={u.id}>
                                                        <td>{u.id}</td>
                                                        <td>{u.username}</td>
                                                        <td>
                                                            <select
                                                                className="admin-select"
                                                                value={editRoleByUser[String(u.id)] || (u.role_code || 'external_user')}
                                                                onChange={(e) => setEditRoleByUser(prev => ({ ...prev, [String(u.id)]: e.target.value }))}
                                                            >
                                                                <option value="external_user">外部用户</option>
                                                                <option value="internal_user">内部用户</option>
                                                                <option value="system_admin">系统管理员</option>
                                                            </select>
                                                        </td>
                                                        <td>{((Number(u.balance_cent || 0)) / 100).toFixed(2)}</td>
                                                        <td>{u.created_at || '-'}</td>
                                                        <td>{u.last_login || '-'}</td>
                                                        <td>
                                                            <button type="button" className="btn-export" onClick={() => updateUserRole(u.id)}>改角色</button>
                                                            <button type="button" className="btn-export" style={{ marginLeft: 6 }} onClick={() => adjustBalance(u)}>调余额</button>
                                                            <button type="button" className="btn-export" onClick={() => resetPassword(u.id)}>改密码</button>
                                                            <button type="button" className="btn-export" style={{ marginLeft: 6, color: '#ff9aa2', borderColor: 'rgba(255,120,120,0.5)' }} onClick={() => deleteUser(u.id)}>删除</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div>
                                    <div style={{ fontWeight: 700 }}>项目管理</div>
                                    <div className="admin-actions" style={{ marginTop: 10 }}>
                                        <input className="admin-input" value={newProjectName} onChange={(e) => setNewProjectName(e.target.value)} placeholder="项目名称" />
                                        <button className="btn-convert" type="button" onClick={createProject} disabled={loading}>创建项目</button>
                                    </div>
                                    <div className="admin-table-wrap">
                                        <table className="admin-table">
                                            <thead>
                                                <tr>
                                                    <th style={{ width: 80 }}>ID</th>
                                                    <th>项目名称</th>
                                                    <th>成员</th>
                                                    <th style={{ width: 340 }}>授权</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {projectsAdmin.length === 0 ? (
                                                    <tr><td colSpan="4" className="small-hint">暂无项目</td></tr>
                                                ) : projectsAdmin.map(p => (
                                                    <tr key={p.id}>
                                                        <td>{p.id}</td>
                                                        <td>{p.name}</td>
                                                        <td>
                                                            {(p.users || []).length === 0 ? (
                                                                <span className="small-hint">-</span>
                                                            ) : (p.users || []).map(u => <span key={u.id} className="tag">{u.username}</span>)}
                                                        </td>
                                                        <td>
                                                            <div className="admin-actions" style={{ marginBottom: 0 }}>
                                                                <select
                                                                    className="admin-select"
                                                                    value={assignUserByProject[String(p.id)] || ''}
                                                                    onChange={(e) => setAssignUserByProject(prev => ({ ...prev, [String(p.id)]: e.target.value }))}
                                                                >
                                                                    {users.map(u => <option key={u.id} value={u.id}>{u.username}</option>)}
                                                                </select>
                                                                <button type="button" className="btn-export" onClick={() => assignUser(p.id)}>授权</button>
                                                                <button type="button" className="btn-export" style={{ color: '#ff9aa2', borderColor: 'rgba(255,120,120,0.5)' }} onClick={() => revokeUser(p.id)}>移除</button>
                                                                <button type="button" className="btn-export" style={{ color: '#ff9aa2', borderColor: 'rgba(255,120,120,0.5)' }} onClick={() => deleteProject(p.id, p.name)}>删除项目</button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div>
                                    <div style={{ fontWeight: 700 }}>模型价格管理</div>
                                    <div className="admin-actions" style={{ marginTop: 10 }}>
                                        <input className="admin-input" value={newModelCode} onChange={(e) => setNewModelCode(e.target.value)} placeholder="模型编码（如 doubao-seedance-2-0-260128）" />
                                        <input className="admin-input" value={newModelName} onChange={(e) => setNewModelName(e.target.value)} placeholder="模型名称" />
                                        <select className="admin-select" value={newModelCurrency} onChange={(e) => setNewModelCurrency(e.target.value)}>
                                            <option value="CNY">CNY</option>
                                            <option value="USD">USD</option>
                                        </select>
                                        <input className="admin-input" value={newModelResolution} onChange={(e) => setNewModelResolution(e.target.value)} placeholder="分辨率（如 720p / 1080p，空=任意）" />
                                        <select className="admin-select" value={newModelRefMode} onChange={(e) => setNewModelRefMode(e.target.value)}>
                                            <option value="any">任意参考素材</option>
                                            <option value="with_video_ref">含视频参考素材</option>
                                            <option value="without_video_ref">不含视频参考素材</option>
                                        </select>
                                        <input className="admin-input" type="number" min="0" step="0.01" value={newModelPriceYuan} onChange={(e) => setNewModelPriceYuan(e.target.value)} placeholder="价格/百万Token（按币种）" />
                                        <label className="small-hint" style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                                            <input type="checkbox" checked={newModelEnabled} onChange={(e) => setNewModelEnabled(e.target.checked)} />
                                            启用
                                        </label>
                                        <button className="btn-convert" type="button" onClick={createModelPricing}>新增/保存</button>
                                    </div>
                                    <div className="admin-table-wrap">
                                        <table className="admin-table">
                                            <thead>
                                                <tr>
                                                    <th>ID</th>
                                                    <th>模型编码</th>
                                                    <th>模型名称</th>
                                                    <th>币种</th>
                                                    <th>分辨率</th>
                                                    <th>参考素材</th>
                                                    <th>价格/百万Token</th>
                                                    <th>启用</th>
                                                    <th>操作</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {modelPricingList.length === 0 ? (
                                                    <tr><td colSpan="9" className="small-hint">暂无模型价格配置</td></tr>
                                                ) : modelPricingList.map(item => (
                                                    <tr key={item.id}>
                                                        <td>{item.id}</td>
                                                        <td>{item.model_code}</td>
                                                        <td>{item.model_name}</td>
                                                        <td>{item.currency_code || 'CNY'}</td>
                                                        <td>{item.resolution_code || '任意'}</td>
                                                        <td>{item.reference_video_mode === 'with_video_ref' ? '含视频参考素材' : item.reference_video_mode === 'without_video_ref' ? '不含视频参考素材' : '任意'}</td>
                                                        <td>{((Number(item.price_per_million_token_cent || 0)) / 100).toFixed(2)}</td>
                                                        <td>{item.enabled ? '是' : '否'}</td>
                                                        <td>
                                                            <button type="button" className="btn-export" onClick={() => openEditPricing(item)}>编辑</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                    {editingPricing ? (
                        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999 }}>
                            <div className="panel" style={{ width: 'min(680px, 92vw)', marginBottom: 0 }}>
                                <div style={{ fontWeight: 700, marginBottom: 12 }}>编辑模型价格：{editingPricing.model_code}</div>
                                <div className="admin-actions">
                                    <input className="admin-input" value={editModelName} onChange={(e) => setEditModelName(e.target.value)} placeholder="模型名称" />
                                    <select className="admin-select" value={editModelCurrency} onChange={(e) => setEditModelCurrency(e.target.value)}>
                                        <option value="CNY">CNY</option>
                                        <option value="USD">USD</option>
                                    </select>
                                    <input className="admin-input" value={editModelResolution} onChange={(e) => setEditModelResolution(e.target.value)} placeholder="分辨率（空=任意）" />
                                    <select className="admin-select" value={editModelRefMode} onChange={(e) => setEditModelRefMode(e.target.value)}>
                                        <option value="any">任意参考素材</option>
                                        <option value="with_video_ref">含视频参考素材</option>
                                        <option value="without_video_ref">不含视频参考素材</option>
                                    </select>
                                    <input className="admin-input" type="number" min="0" step="0.01" value={editModelPriceYuan} onChange={(e) => setEditModelPriceYuan(e.target.value)} placeholder="价格/百万Token（按币种）" />
                                    <label className="small-hint" style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                                        <input type="checkbox" checked={editModelEnabled} onChange={(e) => setEditModelEnabled(e.target.checked)} />
                                        启用
                                    </label>
                                </div>
                                <div className="admin-actions" style={{ justifyContent: 'flex-end', marginTop: 12 }}>
                                    <button type="button" className="btn-export" onClick={closeEditPricing}>取消</button>
                                    <button type="button" className="btn-convert" onClick={updateModelPricing}>保存修改</button>
                                </div>
                            </div>
                        </div>
                    ) : null}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('reactApp')).render(<App />);
    </script>
    {% endraw %}
</body>
</html>
