<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理 - Ai创作工具</title>
    <script src="/static/state-manager.js"></script>
    <link rel="stylesheet" href="/static/sidebar-nav.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 2000px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .content {
            padding: 30px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: 1em;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab:hover {
            color: #28a745; /* 绿色 */
        }
        
        .tab.active {
            color: #28a745; /* 绿色 */
            border-bottom-color: #28a745;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .upload-section {
            background: #f8f9fa;
            border: 2px dashed #28a745; /* 绿色 */
            border-radius: 8px;
            padding: 15px 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
        }
        
        .upload-section.show {
            display: block;
        }
        
        .upload-section:hover {
            background: #f0f9f4;
            border-color: #218838;
        }
        
        .upload-icon {
            font-size: 2em;
            margin-bottom: 8px;
        }
        
        .upload-text {
            font-size: 0.95em;
            color: #333;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            color: #666;
            font-size: 0.9em;
        }
        
        .upload-input {
            display: none;
        }
        
        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #28a745; /* 绿色 */
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
            background: #218838;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .btn-danger:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .search-box {
            flex: 1;
            max-width: 300px;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .stats {
            margin-left: auto;
            display: flex;
            gap: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .stats span {
            color: #28a745; /* 绿色 */
        }
        
        .assets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .asset-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
        }
        
        .asset-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-color: #28a745; /* 绿色 */
        }
        
        .asset-card.selected {
            border-color: #28a745; /* 绿色 */
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.3);
        }
        
        .asset-checkbox {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            z-index: 10;
        }
        
        .asset-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%;
            overflow: hidden;
            background: #f0f0f0;
        }
        
        .asset-wrapper img,
        .asset-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }
        
        .asset-wrapper video {
            background: #000;
        }
        
        .video-play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        
        .asset-info {
            padding: 12px;
            background: #f8f9fa;
        }
        
        .asset-name {
            font-size: 0.85em;
            color: #333;
            margin-bottom: 5px;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .asset-actions {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }
        
        .asset-btn {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 4px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .asset-btn-preview {
            background: #28a745; /* 绿色 */
            color: white;
        }
        
        .asset-btn-preview:hover {
            background: #218838;
        }
        
        .asset-btn-download {
            background: #28a745;
            color: white;
        }
        
        .asset-btn-download:hover {
            background: #218838;
        }
        
        .btn-success {
            background: #1e3a5f; /* 深蓝色 */
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            margin-right: 8px;
        }
        
        .btn-success:hover {
            background: #2a4f7a;
        }
        
        .btn-info {
            background: #28a745; /* 绿色 */
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            margin-right: 8px;
        }
        
        .btn-info:hover {
            background: #218838;
        }
        
        .btn-info:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        
        .asset-btn-delete {
            background: #dc3545;
            color: white;
        }
        
        .asset-btn-delete:hover {
            background: #c82333;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2em;
            color: #666;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #28a745; /* 绿色 */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }
        
        .empty-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }
        
        /* 预览模态框 */
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        
        .preview-modal.active {
            display: flex;
        }
        
        .preview-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .preview-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .preview-nav:hover {
            background: rgba(255,255,255,0.4);
        }
        
        .preview-nav.prev {
            left: 20px;
        }
        
        .preview-nav.next {
            right: 20px;
        }
        
        .preview-media {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
        }
        
        .preview-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 36px;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .preview-close:hover {
            background: rgba(0,0,0,0.8);
        }
        
        .preview-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-align: center;
            min-width: 300px;
        }
        
        .preview-counter {
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <!-- 左侧导航栏 -->
    <nav class="sidebar-nav" id="sidebarNav">
        <div class="sidebar-nav-header">
            <div class="sidebar-nav-title">Ai创作工具</div>
            <button class="sidebar-nav-toggle" onclick="toggleSidebar()" title="收缩/展开">
                <span id="toggleIcon">‹</span>
            </button>
        </div>
        <div class="sidebar-nav-menu">
            <a href="/" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🎨</span>
                <span class="sidebar-nav-text">单图生成</span>
            </a>
            <a href="/batch" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📦</span>
                <span class="sidebar-nav-text">批量生成</span>
            </a>
            <a href="/records" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📊</span>
                <span class="sidebar-nav-text">生图任务</span>
            </a>
            <a href="/video-generate" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🎬</span>
                <span class="sidebar-nav-text">视频生成</span>
            </a>
            <a href="/video-tasks" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📹</span>
                <span class="sidebar-nav-text">视频任务</span>
            </a>
            <a href="/script-analysis" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🎬</span>
                <span class="sidebar-nav-text">剧本分析</span>
            </a>
            <a href="/content-management" class="sidebar-nav-item active">
                <span class="sidebar-nav-icon">📚</span>
                <span class="sidebar-nav-text">内容管理</span>
            </a>
            {% if user.username == 'system_admin' %}
            <div class="sidebar-nav-divider"></div>
            <a href="/stats" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📈</span>
                <span class="sidebar-nav-text">系统统计</span>
            </a>
            {% endif %}
        </div>
        <div class="sidebar-nav-user">
            <div class="sidebar-nav-user-info">
                <div class="sidebar-nav-user-avatar">👤</div>
                <div class="sidebar-nav-user-name">{{ user.username }}</div>
            </div>
            <a href="/logout" class="sidebar-nav-logout">登出</a>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="container">
        <div class="content">
            <h1 style="margin-bottom: 20px; color: #28a745;">📚 内容管理</h1>
            
            <!-- 标签页 -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('person')">👤 人物库</button>
                <button class="tab" onclick="switchTab('scene')">🌆 场景库</button>
                <button class="tab" onclick="switchTab('image')">🖼️ 图片库</button>
                <button class="tab" onclick="switchTab('video')">🎬 视频库</button>
            </div>
            
            <!-- 上传区域（仅人物库和场景库显示） -->
            <div class="upload-section" id="uploadSection" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📤</div>
                <div class="upload-text">点击上传或拖拽图片到这里</div>
                <div class="upload-hint">支持 JPG, PNG, WEBP 格式，建议不超过 5MB，可一次选择多张图片</div>
                <input type="file" id="fileInput" class="upload-input" multiple accept="image/*" onchange="handleFileSelect(event)" style="display: none;">
            </div>
            
            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索资源名称..." oninput="filterAssets()">
                </div>
                <div class="date-filter" style="display: flex; gap: 10px; align-items: center;">
                    <input type="date" id="startDateFilter" placeholder="开始日期" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px;" onchange="filterAssets()">
                    <span>至</span>
                    <input type="date" id="endDateFilter" placeholder="结束日期" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px;" onchange="filterAssets()">
                    <button class="btn btn-secondary" onclick="clearDateFilter()" style="padding: 8px 12px;">清除日期</button>
                </div>
                <button class="btn btn-primary" onclick="loadAssets()">🔄 刷新</button>
                <!-- 图片库的"添加到"按钮 -->
                <div id="addToLibraryButtons" style="display: none;">
                    <button class="btn btn-success" id="addToPersonBtn" onclick="addSelectedToLibrary('person')" style="display: none;">
                        👤 添加到人物库
                    </button>
                    <button class="btn btn-success" id="addToSceneBtn" onclick="addSelectedToLibrary('scene')" style="display: none;">
                        🏙️ 添加到场景库
                    </button>
                </div>
                <!-- 视频库和图片库的批量下载按钮 -->
                <button class="btn btn-info" id="downloadSelectedBtn" onclick="downloadSelected()" disabled style="display: none;">
                    ⬇️ 批量下载 (<span id="selectedCount">0</span>)
                </button>
                <button class="btn btn-danger" id="deleteSelectedBtn" onclick="deleteSelected()" disabled>
                    🗑️ 删除选中 (<span id="selectedCount">0</span>)
                </button>
                <div class="stats">
                    总计: <span id="totalCount">0</span> 个
                </div>
            </div>
            
            <!-- 加载状态 -->
            <div class="loading" id="loadingArea">
                <div class="spinner"></div>
                <div>加载中...</div>
            </div>
            
            <!-- 空状态 -->
            <div class="empty-state" id="emptyArea" style="display: none;">
                <div class="empty-icon">📭</div>
                <h3>暂无资源</h3>
                <p id="emptyMessage">还没有任何资源</p>
            </div>
            
            <!-- 资源网格 -->
            <div class="assets-grid" id="assetsGrid"></div>
        </div>
    </div>
    
    <!-- 预览模态框 -->
    <div class="preview-modal" id="previewModal" onclick="closePreview(event)">
        <button class="preview-nav prev" onclick="prevAsset(event)">‹</button>
        <button class="preview-nav next" onclick="nextAsset(event)">›</button>
        <div class="preview-close" onclick="closePreview(event)">&times;</div>
        <div class="preview-content">
            <img id="previewImage" class="preview-media" src="" alt="" style="display: none;">
            <video id="previewVideo" class="preview-media" controls style="display: none;"></video>
            <div class="preview-info">
                <div id="previewFilename"></div>
                <div class="preview-counter" id="previewCounter"></div>
            </div>
        </div>
    </div>
    
    <script>
        let currentTab = 'person';
        let allAssets = [];
        let filteredAssets = [];
        let selectedAssets = new Set();
        let currentPreviewIndex = -1;
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadAssets();
            
            // 初始更新UI状态
            updateSelectionUI();
            
            // 拖拽上传
            const uploadSection = document.getElementById('uploadSection');
            uploadSection.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadSection.style.background = '#e8eaff';
            });
            uploadSection.addEventListener('dragleave', () => {
                uploadSection.style.background = '#f8f9fa';
            });
            uploadSection.addEventListener('drop', async (e) => {
                e.preventDefault();
                uploadSection.style.background = '#f8f9fa';
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    // 创建临时文件输入来触发上传
                    const fileInput = document.getElementById('fileInput');
                    const dataTransfer = new DataTransfer();
                    for (let i = 0; i < files.length; i++) {
                        dataTransfer.items.add(files[i]);
                    }
                    fileInput.files = dataTransfer.files;
                    await handleFileSelect({target: {files: files}});
                }
            });
            
            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                const modal = document.getElementById('previewModal');
                if (modal && modal.classList.contains('active')) {
                    if (e.key === 'ArrowLeft') {
                        prevAsset(e);
                    } else if (e.key === 'ArrowRight') {
                        nextAsset(e);
                    } else if (e.key === 'Escape') {
                        closePreview(e);
                    }
                }
            });
            
            // 初始更新UI状态
            updateSelectionUI();
        });
        
        // 切换标签页
        function switchTab(tab) {
            currentTab = tab;
            
            // 更新标签样式
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // 显示/隐藏上传区域
            const uploadSection = document.getElementById('uploadSection');
            if (tab === 'person' || tab === 'scene') {
                uploadSection.classList.add('show');
            } else {
                uploadSection.classList.remove('show');
            }
            
            // 清空选择
            selectedAssets.clear();
            updateSelectionUI();
            
            // 加载资源
            loadAssets();
        }
        
        // 加载资源列表
        async function loadAssets() {
            const loading = document.getElementById('loadingArea');
            const empty = document.getElementById('emptyArea');
            const grid = document.getElementById('assetsGrid');
            
            loading.style.display = 'block';
            empty.style.display = 'none';
            grid.innerHTML = '';
            
            try {
                const response = await fetch(`/api/content-library?type=${currentTab}`);
                const data = await response.json();
                
                if (data.success) {
                    allAssets = data.assets || [];
                    filteredAssets = [...allAssets];
                    
                    document.getElementById('totalCount').textContent = allAssets.length;
                    
                    // 更新空状态消息
                    const emptyMessages = {
                        'person': '还没有上传人物图片',
                        'scene': '还没有上传场景图片',
                        'image': '还没有生成的图片',
                        'video': '还没有生成的视频'
                    };
                    document.getElementById('emptyMessage').textContent = emptyMessages[currentTab] || '还没有任何资源';
                    
                    if (allAssets.length === 0) {
                        empty.style.display = 'block';
                    } else {
                        renderAssets();
                    }
                } else {
                    alert('加载失败: ' + data.error);
                }
            } catch (error) {
                console.error('加载资源失败:', error);
                alert('加载失败: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }
        
        // 渲染资源网格
        function renderAssets() {
            const grid = document.getElementById('assetsGrid');
            grid.innerHTML = '';
            
            filteredAssets.forEach((asset, index) => {
                const card = document.createElement('div');
                card.className = 'asset-card';
                const assetId = asset.id || asset.key || `asset_${index}`;
                
                if (selectedAssets.has(assetId)) {
                    card.classList.add('selected');
                }
                
                const isVideo = currentTab === 'video' || asset.url.match(/\.(mp4|webm|mov)$/i);
                const mediaTag = isVideo 
                    ? `<video src="${asset.url}" preload="metadata"></video><div class="video-play-icon">▶</div>`
                    : `<img src="${asset.url}" alt="${asset.filename}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%2250%22 font-size=%2215%22%3E加载失败%3C/text%3E%3C/svg%3E'">`;
                
                // 所有标签页都支持预览，图片库和视频库额外显示下载按钮
                const showDownload = (currentTab === 'video' || currentTab === 'image');
                const actionButton = showDownload 
                    ? `<button class="asset-btn asset-btn-download" onclick="event.stopPropagation(); downloadAsset('${asset.url}', '${asset.filename}')">
                           ⬇️ 下载
                       </button>`
                    : `<button class="asset-btn asset-btn-preview" onclick="event.stopPropagation(); previewAsset(${index})">
                           👁️ 预览
                       </button>`;
                
                // 格式化时间显示
                const createdAt = asset.created_at || '';
                let timeDisplay = '';
                if (createdAt) {
                    try {
                        const date = new Date(createdAt);
                        if (!isNaN(date.getTime())) {
                            timeDisplay = date.toLocaleString('zh-CN', {
                                year: 'numeric',
                                month: '2-digit',
                                day: '2-digit',
                                hour: '2-digit',
                                minute: '2-digit'
                            });
                        } else {
                            timeDisplay = createdAt;
                        }
                    } catch (e) {
                        timeDisplay = createdAt;
                    }
                } else {
                    timeDisplay = '-';
                }
                
                card.innerHTML = `
                    <input type="checkbox" class="asset-checkbox" 
                           onchange="toggleSelection('${assetId}', this.checked)"
                           ${selectedAssets.has(assetId) ? 'checked' : ''}>
                    <div class="asset-wrapper" onclick="previewAsset(${index})">
                        ${mediaTag}
                    </div>
                    <div class="asset-info">
                        <div class="asset-name" title="${asset.filename}">${asset.filename}</div>
                        <div class="asset-time" style="font-size: 0.85em; color: #666; margin-top: 4px;">${timeDisplay}</div>
                        <div class="asset-actions">
                            ${actionButton}
                            <button class="asset-btn asset-btn-delete" onclick="deleteAsset('${assetId}', '${asset.filename}')">
                                🗑️ 删除
                            </button>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        // 过滤资源
        function filterAssets() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const startDate = document.getElementById('startDateFilter').value;
            const endDate = document.getElementById('endDateFilter').value;
            
            filteredAssets = allAssets.filter(asset => {
                // 名称过滤
                if (searchTerm && !asset.filename.toLowerCase().includes(searchTerm)) {
                    return false;
                }
                
                // 日期过滤
                if (startDate || endDate) {
                    const createdAt = asset.created_at || '';
                    if (!createdAt) {
                        return false; // 如果没有创建时间，不显示
                    }
                    
                    try {
                        const assetDate = new Date(createdAt);
                        if (isNaN(assetDate.getTime())) {
                            return false; // 无效日期，不显示
                        }
                        
                        const assetDateStr = assetDate.toISOString().split('T')[0];
                        
                        if (startDate && assetDateStr < startDate) {
                            return false;
                        }
                        if (endDate && assetDateStr > endDate) {
                            return false;
                        }
                    } catch (e) {
                        return false; // 日期解析失败，不显示
                    }
                }
                
                return true;
            });
            
            renderAssets();
        }
        
        // 清除日期过滤
        function clearDateFilter() {
            document.getElementById('startDateFilter').value = '';
            document.getElementById('endDateFilter').value = '';
            filterAssets();
        }
        
        // 切换选择
        function toggleSelection(assetId, checked) {
            if (checked) {
                selectedAssets.add(assetId);
            } else {
                selectedAssets.delete(assetId);
            }
            
            updateSelectionUI();
        }
        
        // 更新选择UI
        function updateSelectionUI() {
            const count = selectedAssets.size;
            
            // 更新所有 selectedCount 元素
            const selectedCountElements = document.querySelectorAll('#selectedCount');
            selectedCountElements.forEach(el => {
                el.textContent = count;
            });
            
            document.getElementById('deleteSelectedBtn').disabled = count === 0;
            
            // 显示/隐藏批量下载按钮（仅视频库和图片库）
            const downloadBtn = document.getElementById('downloadSelectedBtn');
            if (currentTab === 'video' || currentTab === 'image') {
                downloadBtn.style.display = 'inline-block';
                downloadBtn.disabled = count === 0;
            } else {
                downloadBtn.style.display = 'none';
            }
            
            // 显示/隐藏"添加到"按钮（仅图片库）
            const addToLibraryButtons = document.getElementById('addToLibraryButtons');
            const addToPersonBtn = document.getElementById('addToPersonBtn');
            const addToSceneBtn = document.getElementById('addToSceneBtn');
            if (currentTab === 'image') {
                addToLibraryButtons.style.display = 'inline-block';
                addToPersonBtn.style.display = count > 0 ? 'inline-block' : 'none';
                addToSceneBtn.style.display = count > 0 ? 'inline-block' : 'none';
            } else {
                addToLibraryButtons.style.display = 'none';
            }
            
            // 更新卡片样式
            document.querySelectorAll('.asset-card').forEach((card, index) => {
                const checkbox = card.querySelector('.asset-checkbox');
                if (checkbox && checkbox.checked) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });
        }
        
        // 预览资源
        function previewAsset(index) {
            const asset = filteredAssets[index];
            if (!asset) return;
            
            currentPreviewIndex = index;
            const modal = document.getElementById('previewModal');
            const previewImage = document.getElementById('previewImage');
            const previewVideo = document.getElementById('previewVideo');
            const previewFilename = document.getElementById('previewFilename');
            const previewCounter = document.getElementById('previewCounter');
            
            const isVideo = currentTab === 'video' || asset.url.match(/\.(mp4|webm|mov)$/i);
            
            if (isVideo) {
                previewImage.style.display = 'none';
                previewVideo.style.display = 'block';
                previewVideo.src = asset.url;
                previewVideo.load();
            } else {
                previewVideo.style.display = 'none';
                previewImage.style.display = 'block';
                previewImage.src = asset.url;
            }
            
            previewFilename.textContent = asset.filename;
            previewCounter.textContent = `${index + 1} / ${filteredAssets.length}`;
            
            modal.classList.add('active');
        }
        
        // 上一个资源
        function prevAsset(event) {
            event.stopPropagation();
            if (currentPreviewIndex > 0) {
                previewAsset(currentPreviewIndex - 1);
            } else {
                previewAsset(filteredAssets.length - 1); // 循环到最后一个
            }
        }
        
        // 下一个资源
        function nextAsset(event) {
            event.stopPropagation();
            if (currentPreviewIndex < filteredAssets.length - 1) {
                previewAsset(currentPreviewIndex + 1);
            } else {
                previewAsset(0); // 循环到第一个
            }
        }
        
        // 关闭预览
        function closePreview(event) {
            if (event.target.id === 'previewModal' || event.target.classList.contains('preview-close')) {
                const modal = document.getElementById('previewModal');
                const previewVideo = document.getElementById('previewVideo');
                modal.classList.remove('active');
                previewVideo.pause(); // 停止视频播放
                currentPreviewIndex = -1;
            }
        }
        
        // 处理文件选择
        async function handleFileSelect(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;
            
            if (currentTab !== 'person' && currentTab !== 'scene') {
                alert('只能上传到人物库或场景库');
                return;
            }
            
            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('file', files[i]);
            }
            formData.append('category', currentTab);
            
            try {
                const response = await fetch('/api/upload-sample-image', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.success) {
                    // 上传成功后刷新列表
                    await loadAssets();
                    const ok = data.uploaded_count != null ? data.uploaded_count : 1;
                    const fail = data.failed_count != null ? data.failed_count : 0;
                    let msg = `上传完成！成功: ${ok} 张` + (fail ? `，失败: ${fail} 张` : '');
                    if (fail && Array.isArray(data.failed) && data.failed.length > 0) {
                        const details = data.failed
                            .slice(0, 5)
                            .map(x => `${x.filename || '未知文件'}: ${x.error || '失败'}`)
                            .join('\n');
                        msg += `\n\n失败明细（前5条）：\n${details}` + (data.failed.length > 5 ? `\n...（共 ${data.failed.length} 条）` : '');
                    }
                    alert(msg);
                } else {
                    alert('上传失败: ' + data.error);
                }
            } catch (error) {
                console.error('上传失败:', error);
                alert('上传失败: ' + error.message);
            }
            
            // 清空文件输入
            if (event.target) {
                event.target.value = '';
            }
        }
        
        // 下载单个资源
        function downloadAsset(url, filename) {
            try {
                // 阻止默认行为
                if (event) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                
                // 使用后端代理下载，避免CORS问题
                const downloadUrl = `/api/download-file?url=${encodeURIComponent(url)}`;
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = filename || 'download';
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (error) {
                console.error('下载失败:', error);
                // 如果代理下载失败，尝试直接下载
                try {
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = filename || 'download';
                    link.target = '_blank';
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (fallbackError) {
                    console.error('备用下载也失败:', fallbackError);
                    alert('下载失败，请检查网络连接或文件是否存在');
                }
            }
        }
        
        // 批量下载选中的资源
        function downloadSelected() {
            if (selectedAssets.size === 0) {
                alert('请先选择要下载的资源');
                return;
            }
            
            const selectedList = Array.from(selectedAssets);
            let downloadCount = 0;
            
            selectedList.forEach(assetId => {
                const asset = allAssets.find(a => (a.id || a.key) === assetId);
                if (asset && asset.url) {
                    // 延迟下载，避免浏览器阻止多个下载
                    setTimeout(() => {
                        downloadAsset(asset.url, asset.filename || `file_${downloadCount}`);
                    }, downloadCount * 200);
                    downloadCount++;
                }
            });
            
            if (downloadCount === 0) {
                alert('没有可下载的资源');
            }
        }
        
        // 将选中的图片添加到人物库或场景库
        async function addSelectedToLibrary(libraryType) {
            if (selectedAssets.size === 0) {
                alert('请先选择要添加的图片');
                return;
            }
            
            const libraryName = libraryType === 'person' ? '人物库' : '场景库';
            if (!confirm(`确定要将选中的 ${selectedAssets.size} 张图片添加到${libraryName}吗？`)) {
                return;
            }
            
            const selectedList = Array.from(selectedAssets);
            let successCount = 0;
            let failCount = 0;
            
            for (const assetId of selectedList) {
                const asset = allAssets.find(a => (a.id || a.key) === assetId);
                if (!asset || !asset.url) {
                    failCount++;
                    continue;
                }
                
                try {
                    // 下载图片并上传到OSS
                    const response = await fetch(asset.url);
                    if (!response.ok) {
                        failCount++;
                        continue;
                    }
                    
                    const blob = await response.blob();
                    const formData = new FormData();
                    formData.append('file', blob, asset.filename);
                    formData.append('category', libraryType);
                    
                    const uploadResponse = await fetch('/api/upload-sample-image', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const uploadData = await uploadResponse.json();
                    if (uploadData.success) {
                        successCount++;
                    } else {
                        failCount++;
                    }
                } catch (error) {
                    console.error('添加到库失败:', error);
                    failCount++;
                }
            }
            
            if (successCount > 0) {
                alert(`成功添加 ${successCount} 张图片到${libraryName}${failCount > 0 ? `，失败 ${failCount} 张` : ''}`);
                // 清空选择
                selectedAssets.clear();
                updateSelectionUI();
                // 如果当前在人物库或场景库，刷新列表
                if (currentTab === libraryType) {
                    loadAssets();
                }
            } else {
                alert(`添加失败: ${failCount} 张图片无法添加到${libraryName}`);
            }
        }
        
        // 删除单个资源
        async function deleteAsset(assetId, filename) {
            if (!confirm(`确定要删除 "${filename}" 吗？`)) return;
            
            try {
                let response;
                if (assetId.startsWith('record_')) {
                    // 从生成记录中删除
                    const recordId = assetId.replace('record_', '');
                    response = await fetch(`/api/records/${recordId}`, {
                        method: 'DELETE'
                    });
                } else if (assetId.startsWith('db_person_') || assetId.startsWith('db_scene_')) {
                    // 从库中删除
                    response = await fetch('/api/delete-library-asset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ key: assetId })
                    });
                } else {
                    // 从图片库或视频库删除
                    const deleteUrl = currentTab === 'image' ? '/api/delete-image-asset' : '/api/delete-video-asset';
                    response = await fetch(deleteUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: assetId })
                    });
                }
                
                const data = await response.json();
                if (data.success) {
                    loadAssets();
                } else {
                    alert('删除失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }
        
        // 批量删除
        async function deleteSelected() {
            const count = selectedAssets.size;
            if (count === 0) return;
            
            if (!confirm(`确定要删除选中的 ${count} 个资源吗？`)) return;
            
            let successCount = 0;
            let failCount = 0;
            
            for (const assetId of selectedAssets) {
                try {
                    // 这里需要根据assetId找到对应的资源信息
                    const asset = allAssets.find(a => (a.id || a.key) === assetId);
                    if (asset) {
                        await deleteAsset(assetId, asset.filename);
                        successCount++;
                    }
                } catch (error) {
                    failCount++;
                }
            }
            
            selectedAssets.clear();
            updateSelectionUI();
            loadAssets();
            
            alert(`删除完成：成功 ${successCount} 个，失败 ${failCount} 个`);
        }
    </script>
    <script src="/static/sidebar-nav.js"></script>
