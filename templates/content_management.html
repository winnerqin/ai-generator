<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理 - AI创作工具</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/sidebar-nav.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        html, body { height: 100%; overflow: hidden; }
        .app-shell { height: 100vh; overflow: hidden; }
        .main-content { padding: 0; height: 100vh; overflow: hidden; }
        .page-wrap { max-width: 1260px; height: 100vh; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; min-height: 0; }
        .page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        .page-subtitle { color: #aeb8d9; margin-bottom: 18px; }
        .panel { border-radius: 16px; padding: 18px; margin-bottom: 16px; flex: 0 0 auto; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .tab-btn { padding: 8px 14px; border-radius: 999px; border: 1px solid rgba(86,111,255,0.3); background: rgba(86,111,255,0.08); color: inherit; cursor: pointer; }
        .tab-btn.active { background: rgba(86,111,255,0.22); border-color: rgba(86,111,255,0.55); }
        .toolbar { display: grid; grid-template-columns: minmax(220px, 1fr) auto; gap: 12px; align-items: end; }
        .toolbar-actions { display: flex; align-items: center; justify-content: flex-end; gap: 12px; flex-wrap: wrap; }
        .toolbar-actions .btn { width: auto; flex: 0 0 auto; }
        .asset-list-panel { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; margin-bottom: 0; }
        .asset-list-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .asset-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding-right: 4px; }
        .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
        .asset-card { border-radius: 14px; overflow: hidden; border: 1px solid rgba(86,111,255,0.2); background: rgba(255,255,255,0.02); }
        .asset-card.selected { border-color: rgba(86,111,255,0.75); box-shadow: 0 0 0 1px rgba(86,111,255,0.25); }
        .asset-select-line { display: flex; align-items: center; gap: 10px; color: #cbd4f6; font-size: 0.9rem; cursor: pointer; padding: 2px 0; }
        .asset-select-line input { width: 22px; height: 22px; flex: 0 0 22px; cursor: pointer; }
        .asset-preview { height: 160px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.15); cursor: pointer; }
        .asset-preview img, .asset-preview video { width: 100%; height: 100%; object-fit: contain; display: block; }
        .asset-preview-audio { font-size: 42px; opacity: 0.85; }
        .asset-info { padding: 10px; display: grid; gap: 6px; font-size: 0.88rem; }
        .asset-meta-line { display: flex; justify-content: space-between; gap: 8px; color: #9ca8cf; font-size: 0.82rem; }
        .asset-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .pager { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .pager-input { width: 78px; height: 36px; box-sizing: border-box; }
        .empty-hint { color: #9ca8cf; }
        .small-hint { color: #9ca8cf; font-size: 0.82rem; }
        .preview-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .preview-inner { position: relative; width: min(960px, 92vw); max-height: 88vh; padding: 18px; border-radius: 16px; background: rgba(8,13,24,0.95); }
        .preview-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .preview-media { margin-top: 12px; min-height: 240px; display: flex; align-items: center; justify-content: center; }
        .preview-media img, .preview-media video { width: 100%; max-height: 70vh; object-fit: contain; }
        .preview-audio { width: 100%; margin-top: 18px; }
        .preview-audio-icon { text-align: center; font-size: 64px; }
        .preview-nav {
            position: absolute;
            top: 72px;
            right: 10px;
            bottom: 10px;
            left: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
        }
        .preview-nav-btn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 999px;
            background: rgba(8,13,24,0.72);
            color: #fff;
            font-size: 1.4rem;
            line-height: 1;
            cursor: pointer;
            pointer-events: auto;
        }
        .preview-nav-btn:disabled {
            opacity: 0.35;
            cursor: default;
        }
        .is-busy,
        .tab-btn.is-busy,
        .preview-nav-btn.is-busy {
            opacity: 0.7;
            cursor: wait;
        }
        @media (max-width: 900px) {
            .toolbar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="react-theme sidebar-compact">
    <div class="app-shell">
        {% set active_page = 'content_management' %}
        {% include "_shared_sidebar.html" %}
        <main class="main-content">
            <div class="page-wrap">
                <div class="page-title">内容管理</div>
                <div class="page-subtitle">统一管理图片素材、音/视频素材、图片库和视频库。全能视频生成成功后会自动保存到视频库。</div>

                <div class="panel">
                    <div class="tabs" id="tabBar"></div>
                </div>

                <div class="panel">
                    <div class="toolbar">
                        <div>
                            <label for="searchInput">搜索素材</label>
                            <input id="searchInput" type="text" placeholder="按文件名搜索">
                        </div>
                        <div class="toolbar-actions">
                            <button class="btn btn-secondary" id="refreshBtn">刷新</button>
                            <button class="btn btn-secondary" id="clearSelectionBtn" style="display:none;">取消选择</button>
                            <button class="btn btn-secondary" id="batchDownloadBtn" style="display:none;">批量下载</button>
                            <button class="btn btn-secondary" id="uploadTrigger">上传素材</button>
                        </div>
                    </div>
                    <input id="uploadInput" type="file" multiple style="display:none;">
                </div>

                <div class="panel asset-list-panel">
                    <div class="asset-list-header">
                        <div id="pagerInfo" class="small-hint">第 1 页</div>
                        <div class="pager">
                            <button class="btn btn-secondary" id="prevPageBtn">上一页</button>
                            <button class="btn btn-secondary" id="nextPageBtn">下一页</button>
                            <span class="small-hint">跳到</span>
                            <input id="jumpPageInput" class="pager-input" type="number" min="1" placeholder="页码">
                            <button class="btn btn-secondary" id="jumpPageBtn">确定</button>
                        </div>
                    </div>
                    <div class="asset-scroll" id="assetScroll">
                        <div id="assetGrid" class="asset-grid"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="previewModal" class="preview-modal">
        <div class="preview-inner">
            <div class="preview-header">
                <div id="previewTitle" style="font-weight:600;"></div>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-primary" id="previewAddMaterial" style="display:none;">加入素材库</button>
                    <button class="btn btn-secondary" id="previewClose">关闭</button>
                </div>
            </div>
            <div id="previewMedia" class="preview-media"></div>
            <div class="preview-nav">
                <button class="preview-nav-btn" id="previewPrev" aria-label="上一项">&lt;</button>
                <button class="preview-nav-btn" id="previewNext" aria-label="下一项">&gt;</button>
            </div>
        </div>
    </div>

    <div id="enhanceModal" class="preview-modal" style="display:none;">
        <div class="preview-inner" style="width:min(500px, 92vw);">
            <div class="preview-header">
                <div id="enhanceModalTitle" style="font-weight:600;">画质增强</div>
                <button class="btn btn-secondary" id="enhanceModalClose">关闭</button>
            </div>
            <div style="padding:12px 0;">
                <div class="small-hint" style="margin-bottom:12px;">原视频：<span id="enhanceSourceFilename"></span></div>
                <div>
                    <label for="enhanceToolVersion" style="display:block;margin-bottom:6px;">工具版本</label>
                    <select id="enhanceToolVersion" style="width:100%;padding:8px;border-radius:8px;">
                        <option value="standard" selected>standard（推荐）</option>
                        <option value="professional">professional</option>
                    </select>
                </div>
                <div style="margin-top:12px;">
                    <label for="enhanceResolution" style="display:block;margin-bottom:6px;">目标分辨率</label>
                    <select id="enhanceResolution" style="width:100%;padding:8px;border-radius:8px;">
                        <option value="720p">720p</option>
                        <option value="1080p" selected>1080p（推荐）</option>
                        <option value="2k">2K</option>
                        <option value="4k">4K</option>
                    </select>
                </div>
                <button id="submitEnhanceBtn" class="btn btn-primary" style="width:100%;margin-top:16px;">开始增强</button>
            </div>
        </div>
    </div>

    <script src="/static/sidebar-nav.js"></script>
    <script src="/static/sidebar-shared.js"></script>
    <script>
        const tabs = [
            { key: 'image_material', label: '图片素材' },
            { key: 'media', label: '音/视频素材' },
            { key: 'image', label: '图片库' },
            { key: 'video', label: '视频库' },
        ];

        let currentTab = 'video';
        let allAssets = [];
        let previewAssets = [];
        let previewIndex = -1;
        let touchStartX = 0;
        let currentPage = 1;
        let pageSize = 36;
        let totalAssets = 0;
        let searchTimer = null;
        let videoPreviewObserver = null;
        let assetListLoading = false;
        let selectedAssetIds = new Set();

        function setButtonBusy(button, busy, busyText = null) {
            if (!button) return;
            if (busy) {
                if (button.dataset.busy === 'true') return;
                button.dataset.busy = 'true';
                if (busyText != null) {
                    button.dataset.originalText = button.textContent;
                    button.textContent = busyText;
                }
                button.disabled = true;
                button.classList.add('is-busy');
                return;
            }
            button.disabled = false;
            button.classList.remove('is-busy');
            if (button.dataset.originalText != null) {
                button.textContent = button.dataset.originalText;
                delete button.dataset.originalText;
            }
            delete button.dataset.busy;
        }

        async function withButtonBusy(button, busyText, action) {
            if (button?.dataset.busy === 'true') return;
            setButtonBusy(button, true, busyText);
            try {
                return await action();
            } finally {
                setButtonBusy(button, false);
            }
        }

        function assetTypeLabel(asset) {
            return { image: '图片', video: '视频', audio: '音频' }[asset.type] || asset.type || '-';
        }

        function renderTabs() {
            const container = document.getElementById('tabBar');
            container.innerHTML = tabs.map((tab) => `
                <button class="tab-btn ${tab.key === currentTab ? 'active' : ''}" data-tab="${tab.key}">${tab.label}</button>
            `).join('');
            container.querySelectorAll('[data-tab]').forEach((button) => {
                button.addEventListener('click', () => withButtonBusy(button, '切换中...', async () => {
                    currentTab = button.getAttribute('data-tab');
                    currentPage = 1;
                    renderTabs();
                    updateUploadAccept();
                    await loadAssets();
                }));
            });
        }

        function canRename(asset) {
            return asset.type === 'video';
        }

        function canAddToMaterial(asset) {
            return currentTab === 'image' && asset.type === 'image';
        }

        function canEnhanceVideo(asset) {
            return currentTab === 'video' && asset.type === 'video';
        }

        function canBatchDownloadAsset(asset) {
            return asset && asset.type === 'video';
        }

        function selectedDownloadableAssets() {
            return allAssets.filter((asset) => selectedAssetIds.has(String(asset.id)) && canBatchDownloadAsset(asset));
        }

        function updateBatchDownloadButton() {
            const clearButton = document.getElementById('clearSelectionBtn');
            const downloadButton = document.getElementById('batchDownloadBtn');
            const count = selectedDownloadableAssets().length;
            clearButton.style.display = count > 0 ? 'inline-block' : 'none';
            downloadButton.style.display = count > 0 ? 'inline-block' : 'none';
            downloadButton.textContent = count > 0 ? `批量下载(${count})` : '批量下载';
        }

        function clearAssetSelection() {
            selectedAssetIds.clear();
            document.querySelectorAll('[data-select-asset]').forEach((checkbox) => {
                checkbox.checked = false;
                const card = checkbox.closest('.asset-card');
                if (card) card.classList.remove('selected');
            });
            updateBatchDownloadButton();
        }

        function renderResolution(asset) {
            const meta = asset.meta || {};
            if (asset.type === 'image') {
                const width = meta.width;
                const height = meta.height;
                if (width && height) return `${width}x${height}`;
                return '-';
            }
            if (asset.type === 'video') {
                return meta.resolution || '-';
            }
            return '-';
        }

        function renderTypeWithResolution(asset) {
            const typeLabel = assetTypeLabel(asset);
            const resolution = renderResolution(asset);
            return resolution && resolution !== '-' ? `${typeLabel} / ${resolution}` : typeLabel;
        }

        function previewMarkup(asset) {
            if (asset.type === 'video') {
                return `<video class="lazy-video-preview" data-src="${asset.url}" preload="none" muted playsinline></video>`;
            }
            if (asset.type === 'audio') {
                return '<div class="asset-preview-audio">♫</div>';
            }
            return `<img src="${asset.url}" alt="${asset.filename || 'asset'}">`;
        }

        function renderAssets() {
            const grid = document.getElementById('assetGrid');
            const assets = allAssets;
            previewAssets = assets;

            if (!assets.length) {
                grid.innerHTML = '<div class="empty-hint">当前分类下暂无素材。</div>';
                selectedAssetIds.clear();
                updateBatchDownloadButton();
                return;
            }

            grid.innerHTML = assets.map((asset) => `
                <div class="asset-card ${selectedAssetIds.has(String(asset.id)) ? 'selected' : ''}">
                    <div class="asset-preview" data-preview="${asset.id}">${previewMarkup(asset)}</div>
                    <div class="asset-info">
                        <label class="asset-select-line">
                            <input type="checkbox" data-select-asset="${asset.id}" ${selectedAssetIds.has(String(asset.id)) ? 'checked' : ''} ${canBatchDownloadAsset(asset) ? '' : 'disabled'}>
                            <span>选择</span>
                        </label>
                        <div>${asset.filename || '-'}</div>
                        <div class="asset-meta-line"><span>${renderTypeWithResolution(asset)}</span><span>${asset.created_at || '-'}</span></div>
                        <div class="asset-actions">
                            ${canAddToMaterial(asset) ? `<button class="btn btn-secondary" data-add-material="${asset.id}">添加到素材</button>` : ''}
                            ${canEnhanceVideo(asset) ? `<button class="btn btn-secondary" data-enhance="${asset.id}">画质增强</button>` : ''}
                            <button class="btn btn-secondary" data-download="${asset.id}">下载</button>
                            ${canRename(asset) ? `<button class="btn btn-secondary" data-rename="${asset.id}">重命名</button>` : ''}
                            <button class="btn btn-danger" data-delete="${asset.id}">删除</button>
                        </div>
                    </div>
                </div>
            `).join('');

            grid.querySelectorAll('[data-preview]').forEach((preview) => {
                preview.addEventListener('click', () => openPreview(preview.getAttribute('data-preview')));
            });
            grid.querySelectorAll('[data-select-asset]').forEach((checkbox) => {
                checkbox.addEventListener('change', () => {
                    const assetId = String(checkbox.getAttribute('data-select-asset'));
                    if (checkbox.checked) selectedAssetIds.add(assetId);
                    else selectedAssetIds.delete(assetId);
                    const card = checkbox.closest('.asset-card');
                    if (card) card.classList.toggle('selected', checkbox.checked);
                    updateBatchDownloadButton();
                });
            });
            grid.querySelectorAll('[data-add-material]').forEach((button) => {
                button.addEventListener('click', () => addToImageMaterial(button.getAttribute('data-add-material'), button));
            });
            grid.querySelectorAll('[data-enhance]').forEach((button) => {
                button.addEventListener('click', () => withButtonBusy(button, '打开中...', async () => {
                    openEnhanceModal(button.getAttribute('data-enhance'));
                }));
            });
            grid.querySelectorAll('[data-download]').forEach((button) => {
                button.addEventListener('click', () => downloadAsset(button.getAttribute('data-download'), button));
            });
            grid.querySelectorAll('[data-delete]').forEach((button) => {
                button.addEventListener('click', () => deleteAsset(button.getAttribute('data-delete'), button));
            });
            grid.querySelectorAll('[data-rename]').forEach((button) => {
                button.addEventListener('click', () => renameAsset(button.getAttribute('data-rename'), button));
            });
            setupVideoPreviewLazyLoad();
            updateBatchDownloadButton();
        }

        function setupVideoPreviewLazyLoad() {
            if (videoPreviewObserver) {
                videoPreviewObserver.disconnect();
                videoPreviewObserver = null;
            }

            const videos = document.querySelectorAll('.lazy-video-preview[data-src]');
            if (!videos.length) return;

            videoPreviewObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach((entry) => {
                    if (!entry.isIntersecting) return;
                    const video = entry.target;
                    const src = video.getAttribute('data-src');
                    if (src && !video.getAttribute('src')) {
                        video.setAttribute('src', src);
                        video.load();
                    }
                    observer.unobserve(video);
                });
            }, { rootMargin: '120px 0px', threshold: 0.01 });

            videos.forEach((video) => videoPreviewObserver.observe(video));
        }

        function updatePager() {
            const totalPages = Math.max(1, Math.ceil(totalAssets / pageSize));
            document.getElementById('pagerInfo').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页，合计 ${totalAssets} 条`;
            document.getElementById('prevPageBtn').disabled = assetListLoading || currentPage <= 1;
            document.getElementById('nextPageBtn').disabled = assetListLoading || currentPage >= totalPages;
        }

        function jumpToPage() {
            const totalPages = Math.max(1, Math.ceil(totalAssets / pageSize));
            const input = document.getElementById('jumpPageInput');
            const targetPage = Number(input.value || 0);
            if (!Number.isInteger(targetPage) || targetPage < 1 || targetPage > totalPages) {
                alert(`请输入 1 到 ${totalPages} 之间的页码`);
                return;
            }
            loadAssets(targetPage);
        }

        function updateUploadAccept() {
            const uploadInput = document.getElementById('uploadInput');
            if (currentTab === 'media') {
                uploadInput.accept = 'audio/*,video/*';
            } else if (currentTab === 'video') {
                uploadInput.accept = 'video/*';
            } else {
                uploadInput.accept = 'image/*';
            }
        }

        function isServerPagedTab() {
            return true;
        }

        async function loadAssets(page = currentPage) {
            if (assetListLoading) return;
            assetListLoading = true;
            currentPage = Math.max(1, page);
            const keyword = document.getElementById('searchInput').value.trim();
            const params = new URLSearchParams({ type: currentTab });
            params.set('page', String(currentPage));
            params.set('page_size', String(pageSize));
            if (keyword) params.set('search', keyword);

            const grid = document.getElementById('assetGrid');
            grid.innerHTML = '<div class="empty-hint">加载中...</div>';
            updatePager();

            try {
                const resp = await fetch(`/api/content-library?${params.toString()}`);
                const data = await resp.json();
                allAssets = data.success ? (data.assets || []) : [];
                totalAssets = Number(data.total || 0);
                currentPage = Number(data.page || currentPage);
                const totalPages = Math.max(1, Math.ceil(totalAssets / pageSize));
                if (data.success && !allAssets.length && totalAssets > 0 && currentPage > totalPages) {
                    assetListLoading = false;
                    await loadAssets(totalPages);
                    return;
                }
                if (!resp.ok || !data.success) {
                    throw new Error(data.error || '加载素材失败');
                }
                selectedAssetIds.clear();
                renderAssets();
                const assetScroll = document.getElementById('assetScroll');
                if (assetScroll) assetScroll.scrollTop = 0;
            } catch (error) {
                allAssets = [];
                totalAssets = 0;
                selectedAssetIds.clear();
                updateBatchDownloadButton();
                grid.innerHTML = `<div class="empty-hint">${error.message || '加载素材失败'}</div>`;
            } finally {
                assetListLoading = false;
                updatePager();
            }
        }

        let currentPreviewAsset = null;

        function openPreview(assetId) {
            const asset = previewAssets.find((item) => String(item.id) === String(assetId))
                || allAssets.find((item) => String(item.id) === String(assetId));
            if (!asset) return;

            currentPreviewAsset = asset;
            previewIndex = previewAssets.findIndex((item) => String(item.id) === String(assetId));
            document.getElementById('previewTitle').textContent = `${asset.filename || '-'} / ${assetTypeLabel(asset)}`;
            const media = document.getElementById('previewMedia');

            if (asset.type === 'video') {
                media.innerHTML = `<video controls autoplay src="${asset.url}" poster="${asset.meta?.cover_url || ''}"></video>`;
            } else if (asset.type === 'audio') {
                media.innerHTML = '<div class="preview-audio-icon">♫</div>';
                media.innerHTML += `<audio class="preview-audio" controls autoplay src="${asset.url}"></audio>`;
            } else {
                media.innerHTML = `<img src="${asset.url}" alt="${asset.filename || 'asset'}">`;
            }

            // 显示/隐藏"加入素材库"按钮：仅在图片库(image)标签下的图片才显示
            const addMaterialBtn = document.getElementById('previewAddMaterial');
            if (currentTab === 'image' && asset.type === 'image') {
                addMaterialBtn.style.display = 'inline-block';
            } else {
                addMaterialBtn.style.display = 'none';
            }

            document.getElementById('previewPrev').disabled = previewIndex <= 0;
            document.getElementById('previewNext').disabled = previewIndex < 0 || previewIndex >= previewAssets.length - 1;
            document.getElementById('previewModal').style.display = 'flex';
        }

        function navigatePreview(offset) {
            if (previewIndex < 0) return;
            const nextIndex = previewIndex + offset;
            if (nextIndex < 0 || nextIndex >= previewAssets.length) return;
            openPreview(previewAssets[nextIndex].id);
        }

        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
            document.getElementById('previewMedia').innerHTML = '';
            previewIndex = -1;
            currentPreviewAsset = null;
        }

        async function downloadAsset(assetId, button = null) {
            const asset = allAssets.find((item) => String(item.id) === String(assetId));
            if (!asset) return;
            await withButtonBusy(button, '下载中...', async () => {
                const link = document.createElement('a');
                link.href = `/api/download-library-asset?id=${encodeURIComponent(asset.id)}`;
                link.download = asset.filename || 'asset';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }

        async function batchDownloadAssets(button = null) {
            const assets = selectedDownloadableAssets();
            if (!assets.length) return;
            await withButtonBusy(button, '打包中...', async () => {
                const resp = await fetch('/api/download-library-assets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: assets.map((asset) => asset.id) }),
                });
                if (!resp.ok) {
                    let message = '批量下载失败';
                    try {
                        const data = await resp.json();
                        message = data.error || message;
                    } catch (error) {}
                    throw new Error(message);
                }
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `视频批量下载_${new Date().toISOString().slice(0, 10)}.zip`;
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(url);
            }).catch((error) => {
                alert(error.message || '批量下载失败');
            });
        }

        async function renameAsset(assetId, button = null) {
            const asset = allAssets.find((item) => String(item.id) === String(assetId));
            if (!asset) return;

            const nextName = prompt('请输入新的文件名', asset.filename || '');
            if (!nextName || nextName.trim() === asset.filename) return;

            await withButtonBusy(button, '重命名中...', async () => {
                const resp = await fetch('/api/rename-library-asset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: asset.id, filename: nextName.trim() }),
                });
                const data = await resp.json();
                if (!resp.ok || !data.success) {
                    throw new Error(data.error || '重命名失败');
                }
                await loadAssets();
            }).catch((error) => {
                alert(error.message || '重命名失败');
            });
        }

        async function deleteAsset(assetId, button = null) {
            const asset = allAssets.find((item) => String(item.id) === String(assetId));
            if (!asset || !confirm(`确认删除 ${asset.filename || '该素材'} 吗？`)) return;

            await withButtonBusy(button, '删除中...', async () => {
                const resp = await fetch('/api/delete-library-asset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: asset.id }),
                });
                const data = await resp.json();
                if (!resp.ok || !data.success) {
                    throw new Error(data.error || '删除失败');
                }
                closePreview();
                await loadAssets();
            }).catch((error) => {
                alert(error.message || '删除失败');
            });
        }

        async function addToImageMaterial(assetId, button = null) {
            const asset = allAssets.find((item) => String(item.id) === String(assetId));
            if (!asset) return;

            await withButtonBusy(button, '添加中...', async () => {
                const resp = await fetch('/api/add-to-image-material', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: asset.filename, url: asset.url, meta: asset.meta || {} }),
                });
                const data = await resp.json();
                if (!resp.ok || !data.success) {
                    throw new Error(data.error || '添加到素材失败');
                }
                alert(data.message || '已添加到图片素材');
            }).catch((error) => {
                alert(error.message || '添加到素材失败');
            });
        }

        async function uploadFiles(files, button = null) {
            const list = Array.from(files || []);
            if (!list.length) return;
            await withButtonBusy(button, '上传中...', async () => {
                for (const file of list) {
                    const formData = new FormData();
                    formData.append('file', file);
                    let resp;

                    if (currentTab === 'image_material') {
                        formData.append('type', 'image_material');
                        resp = await fetch('/api/upload-media-asset', { method: 'POST', body: formData });
                    } else if (currentTab === 'media') {
                        formData.append('type', 'media');
                        resp = await fetch('/api/upload-media-asset', { method: 'POST', body: formData });
                    } else if (currentTab === 'video') {
                        formData.append('type', 'video');
                        resp = await fetch('/api/upload-media-asset', { method: 'POST', body: formData });
                    } else {
                        throw new Error('图片库暂不支持手动上传，请从生成结果中添加。');
                    }

                    const data = await resp.json();
                    if (!resp.ok || !data.success) {
                        throw new Error(data.error || `上传失败: ${file.name}`);
                    }
                }

                await loadAssets();
            }).catch((error) => {
                alert(error.message || '上传失败');
            });
        }

        document.getElementById('searchInput').addEventListener('input', () => {
            if (searchTimer) clearTimeout(searchTimer);
            searchTimer = setTimeout(() => loadAssets(1), 300);
        });
        document.getElementById('refreshBtn').addEventListener('click', (event) => withButtonBusy(event.currentTarget, '刷新中...', () => loadAssets(1)));
        document.getElementById('clearSelectionBtn').addEventListener('click', clearAssetSelection);
        document.getElementById('batchDownloadBtn').addEventListener('click', (event) => batchDownloadAssets(event.currentTarget));
        document.getElementById('prevPageBtn').addEventListener('click', () => {
            const button = document.getElementById('prevPageBtn');
            if (currentPage > 1) withButtonBusy(button, '加载中...', () => loadAssets(currentPage - 1));
        });
        document.getElementById('nextPageBtn').addEventListener('click', () => {
            const button = document.getElementById('nextPageBtn');
            const totalPages = Math.max(1, Math.ceil(totalAssets / pageSize));
            if (currentPage < totalPages) withButtonBusy(button, '加载中...', () => loadAssets(currentPage + 1));
        });
        document.getElementById('jumpPageBtn').addEventListener('click', jumpToPage);
        document.getElementById('jumpPageInput').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                jumpToPage();
            }
        });
        document.getElementById('uploadTrigger').addEventListener('click', (event) => withButtonBusy(event.currentTarget, '选择中...', async () => {
            document.getElementById('uploadInput').click();
        }));
        document.getElementById('uploadInput').addEventListener('change', async (event) => {
            const trigger = document.getElementById('uploadTrigger');
            try {
                await uploadFiles(event.target.files, trigger);
            } finally {
                event.target.value = '';
            }
        });
        document.getElementById('previewClose').addEventListener('click', closePreview);
        document.getElementById('previewAddMaterial').addEventListener('click', async () => {
            if (!currentPreviewAsset) return;
            await addToImageMaterial(currentPreviewAsset.id, document.getElementById('previewAddMaterial'));
        });
        document.getElementById('previewPrev').addEventListener('click', () => navigatePreview(-1));
        document.getElementById('previewNext').addEventListener('click', () => navigatePreview(1));
        document.getElementById('previewModal').addEventListener('click', (event) => {
            if (event.target === event.currentTarget) closePreview();
        });
        document.getElementById('previewModal').addEventListener('touchstart', (event) => {
            touchStartX = event.changedTouches[0].clientX;
        }, { passive: true });
        document.getElementById('previewModal').addEventListener('touchend', (event) => {
            const deltaX = event.changedTouches[0].clientX - touchStartX;
            if (Math.abs(deltaX) < 50) return;
            if (deltaX > 0) navigatePreview(-1);
            else navigatePreview(1);
        });
        window.addEventListener('keydown', (event) => {
            if (document.getElementById('previewModal').style.display !== 'flex') return;
            if (event.key === 'Escape') closePreview();
            if (event.key === 'ArrowLeft') navigatePreview(-1);
            if (event.key === 'ArrowRight') navigatePreview(1);
        });

        // 画质增强弹窗相关
        let currentEnhanceAsset = null;

        function openEnhanceModal(assetId) {
            const asset = allAssets.find((item) => String(item.id) === String(assetId));
            if (!asset) return;
            currentEnhanceAsset = asset;
            document.getElementById('enhanceSourceFilename').textContent = asset.filename || '-';
            document.getElementById('enhanceToolVersion').value = 'standard';
            document.getElementById('enhanceResolution').value = '1080p';
            document.getElementById('enhanceModal').style.display = 'flex';
        }

        function closeEnhanceModal() {
            document.getElementById('enhanceModal').style.display = 'none';
            currentEnhanceAsset = null;
        }

        async function submitEnhance(button = null) {
            if (!currentEnhanceAsset) return;
            const tool_version = document.getElementById('enhanceToolVersion').value;
            const resolution = document.getElementById('enhanceResolution').value;
            await withButtonBusy(button, '提交中...', async () => {
                const resp = await fetch('/api/video-enhance/tasks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        source_video_url: currentEnhanceAsset.url,
                        source_video_id: currentEnhanceAsset.id,
                        source_filename: currentEnhanceAsset.filename,
                        tool_version: tool_version,
                        resolution: resolution
                    })
                });
                const data = await resp.json();
                if (!resp.ok || !data.success) {
                    throw new Error(data.error || '画质增强任务创建失败');
                }
                alert(`画质增强任务已创建，任务ID: ${data.task_id}\n请前往"增强任务"页面查看进度。`);
                closeEnhanceModal();
            }).catch((error) => {
                alert('提交失败: ' + (error.message || '未知错误'));
            });
        }

        document.getElementById('enhanceModalClose').addEventListener('click', closeEnhanceModal);
        document.getElementById('enhanceModal').addEventListener('click', (event) => {
            if (event.target === event.currentTarget) closeEnhanceModal();
        });
        document.getElementById('submitEnhanceBtn').addEventListener('click', (event) => submitEnhance(event.currentTarget));

        renderTabs();
        updateUploadAccept();
        loadAssets();
    </script>
</body>
</html>
