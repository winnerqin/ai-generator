<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剧本与分镜 - Ai创作工具</title>
    <script src="/static/state-manager.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .page-title {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 14px;
            color: #333;
        }

        .panel {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            margin-bottom: 16px;
        }

        .panel-title {
            font-size: 1.05em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .grid-two {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        textarea, input, select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
        }

        textarea {
            min-height: 180px;
            resize: vertical;
            font-family: inherit;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-primary {
            background: #28a745;
            color: #fff;
        }

        .btn-secondary {
            background: #6c757d;
            color: #fff;
        }

        .btn-danger {
            background: #dc3545;
            color: #fff;
        }

        .small-hint {
            color: #666;
            font-size: 0.85em;
        }

        .output-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .episode-list {
            border: 1px dashed #ddd;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
        }

        .episode-item {
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }

        .episode-item:last-child {
            border-bottom: none;
        }

        .workflow {
            display: flex;
            gap: 12px;
            align-items: stretch;
            flex-wrap: wrap;
        }

        .workflow-node {
            flex: 1;
            min-width: 220px;
            background: #f8f9fb;
            border: 1px solid #e6e9ef;
            border-radius: 10px;
            padding: 12px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
        }

        .workflow-arrow {
            display: flex;
            align-items: center;
            font-size: 1.4em;
            color: #999;
        }

        .node-title {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .node-body {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        @media (max-width: 1100px) {
            .grid-two {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body data-default-tab="{{ default_tab or 'scriptTab' }}" class="sidebar-compact">
    <div id="reactApp"></div>
    <nav class="sidebar-nav" id="sidebarNav">
        <div class="sidebar-nav-header">
            <div class="sidebar-nav-title">Ai创作工具</div>
            <button class="sidebar-nav-toggle" onclick="toggleSidebar()" title="收缩/展开">
                <span id="toggleIcon">‹</span>
            </button>
        </div>
        <div class="sidebar-nav-menu">
            <a href="/" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🎨</span>
                <span class="sidebar-nav-text">单图生成</span>
            </a>
            <a href="/batch" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📦</span>
                <span class="sidebar-nav-text">批量生成</span>
            </a>
            <a href="/records" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📊</span>
                <span class="sidebar-nav-text">生图任务</span>
            </a>
            <a href="/video-generate" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🎬</span>
                <span class="sidebar-nav-text">视频生成</span>
            </a>
            <a href="/video-tasks" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📹</span>
                <span class="sidebar-nav-text">视频任务</span>
            </a>
            <a href="/script-generate" class="sidebar-nav-item {% if (default_tab or 'scriptTab') == 'scriptTab' %}active{% endif %}">
                <span class="sidebar-nav-icon">📜</span>
                <span class="sidebar-nav-text">剧本生成</span>
            </a>
            <a href="/storyboard-studio" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🧩</span>
                <span class="sidebar-nav-text">分镜制作</span>
            </a>
            <a href="/txt2csv" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📋</span>
                <span class="sidebar-nav-text">转换工具</span>
            </a>
            <a href="/content-management" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📚</span>
                <span class="sidebar-nav-text">内容管理</span>
            </a>
            {% if user.username == 'system_admin' %}
            <div class="sidebar-nav-divider"></div>
            <a href="/admin" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🛠️</span>
                <span class="sidebar-nav-text">系统管理</span>
            </a>
            <a href="/stats" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📈</span>
                <span class="sidebar-nav-text">系统统计</span>
            </a>
            {% endif %}
        </div>
        <div class="sidebar-nav-user">
            <div class="sidebar-nav-user-info">
                <div class="sidebar-nav-user-avatar">👤</div>
                <div class="sidebar-nav-user-name">{{ user.username }}</div>
                <a href="/logout" class="sidebar-nav-logout">登出</a>
            </div>
            <div style="margin-top: 8px;">
                <label style="font-size: 0.85em; color: #666;">当前项目</label>
                <select id="projectSelect" style="width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #ddd;">
                    <option>加载中...</option>
                </select>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <div class="content" style="padding-top: 20px;">
                <div class="page-title">📝 剧本生成</div>

                <div id="scriptTab">
                    <div class="grid-two">
                        <div class="panel">
                            <div class="panel-title">小说文本输入</div>
                            <textarea id="novelInput" placeholder="粘贴小说原文..."></textarea>
                            <div class="form-row" style="margin-top: 8px;">
                                <input type="file" id="novelFile" accept=".txt">
                                <button class="btn btn-secondary" onclick="loadNovelFile()">加载TXT</button>
                                <button class="btn btn-secondary" onclick="clearNovel()">清空</button>
                            </div>
                            <div class="small-hint">支持粘贴文本或上传 txt 文件</div>
                        </div>

                        <div class="panel">
                            <div class="panel-title">提示词与拆分设置</div>
                        <div class="form-row">
                            <select id="promptTemplateSelect"></select>
                            <button class="btn btn-secondary" onclick="loadTemplate()">应用模板</button>
                            <button class="btn btn-danger" onclick="deleteTemplate()">删除模板</button>
                        </div>
                            <div class="form-row" style="margin-top: 8px;">
                                <input type="text" id="templateName" placeholder="模板名称">
                                <button class="btn btn-secondary" onclick="saveTemplate()">保存为模板</button>
                            </div>
                            <textarea id="scriptPrompt" placeholder="编辑提示词..."></textarea>
                            <div class="form-row" style="margin-top: 8px;">
                                <label>每集时长(秒)：</label>
                                <input type="number" id="minSeconds" value="90" min="60" max="300" style="width: 120px;">
                                <span>至</span>
                                <input type="number" id="maxSeconds" value="150" min="60" max="300" style="width: 120px;">
                            </div>
                            <div class="form-row" style="margin-top: 8px;">
                                <button class="btn btn-primary" onclick="generateScript()">生成剧本</button>
                            </div>
                        </div>
                    </div>

                    <div class="panel">
                        <div class="panel-title">剧本结果（可编辑）</div>
                        <textarea id="scriptOutput" placeholder="生成的剧本会出现在这里，可直接编辑..."></textarea>
                        <div class="output-actions" style="margin-top: 8px;">
                            <button class="btn btn-secondary" onclick="copyText('scriptOutput')">复制</button>
                            <button class="btn btn-secondary" onclick="exportText('scriptOutput', 'txt')">导出TXT</button>
                            <button class="btn btn-secondary" onclick="exportText('scriptOutput', 'md')">导出Markdown</button>
                        </div>
                        <div class="panel-title" style="margin-top: 12px;">按集概览</div>
                        <div id="episodeList" class="episode-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_TEMPLATES = [
            { name: '短剧标准', prompt: '将小说改写为适配短剧拍摄的剧本，语气生动，节奏紧凑，适合短视频观感。' },
            { name: '情感向', prompt: '强调情感冲突与人物内心独白，节奏快但情绪浓烈。' },
            { name: '悬疑向', prompt: '加入悬念与反转，段落末尾留钩子，提升追更动机。' }
        ];

        let templateCache = [];

        async function fetchTemplates() {
            const resp = await fetch('/api/script-templates');
            const data = await resp.json();
            if (data.success) {
                templateCache = data.templates || [];
            } else {
                templateCache = [];
            }
            if (templateCache.length === 0) {
                templateCache = DEFAULT_TEMPLATES.map(t => ({ ...t, id: null }));
            }
        }

        async function renderTemplates() {
            const select = document.getElementById('promptTemplateSelect');
            if (!select) return;
            await fetchTemplates();
            select.innerHTML = '';
            templateCache.forEach((t, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = t.name;
                select.appendChild(opt);
            });
        }

        function loadTemplate() {
            const select = document.getElementById('promptTemplateSelect');
            const output = document.getElementById('scriptPrompt');
            if (!select || !output) return;
            const idx = Number(select.value || 0);
            if (templateCache[idx]) {
                output.value = templateCache[idx].prompt;
            }
        }

        async function saveTemplate() {
            const nameInput = document.getElementById('templateName');
            const promptInput = document.getElementById('scriptPrompt');
            if (!nameInput || !promptInput) return;
            const name = nameInput.value.trim();
            const prompt = promptInput.value.trim();
            if (!name || !prompt) {
                alert('请输入模板名称与提示词');
                return;
            }
            const resp = await fetch('/api/script-templates', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, prompt })
            });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '保存失败');
                return;
            }
            nameInput.value = '';
            await renderTemplates();
        }

        async function deleteTemplate() {
            const select = document.getElementById('promptTemplateSelect');
            if (!select) return;
            const idx = Number(select.value || 0);
            const tpl = templateCache[idx];
            if (!tpl) return;
            if (!confirm(`删除模板 ${tpl.name} ?`)) return;
            if (!tpl.id) {
                alert('默认模板无法删除');
                return;
            }
            const resp = await fetch(`/api/script-templates/${tpl.id}`, { method: 'DELETE' });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '删除失败');
                return;
            }
            await renderTemplates();
            loadTemplate();
        }

        async function loadNovelFile() {
            const input = document.getElementById('novelFile');
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            const text = await file.text();
            document.getElementById('novelInput').value = text;
        }

        function clearNovel() {
            document.getElementById('novelInput').value = '';
        }

        async function generateScript() {
            const text = document.getElementById('novelInput').value.trim();
            const prompt = document.getElementById('scriptPrompt').value.trim();
            const minSeconds = Number(document.getElementById('minSeconds').value || 90);
            const maxSeconds = Number(document.getElementById('maxSeconds').value || 150);
            if (!text) {
                alert('请先输入小说文本');
                return;
            }
            const resp = await fetch('/api/script-generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, prompt, min_seconds: minSeconds, max_seconds: maxSeconds })
            });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '生成失败');
                return;
            }
            document.getElementById('scriptOutput').value = data.script_text || '';
            renderEpisodeList(data.episodes || []);
        }

        function renderEpisodeList(episodes) {
            const list = document.getElementById('episodeList');
            if (!episodes || episodes.length === 0) {
                list.innerHTML = '<div class="small-hint">暂无拆分结果</div>';
                return;
            }
            list.innerHTML = episodes.map(ep => `
                <div class="episode-item">
                    第${ep.index || '-'}集 ${ep.title ? ' - ' + ep.title : ''}（${ep.duration_seconds || '-'}秒）
                </div>
            `).join('');
        }

        function importScript() {
            document.getElementById('storyboardInput').value = document.getElementById('scriptOutput').value;
        }

        function clearStoryboard() {
            document.getElementById('storyboardInput').value = '';
        }

        async function generateStoryboard() {
            const script = document.getElementById('storyboardInput').value.trim();
            const prompt = document.getElementById('storyboardPrompt').value.trim();
            if (!script) {
                alert('请先输入剧本文本');
                return;
            }
            const resp = await fetch('/api/storyboard-generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ script, prompt })
            });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '生成失败');
                return;
            }
            const jsonData = data.storyboard_json;
            if (jsonData) {
                document.getElementById('storyboardOutput').value = JSON.stringify(jsonData, null, 2);
                renderStoryboardPreview(jsonData);
            } else {
                document.getElementById('storyboardOutput').value = data.storyboard_text || '';
                renderStoryboardPreview(null);
            }
        }

        async function generateStoryboardImages() {
            let storyboardJson = null;
            try {
                storyboardJson = JSON.parse(document.getElementById('storyboardOutput').value || '{}');
            } catch (e) {
                alert('分镜 JSON 格式错误，请先生成或修正分镜');
                return;
            }
            const resp = await fetch('/api/storyboard-sample-images', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ storyboard: storyboardJson, max_images: 6 })
            });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '生成示例图失败');
                return;
            }
            const container = document.getElementById('storyboardImages');
            const images = data.images || [];
            if (images.length === 0) {
                container.innerHTML = '<div class="small-hint">暂无示例图</div>';
                return;
            }
            container.innerHTML = images.map(img => `
                <div class="episode-item">
                    <div class="small-hint">第${img.episode_index || ''}集-场${img.scene_index || ''}</div>
                    <img src="${img.url}" style="max-width: 220px; border-radius: 6px; margin-top: 6px;" />
                </div>
            `).join('');
        }

        function copyText(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
        }

        function exportText(id, type) {
            const text = document.getElementById(id).value || '';
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = type === 'md' ? 'script.md' : 'script.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function renderStoryboardPreview(data) {
            const container = document.getElementById('storyboardPreview');
            if (!container) return;
            if (!data || !Array.isArray(data.episodes) || data.episodes.length === 0) {
                container.innerHTML = '<div class="small-hint">暂无结构化分镜</div>';
                return;
            }
            container.innerHTML = data.episodes.map(ep => {
                const scenes = Array.isArray(ep.scenes) ? ep.scenes : [];
                const sceneHtml = scenes.map(s => `
                    <div class="episode-item">场${s.scene_index || ''}：${s.location_time || ''}｜${s.shot || ''}｜${s.duration_seconds || ''}秒</div>
                `).join('');
                return `
                    <div class="episode-item"><strong>第${ep.index || ''}集 ${ep.title || ''}</strong></div>
                    ${sceneHtml || '<div class="episode-item">暂无场次</div>'}
                `;
            }).join('');
        }

        function initDefaults() {
            if (document.getElementById('promptTemplateSelect')) {
                renderTemplates();
                loadTemplate();
            }
            const storyboardPrompt = document.getElementById('storyboardPrompt');
            if (storyboardPrompt && !storyboardPrompt.value) {
                storyboardPrompt.value = '基于剧本文本生成分镜，输出清晰分镜列表，包含场景、人物动作、镜头、时长建议。';
            }
        }

        async function loadProjects() {
            const select = document.getElementById('projectSelect');
            if (!select) return;
            try {
                const resp = await fetch('/api/projects');
                const data = await resp.json();
                if (!data.success) throw new Error(data.error || '加载失败');
                select.innerHTML = '';
                data.projects.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    if (String(p.id) === String(data.current_project_id)) {
                        opt.selected = true;
                    }
                    select.appendChild(opt);
                });
            } catch (e) {
                select.innerHTML = '<option>项目加载失败</option>';
            }
        }

        async function switchProject(projectId) {
            const resp = await fetch('/api/projects/switch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ project_id: projectId })
            });
            const data = await resp.json();
            if (data.success) {
                location.reload();
            } else {
                alert(data.error || '切换失败');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDefaults();
            const select = document.getElementById('projectSelect');
            if (select) {
                select.addEventListener('change', () => switchProject(select.value));
                loadProjects();
            }
        });
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="/static/react-app.js"></script>
    <script src="/static/sidebar-nav.js"></script>
</body>
</html>
