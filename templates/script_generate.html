<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剧本生成 - Ai创作工具</title>
    <script src="/static/state-manager.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .page-title {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 14px;
            color: #333;
        }

        .panel {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            margin-bottom: 16px;
        }

        .panel-title {
            font-size: 1.05em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .grid-two {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        textarea, input, select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
        }

        textarea {
            min-height: 180px;
            resize: vertical;
            font-family: inherit;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-primary {
            background: #28a745;
            color: #fff;
        }

        .btn-secondary {
            background: #6c757d;
            color: #fff;
        }

        .btn-danger {
            background: #dc3545;
            color: #fff;
        }

        .small-hint {
            color: #666;
            font-size: 0.85em;
        }

        .output-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .episode-list {
            border: 1px dashed #ddd;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
        }

        .episode-item {
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }

        .episode-item:last-child {
            border-bottom: none;
        }

        @media (max-width: 1100px) {
            .grid-two {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <div class="main-content">
        <div class="container">
            <div class="content" style="padding-top: 20px;">
                <div class="page-title">📝 剧本生成</div>

                <div class="grid-two">
                    <div class="panel">
                        <div class="panel-title">小说文本输入</div>
                        <textarea id="novelInput" placeholder="粘贴小说原文..."></textarea>
                        <div class="form-row" style="margin-top: 8px;">
                            <input type="file" id="novelFile" accept=".txt">
                            <button class="btn btn-secondary" onclick="loadNovelFile()">加载TXT</button>
                            <button class="btn btn-secondary" onclick="clearNovel()">清空</button>
                        </div>
                        <div class="panel-title" style="margin-top: 12px;">实时输出</div>
                        <textarea id="scriptStreamOutput" placeholder="生成过程中的流式输出..." style="min-height: 160px;"></textarea>
                        <div class="small-hint">支持粘贴文本或上传 txt 文件</div>
                    </div>

                    <div class="panel">
                        <div class="panel-title">提示词与拆分设置</div>
                        <div class="form-row">
                            <select id="promptTemplateSelect"></select>
                            <button class="btn btn-secondary" onclick="loadTemplate()">应用模板</button>
                            <button class="btn btn-danger" onclick="deleteTemplate()">删除模板</button>
                        </div>
                        <div class="form-row" style="margin-top: 8px;">
                            <input type="text" id="templateName" placeholder="模板名称">
                            <button class="btn btn-secondary" onclick="saveTemplate()">保存为模板</button>
                        </div>
                        <textarea id="scriptPrompt" placeholder="编辑提示词..."></textarea>
                        <div class="form-row" style="margin-top: 8px;">
                            <label>每集时长(秒)：</label>
                            <input type="number" id="minSeconds" value="90" min="60" max="300" style="width: 120px;">
                            <span>至</span>
                            <input type="number" id="maxSeconds" value="150" min="60" max="300" style="width: 120px;">
                        </div>
                        <div class="form-row" style="margin-top: 8px;">
                            <button class="btn btn-primary" onclick="generateScript()">生成剧本</button>
                            <div id="scriptProgress" class="small-hint"></div>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title">剧本分集表格</div>
                    <div id="episodeTableWrap" class="episode-list"></div>
                    <div class="form-row" style="margin-top: 8px; justify-content: space-between;">
                        <div class="small-hint" id="episodePageInfo"></div>
                        <div class="small-hint" id="episodeActionHint"></div>
                        <div class="form-row">
                            <button class="btn btn-secondary" onclick="changeEpisodePage(-1)">上一页</button>
                            <button class="btn btn-secondary" onclick="changeEpisodePage(1)">下一页</button>
                            <input type="number" id="episodePageInput" min="1" style="width: 90px;" placeholder="页码">
                            <button class="btn btn-secondary" onclick="jumpEpisodePage()">跳页</button>
                            <button class="btn btn-secondary" onclick="exportEpisodeTexts()">导出</button>
                            <label class="btn btn-secondary" style="margin:0;">
                                导入
                                <input type="file" id="episodeImportInput" accept=".txt" multiple style="display:none" onchange="importEpisodeTexts(event)">
                            </label>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title">本集内容编辑</div>
                    <div class="small-hint" id="episodeEditHint">点击表格中的“编辑”进入修改</div>
                    <div class="form-row" style="margin-top: 8px; flex-wrap: nowrap; gap: 12px; align-items: center;">
                        <span class="small-hint">集数：</span>
                        <input type="number" id="episodeEditIndex" placeholder="集数" style="width: 90px;">
                        <span class="small-hint">时长：</span>
                        <input type="number" id="episodeEditDuration" placeholder="秒" style="width: 90px;">
                        <span class="small-hint">秒</span>
                        <span class="small-hint">集名：</span>
                        <input type="text" id="episodeEditTitle" placeholder="集名" style="flex: 1;">
                    </div>
                    <textarea id="episodeEditor" placeholder="请选择一集进行编辑..." style="min-height: 180px;"></textarea>
                    <div class="form-row" style="margin-top: 8px;">
                        <button class="btn btn-primary" onclick="saveEpisodeContent()">保存本集</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_TEMPLATES = [
            { name: '短剧标准', prompt: '将小说改写为适配短剧拍摄的剧本，语气生动，节奏紧凑，适合短视频观感。' },
            { name: '情感向', prompt: '强调情感冲突与人物内心独白，节奏快但情绪浓烈。' },
            { name: '悬疑向', prompt: '加入悬念与反转，段落末尾留钩子，提升追更动机。' }
        ];

        let templateCache = [];

        async function fetchTemplates() {
            const resp = await fetch('/api/script-templates');
            const data = await resp.json();
            if (data.success) {
                templateCache = data.templates || [];
            } else {
                templateCache = [];
            }
            if (templateCache.length === 0) {
                templateCache = DEFAULT_TEMPLATES.map(t => ({ ...t, id: null }));
            }
        }

        async function renderTemplates() {
            const select = document.getElementById('promptTemplateSelect');
            if (!select) return;
            await fetchTemplates();
            select.innerHTML = '';
            templateCache.forEach((t, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = t.name;
                select.appendChild(opt);
            });
        }

        function loadTemplate() {
            const select = document.getElementById('promptTemplateSelect');
            const output = document.getElementById('scriptPrompt');
            if (!select || !output) return;
            const idx = Number(select.value || 0);
            if (templateCache[idx]) {
                output.value = templateCache[idx].prompt;
            }
        }

        async function saveTemplate() {
            const nameInput = document.getElementById('templateName');
            const promptInput = document.getElementById('scriptPrompt');
            if (!nameInput || !promptInput) return;
            const name = nameInput.value.trim();
            const prompt = promptInput.value.trim();
            if (!name || !prompt) {
                alert('请输入模板名称与提示词');
                return;
            }
            const resp = await fetch('/api/script-templates', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, prompt })
            });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '保存失败');
                return;
            }
            nameInput.value = '';
            await renderTemplates();
        }

        async function deleteTemplate() {
            const select = document.getElementById('promptTemplateSelect');
            if (!select) return;
            const idx = Number(select.value || 0);
            const tpl = templateCache[idx];
            if (!tpl) return;
            if (!confirm(`删除模板 ${tpl.name} ?`)) return;
            if (!tpl.id) {
                alert('默认模板无法删除');
                return;
            }
            const resp = await fetch(`/api/script-templates/${tpl.id}`, { method: 'DELETE' });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '删除失败');
                return;
            }
            await renderTemplates();
            loadTemplate();
        }

        async function loadNovelFile() {
            const input = document.getElementById('novelFile');
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            const text = await file.text();
            document.getElementById('novelInput').value = text;
        }

        function clearNovel() {
            document.getElementById('novelInput').value = '';
        }

        let currentProjectId = null;
        let currentScriptRecordId = null;
        let currentScriptId = null;
        let lastEpisodes = [];
        let currentEpisodeRow = null;
        let pollingTimer = null;
        let allEpisodeRows = [];
        let episodePage = 1;
        const EPISODE_PAGE_SIZE = 10;
        let selectedEpisodeIds = new Set();
        const STREAM_OUTPUT_KEY = 'scriptStreamOutput';

        function updateScriptProgress(text) {
            const el = document.getElementById('scriptProgress');
            if (el) {
                el.textContent = text || '';
            }
        }

        function updateStreamOutput(text, append = true) {
            const el = document.getElementById('scriptStreamOutput');
            if (!el) return;
            el.value = append ? (el.value + text) : text;
            localStorage.setItem(STREAM_OUTPUT_KEY, el.value);
            el.scrollTop = el.scrollHeight;
        }

        async function generateScript() {
            const text = document.getElementById('novelInput').value.trim();
            const prompt = document.getElementById('scriptPrompt').value.trim();
            const minSeconds = Number(document.getElementById('minSeconds').value || 90);
            const maxSeconds = Number(document.getElementById('maxSeconds').value || 150);
            if (!text) {
                alert('请先输入小说文本');
                return;
            }
            updateScriptProgress('生成中...');
            updateStreamOutput('', false);
            const resp = await fetch('/api/script-generate-stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text,
                    prompt,
                    min_seconds: minSeconds,
                    max_seconds: maxSeconds,
                    script_id: currentScriptId
                })
            });
            if (!resp.ok || !resp.body) {
                updateScriptProgress('生成失败');
                return;
            }
            const reader = resp.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const parts = buffer.split('\n\n');
                buffer = parts.pop() || '';
                parts.forEach(part => {
                    const line = part.trim();
                    if (!line.startsWith('data:')) return;
                    try {
                        const payload = JSON.parse(line.replace(/^data:\s*/, ''));
                        if (payload.type === 'chunk') {
                            updateStreamOutput(payload.content || '', true);
                        } else if (payload.type === 'complete') {
                            updateScriptProgress('完成');
                            currentScriptId = payload.script_id || currentScriptId;
                            loadAllEpisodeTable();
                        } else if (payload.type === 'error') {
                            updateScriptProgress('失败');
                            setEpisodeActionHint(payload.error || '生成失败', true);
                        }
                    } catch (e) {
                        return;
                    }
                });
            }
        }

        function truncateSummary(text, limit = 30) {
            if (!text) return '-';
            const plain = String(text);
            return plain.length > limit ? `${plain.slice(0, limit)}...` : plain;
        }

        function setEpisodeActionHint(text, isError = false) {
            const hint = document.getElementById('episodeActionHint');
            if (!hint) return;
            hint.textContent = text || '';
            hint.style.color = isError ? '#ff9aa2' : '#9aa3c7';
        }

        function renderEpisodeTable(episodes) {
            const wrap = document.getElementById('episodeTableWrap');
            if (!wrap) return;
            if (!episodes || episodes.length === 0) {
                wrap.innerHTML = '<div class="small-hint">暂无分集记录</div>';
                const info = document.getElementById('episodePageInfo');
                if (info) info.textContent = '';
                setEpisodeActionHint('');
                return;
            }
            const totalPages = Math.max(1, Math.ceil(episodes.length / EPISODE_PAGE_SIZE));
            if (episodePage > totalPages) episodePage = totalPages;
            if (episodePage < 1) episodePage = 1;
            const start = (episodePage - 1) * EPISODE_PAGE_SIZE;
            const pageItems = episodes.slice(start, start + EPISODE_PAGE_SIZE);
            const allSelected = pageItems.length > 0 && pageItems.every(ep => selectedEpisodeIds.has(ep.id));
            const rows = pageItems.map(ep => `
                <tr>
                    <td style="padding:4px 6px; font-size: 0.85em;">
                        <input type="checkbox" ${selectedEpisodeIds.has(ep.id) ? 'checked' : ''} onchange="toggleEpisodeSelection(${ep.id}, this.checked)">
                    </td>
                    <td style="padding:4px 6px; font-size: 0.85em;">${ep.id || '-'}</td>
                    <td style="padding:4px 6px; font-size: 0.85em;">${ep.created_at || '-'}</td>
                    <td style="padding:4px 6px; font-size: 0.85em;">${ep.episode_index || '-'}</td>
                    <td style="padding:4px 6px; font-size: 0.85em;">${ep.title || '-'}</td>
                    <td style="padding:4px 6px; font-size: 0.85em;">${ep.duration_seconds || '-'}</td>
                    <td style="padding:4px 6px; font-size: 0.85em;">${truncateSummary(ep.summary)}</td>
                    <td style="padding:4px 6px; font-size: 0.85em;">
                        <button class="btn btn-secondary" onclick="editEpisode(${ep.id}, ${ep.episode_index || 0}, ${ep.script_id || 0})">编辑</button>
                        <button class="btn btn-danger" onclick="deleteEpisode(${ep.id})">删除</button>
                    </td>
                </tr>
            `).join('');
            wrap.innerHTML = `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="text-align:left; padding:4px 6px; font-size: 0.85em;">
                                <input type="checkbox" ${allSelected ? 'checked' : ''} onchange="toggleEpisodeSelectAll(this.checked)">
                            </th>
                            <th style="text-align:left; padding:4px 6px; font-size: 0.85em;">编号</th>
                            <th style="text-align:left; padding:4px 6px; font-size: 0.85em;">生成时间</th>
                            <th style="text-align:left; padding:4px 6px; font-size: 0.85em;">集数</th>
                            <th style="text-align:left; padding:4px 6px; font-size: 0.85em;">集名</th>
                            <th style="text-align:left; padding:4px 6px; font-size: 0.85em;">时长</th>
                            <th style="text-align:left; padding:4px 6px; font-size: 0.85em;">概览</th>
                            <th style="text-align:left; padding:4px 6px; font-size: 0.85em;">本集内容</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
            const info = document.getElementById('episodePageInfo');
            if (info) info.textContent = `第 ${episodePage} / ${totalPages} 页，共 ${episodes.length} 条`;
        }

        async function loadEpisodeTable(scriptId) {
            const resp = await fetch(`/api/script-episodes?script_id=${scriptId}`);
            const data = await resp.json();
            if (!data.success) {
                allEpisodeRows = [];
                selectedEpisodeIds = new Set();
                renderEpisodeTable([]);
                return;
            }
            allEpisodeRows = data.episodes || [];
            selectedEpisodeIds = new Set();
            renderEpisodeTable(allEpisodeRows);
        }

        async function editEpisode(id, episodeIndex, scriptId) {
            currentEpisodeRow = { id, episodeIndex, scriptId };
            const hint = document.getElementById('episodeEditHint');
            const idxInput = document.getElementById('episodeEditIndex');
            const durationInput = document.getElementById('episodeEditDuration');
            const titleInput = document.getElementById('episodeEditTitle');
            if (idxInput) idxInput.value = episodeIndex || '';
            if (titleInput) {
                const ep = allEpisodeRows.find(r => r.id === id);
                titleInput.value = ep ? (ep.title || '') : '';
                if (durationInput) durationInput.value = ep ? (ep.duration_seconds || '') : '';
                if (hint) {
                    const displayIndex = ep && ep.episode_index ? ep.episode_index : episodeIndex;
                    const displayDuration = ep && ep.duration_seconds ? ep.duration_seconds : '';
                    const displayTitle = ep && ep.title ? ep.title : '';
                    hint.textContent = `集数：${displayIndex || ''}，时长：${displayDuration || ''}秒，集名：${displayTitle || ''}`;
                }
            } else if (hint) {
                hint.textContent = `集数：${episodeIndex || ''}，时长：秒，集名：`;
            }
            try {
                const resp = await fetch(`/api/script-episodes/${id}/content`);
                if (!resp.ok) {
                    document.getElementById('episodeEditor').value = '';
                    return;
                }
                const text = await resp.text();
                document.getElementById('episodeEditor').value = text;
            } catch (e) {
                document.getElementById('episodeEditor').value = '';
            }
        }

        async function saveEpisodeContent() {
            if (!currentEpisodeRow) {
                alert('请先选择一集');
                return;
            }
            const content = document.getElementById('episodeEditor').value || '';
            const idxInput = document.getElementById('episodeEditIndex');
            const durationInput = document.getElementById('episodeEditDuration');
            const titleInput = document.getElementById('episodeEditTitle');
            const editIndex = idxInput && idxInput.value ? Number(idxInput.value) : null;
            const editDuration = durationInput && durationInput.value ? Number(durationInput.value) : null;
            const editTitle = titleInput ? titleInput.value : '';
            const resp = await fetch(`/api/script-episodes/${currentEpisodeRow.id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    script_id: currentEpisodeRow.scriptId,
                    episode_index: editIndex !== null ? editIndex : currentEpisodeRow.episodeIndex,
                    title: editTitle,
                    duration_seconds: editDuration,
                    content
                })
            });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '保存失败');
                return;
            }
            loadAllEpisodeTable();
        }

        async function deleteEpisode(id) {
            if (!confirm('确认删除本集？')) return;
            const resp = await fetch(`/api/script-episodes/${id}`, { method: 'DELETE' });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '删除失败');
                return;
            }
            loadAllEpisodeTable();
        }

        async function loadAllEpisodeTable() {
            const resp = await fetch('/api/script-episodes');
            const data = await resp.json();
            if (!data.success) {
                allEpisodeRows = [];
                selectedEpisodeIds = new Set();
                renderEpisodeTable([]);
                return;
            }
            allEpisodeRows = data.episodes || [];
            selectedEpisodeIds = new Set();
            renderEpisodeTable(allEpisodeRows);
            if (allEpisodeRows.length > 0) {
                const maxScriptId = allEpisodeRows.reduce((acc, ep) => Math.max(acc, Number(ep.script_id || 0)), 0);
                if (maxScriptId) {
                    currentScriptId = maxScriptId;
                }
            }
        }

        function changeEpisodePage(delta) {
            episodePage += delta;
            renderEpisodeTable(allEpisodeRows);
        }

        function jumpEpisodePage() {
            const input = document.getElementById('episodePageInput');
            if (!input) return;
            const value = Number(input.value || 1);
            if (!value || value < 1) return;
            episodePage = value;
            renderEpisodeTable(allEpisodeRows);
        }

        function toggleEpisodeSelection(id, checked) {
            if (checked) {
                selectedEpisodeIds.add(id);
            } else {
                selectedEpisodeIds.delete(id);
            }
            renderEpisodeTable(allEpisodeRows);
        }

        function toggleEpisodeSelectAll(checked) {
            const start = (episodePage - 1) * EPISODE_PAGE_SIZE;
            const pageItems = allEpisodeRows.slice(start, start + EPISODE_PAGE_SIZE);
            pageItems.forEach(ep => {
                if (checked) {
                    selectedEpisodeIds.add(ep.id);
                } else {
                    selectedEpisodeIds.delete(ep.id);
                }
            });
            renderEpisodeTable(allEpisodeRows);
        }

        async function exportEpisodeTexts() {
            if (!allEpisodeRows || allEpisodeRows.length === 0) return;
            const selected = allEpisodeRows.filter(ep => selectedEpisodeIds.has(ep.id));
            if (selected.length === 0) {
                setEpisodeActionHint('请先选择要导出的分集', true);
                return;
            }
            let exported = 0;
            for (const ep of selected) {
                try {
                    const resp = await fetch(`/api/script-episodes/${ep.id}/content`);
                    if (!resp.ok) continue;
                    const text = await resp.text();
                    const index = ep.episode_index ? `第${ep.episode_index}集` : '第?集';
                    const title = ep.title ? `-${ep.title}` : '';
                    const filename = `${index}${title}.txt`;
                    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    exported += 1;
                } catch (e) {
                    continue;
                }
            }
            setEpisodeActionHint(`导出成功：${exported} 条`);
        }

        async function importEpisodeTexts(event) {
            const files = Array.from(event.target.files || []);
            if (files.length === 0) return;
            const formData = new FormData();
            files.forEach(file => formData.append('files', file));
            if (currentScriptId) {
                formData.append('script_id', currentScriptId);
            }
            const resp = await fetch('/api/script-episodes/import', {
                method: 'POST',
                body: formData
            });
            const data = await resp.json();
            if (!data.success) {
                setEpisodeActionHint(data.error || '导入失败', true);
                return;
            }
            setEpisodeActionHint(`导入成功：${data.count || files.length} 条`);
            loadAllEpisodeTable();
        }

        async function pollScriptTask(taskId) {
            if (pollingTimer) {
                clearTimeout(pollingTimer);
            }
            const resp = await fetch(`/api/tasks/${taskId}`);
            const data = await resp.json();
            if (!data.success || !data.task) {
                updateScriptProgress('');
                return;
            }
            const task = data.task;
            updateScriptProgress(`生成中 ${task.progress || 0}%`);
            if (task.status === 'completed') {
                updateScriptProgress('完成');
                const result = task.result || {};
                lastEpisodes = result.episodes || [];
                currentScriptId = result.script_id || currentScriptId;
                loadAllEpisodeTable();
                return;
            }
            if (task.status === 'failed') {
                updateScriptProgress('失败');
                if (task.error) {
                    alert(task.error);
                }
                return;
            }
            pollingTimer = setTimeout(() => pollScriptTask(taskId), 2000);
        }

        async function resumeScriptTask() {
            const key = `script_task_${currentProjectId || 'default'}`;
            const taskId = localStorage.getItem(key);
            if (taskId) {
                pollScriptTask(taskId);
            }
        }

        function copyText(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
        }

        function exportText(id, type) {
            const text = document.getElementById(id).value || '';
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = type === 'md' ? 'script.md' : 'script.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function loadProjects() {
            const select = document.getElementById('projectSelect');
            if (!select) return;
            try {
                const resp = await fetch('/api/projects');
                const data = await resp.json();
                if (!data.success) throw new Error(data.error || '加载失败');
                select.innerHTML = '';
                currentProjectId = data.current_project_id;
                data.projects.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    if (String(p.id) === String(data.current_project_id)) {
                        opt.selected = true;
                    }
                    select.appendChild(opt);
                });
                resumeScriptTask();
            } catch (e) {
                select.innerHTML = '<option>项目加载失败</option>';
            }
        }

        async function switchProject(projectId) {
            const resp = await fetch('/api/projects/switch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ project_id: projectId })
            });
            const data = await resp.json();
            if (data.success) {
                location.reload();
            } else {
                alert(data.error || '切换失败');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTemplates();
            loadTemplate();
            const select = document.getElementById('projectSelect');
            if (select) {
                select.addEventListener('change', () => switchProject(select.value));
                loadProjects();
            }
            loadAllEpisodeTable();
            const cached = localStorage.getItem(STREAM_OUTPUT_KEY);
            if (cached) {
                updateStreamOutput(cached, false);
            }
        });
    </script>
