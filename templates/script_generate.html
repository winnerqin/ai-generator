<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剧本生成 - Ai创作工具</title>
    <script src="/static/state-manager.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .page-title {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 14px;
            color: #333;
        }

        .panel {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            margin-bottom: 16px;
        }

        .panel-title {
            font-size: 1.05em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .grid-two {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        textarea, input, select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
        }

        textarea {
            min-height: 180px;
            resize: vertical;
            font-family: inherit;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-primary {
            background: #28a745;
            color: #fff;
        }

        .btn-secondary {
            background: #6c757d;
            color: #fff;
        }

        .btn-danger {
            background: #dc3545;
            color: #fff;
        }

        .small-hint {
            color: #666;
            font-size: 0.85em;
        }

        .output-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .episode-list {
            border: 1px dashed #ddd;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
        }

        .episode-item {
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }

        .episode-item:last-child {
            border-bottom: none;
        }

        @media (max-width: 1100px) {
            .grid-two {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="reactApp"></div>
    <nav class="sidebar-nav" id="sidebarNav">
        <div class="sidebar-nav-header">
            <div class="sidebar-nav-title">Ai创作工具</div>
            <button class="sidebar-nav-toggle" onclick="toggleSidebar()" title="收缩/展开">
                <span id="toggleIcon">‹</span>
            </button>
        </div>
        <div class="sidebar-nav-menu">
            <a href="/" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🎨</span>
                <span class="sidebar-nav-text">单图生成</span>
            </a>
            <a href="/batch" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📦</span>
                <span class="sidebar-nav-text">批量生成</span>
            </a>
            <a href="/records" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📊</span>
                <span class="sidebar-nav-text">生图任务</span>
            </a>
            <a href="/video-generate" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🎬</span>
                <span class="sidebar-nav-text">视频生成</span>
            </a>
            <a href="/video-tasks" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📹</span>
                <span class="sidebar-nav-text">视频任务</span>
            </a>
            <a href="/script-generate" class="sidebar-nav-item active">
                <span class="sidebar-nav-icon">📜</span>
                <span class="sidebar-nav-text">剧本生成</span>
            </a>
            <a href="/storyboard" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🎬</span>
                <span class="sidebar-nav-text">分镜生成</span>
            </a>
            <a href="/storyboard-studio" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🧩</span>
                <span class="sidebar-nav-text">分镜制作</span>
            </a>
            <a href="/content-management" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📚</span>
                <span class="sidebar-nav-text">内容管理</span>
            </a>
            {% if user.username == 'system_admin' %}
            <div class="sidebar-nav-divider"></div>
            <a href="/admin" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">🛠️</span>
                <span class="sidebar-nav-text">系统管理</span>
            </a>
            <a href="/stats" class="sidebar-nav-item">
                <span class="sidebar-nav-icon">📈</span>
                <span class="sidebar-nav-text">系统统计</span>
            </a>
            {% endif %}
        </div>
        <div class="sidebar-nav-user">
            <div class="sidebar-nav-user-info">
                <div class="sidebar-nav-user-avatar">👤</div>
                <div class="sidebar-nav-user-name">{{ user.username }}</div>
            </div>
            <div style="margin-top: 8px;">
                <label style="font-size: 0.85em; color: #666;">当前项目</label>
                <select id="projectSelect" style="width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #ddd;">
                    <option>加载中...</option>
                </select>
            </div>
            <a href="/logout" class="sidebar-nav-logout">登出</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <div class="content" style="padding-top: 20px;">
                <div class="page-title">📝 剧本生成</div>

                <div class="grid-two">
                    <div class="panel">
                        <div class="panel-title">小说文本输入</div>
                        <textarea id="novelInput" placeholder="粘贴小说原文..."></textarea>
                        <div class="form-row" style="margin-top: 8px;">
                            <input type="file" id="novelFile" accept=".txt">
                            <button class="btn btn-secondary" onclick="loadNovelFile()">加载TXT</button>
                            <button class="btn btn-secondary" onclick="clearNovel()">清空</button>
                        </div>
                        <div class="small-hint">支持粘贴文本或上传 txt 文件</div>
                    </div>

                    <div class="panel">
                        <div class="panel-title">提示词与拆分设置</div>
                        <div class="form-row">
                            <select id="promptTemplateSelect"></select>
                            <button class="btn btn-secondary" onclick="loadTemplate()">应用模板</button>
                            <button class="btn btn-danger" onclick="deleteTemplate()">删除模板</button>
                        </div>
                        <div class="form-row" style="margin-top: 8px;">
                            <input type="text" id="templateName" placeholder="模板名称">
                            <button class="btn btn-secondary" onclick="saveTemplate()">保存为模板</button>
                        </div>
                        <textarea id="scriptPrompt" placeholder="编辑提示词..."></textarea>
                        <div class="form-row" style="margin-top: 8px;">
                            <label>每集时长(秒)：</label>
                            <input type="number" id="minSeconds" value="90" min="60" max="300" style="width: 120px;">
                            <span>至</span>
                            <input type="number" id="maxSeconds" value="150" min="60" max="300" style="width: 120px;">
                        </div>
                        <div class="form-row" style="margin-top: 8px;">
                            <button class="btn btn-primary" onclick="generateScript()">生成剧本</button>
                            <div id="scriptProgress" class="small-hint"></div>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title">剧本分集表格</div>
                    <div id="episodeTableWrap" class="episode-list"></div>
                </div>

                <div class="panel">
                    <div class="panel-title">本集内容编辑</div>
                    <div class="small-hint" id="episodeEditHint">点击表格中的“编辑”进入修改</div>
                    <textarea id="episodeEditor" placeholder="请选择一集进行编辑..." style="min-height: 180px;"></textarea>
                    <div class="form-row" style="margin-top: 8px;">
                        <button class="btn btn-primary" onclick="saveEpisodeContent()">保存本集</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_TEMPLATES = [
            { name: '短剧标准', prompt: '将小说改写为适配短剧拍摄的剧本，语气生动，节奏紧凑，适合短视频观感。' },
            { name: '情感向', prompt: '强调情感冲突与人物内心独白，节奏快但情绪浓烈。' },
            { name: '悬疑向', prompt: '加入悬念与反转，段落末尾留钩子，提升追更动机。' }
        ];

        let templateCache = [];

        async function fetchTemplates() {
            const resp = await fetch('/api/script-templates');
            const data = await resp.json();
            if (data.success) {
                templateCache = data.templates || [];
            } else {
                templateCache = [];
            }
            if (templateCache.length === 0) {
                templateCache = DEFAULT_TEMPLATES.map(t => ({ ...t, id: null }));
            }
        }

        async function renderTemplates() {
            const select = document.getElementById('promptTemplateSelect');
            if (!select) return;
            await fetchTemplates();
            select.innerHTML = '';
            templateCache.forEach((t, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = t.name;
                select.appendChild(opt);
            });
        }

        function loadTemplate() {
            const select = document.getElementById('promptTemplateSelect');
            const output = document.getElementById('scriptPrompt');
            if (!select || !output) return;
            const idx = Number(select.value || 0);
            if (templateCache[idx]) {
                output.value = templateCache[idx].prompt;
            }
        }

        async function saveTemplate() {
            const nameInput = document.getElementById('templateName');
            const promptInput = document.getElementById('scriptPrompt');
            if (!nameInput || !promptInput) return;
            const name = nameInput.value.trim();
            const prompt = promptInput.value.trim();
            if (!name || !prompt) {
                alert('请输入模板名称与提示词');
                return;
            }
            const resp = await fetch('/api/script-templates', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, prompt })
            });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '保存失败');
                return;
            }
            nameInput.value = '';
            await renderTemplates();
        }

        async function deleteTemplate() {
            const select = document.getElementById('promptTemplateSelect');
            if (!select) return;
            const idx = Number(select.value || 0);
            const tpl = templateCache[idx];
            if (!tpl) return;
            if (!confirm(`删除模板 ${tpl.name} ?`)) return;
            if (!tpl.id) {
                alert('默认模板无法删除');
                return;
            }
            const resp = await fetch(`/api/script-templates/${tpl.id}`, { method: 'DELETE' });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '删除失败');
                return;
            }
            await renderTemplates();
            loadTemplate();
        }

        async function loadNovelFile() {
            const input = document.getElementById('novelFile');
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            const text = await file.text();
            document.getElementById('novelInput').value = text;
        }

        function clearNovel() {
            document.getElementById('novelInput').value = '';
        }

        let currentProjectId = null;
        let currentScriptRecordId = null;
        let currentScriptId = null;
        let lastEpisodes = [];
        let currentEpisodeRow = null;
        let pollingTimer = null;

        function updateScriptProgress(text) {
            const el = document.getElementById('scriptProgress');
            if (el) {
                el.textContent = text || '';
            }
        }

        async function generateScript() {
            const text = document.getElementById('novelInput').value.trim();
            const prompt = document.getElementById('scriptPrompt').value.trim();
            const minSeconds = Number(document.getElementById('minSeconds').value || 90);
            const maxSeconds = Number(document.getElementById('maxSeconds').value || 150);
            if (!text) {
                alert('请先输入小说文本');
                return;
            }
            updateScriptProgress('生成中 0%');
            const resp = await fetch('/api/script-generate-async', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text,
                    prompt,
                    min_seconds: minSeconds,
                    max_seconds: maxSeconds,
                    script_id: currentScriptId
                })
            });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '生成失败');
                updateScriptProgress('');
                return;
            }
            const taskId = data.task_id;
            if (taskId) {
                const key = `script_task_${currentProjectId || 'default'}`;
                localStorage.setItem(key, String(taskId));
                pollScriptTask(taskId);
            }
        }

        function renderEpisodeTable(episodes) {
            const wrap = document.getElementById('episodeTableWrap');
            if (!wrap) return;
            if (!episodes || episodes.length === 0) {
                wrap.innerHTML = '<div class="small-hint">暂无分集记录</div>';
                return;
            }
            const rows = episodes.map(ep => `
                <tr>
                    <td style="padding:6px;">${ep.id || '-'}</td>
                    <td style="padding:6px;">${ep.created_at || '-'}</td>
                    <td style="padding:6px;">${ep.episode_index || '-'}</td>
                    <td style="padding:6px;">${ep.title || '-'}</td>
                    <td style="padding:6px;">${ep.duration_seconds || '-'}</td>
                    <td style="padding:6px;">${ep.summary || '-'}</td>
                    <td style="padding:6px;">
                        <button class="btn btn-secondary" onclick="editEpisode(${ep.id}, ${ep.episode_index || 0}, ${ep.script_id || 0})">编辑</button>
                        <button class="btn btn-danger" onclick="deleteEpisode(${ep.id})">删除</button>
                    </td>
                </tr>
            `).join('');
            wrap.innerHTML = `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="text-align:left; padding:6px;">编号</th>
                            <th style="text-align:left; padding:6px;">生成时间</th>
                            <th style="text-align:left; padding:6px;">集数</th>
                            <th style="text-align:left; padding:6px;">集名</th>
                            <th style="text-align:left; padding:6px;">时长</th>
                            <th style="text-align:left; padding:6px;">概览</th>
                            <th style="text-align:left; padding:6px;">本集内容</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        async function loadEpisodeTable(scriptId) {
            const resp = await fetch(`/api/script-episodes?script_id=${scriptId}`);
            const data = await resp.json();
            if (!data.success) {
                renderEpisodeTable([]);
                return;
            }
            renderEpisodeTable(data.episodes || []);
        }

        async function editEpisode(id, episodeIndex, scriptId) {
            currentEpisodeRow = { id, episodeIndex, scriptId };
            const hint = document.getElementById('episodeEditHint');
            if (hint) {
                hint.textContent = `正在编辑第 ${episodeIndex} 集`;
            }
            try {
                const resp = await fetch(`/api/script-episodes/${id}/content`);
                if (!resp.ok) {
                    document.getElementById('episodeEditor').value = '';
                    return;
                }
                const text = await resp.text();
                document.getElementById('episodeEditor').value = text;
            } catch (e) {
                document.getElementById('episodeEditor').value = '';
            }
        }

        async function saveEpisodeContent() {
            if (!currentEpisodeRow) {
                alert('请先选择一集');
                return;
            }
            const content = document.getElementById('episodeEditor').value || '';
            const resp = await fetch(`/api/script-episodes/${currentEpisodeRow.id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    script_id: currentEpisodeRow.scriptId,
                    episode_index: currentEpisodeRow.episodeIndex,
                    content
                })
            });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '保存失败');
                return;
            }
            loadAllEpisodeTable();
        }

        async function deleteEpisode(id) {
            if (!confirm('确认删除本集？')) return;
            const resp = await fetch(`/api/script-episodes/${id}`, { method: 'DELETE' });
            const data = await resp.json();
            if (!data.success) {
                alert(data.error || '删除失败');
                return;
            }
            loadAllEpisodeTable();
        }

        async function loadAllEpisodeTable() {
            const resp = await fetch('/api/script-episodes');
            const data = await resp.json();
            if (!data.success) {
                renderEpisodeTable([]);
                return;
            }
            const episodes = data.episodes || [];
            renderEpisodeTable(episodes);
            if (episodes.length > 0) {
                const maxScriptId = episodes.reduce((acc, ep) => Math.max(acc, Number(ep.script_id || 0)), 0);
                if (maxScriptId) {
                    currentScriptId = maxScriptId;
                }
            }
        }

        async function pollScriptTask(taskId) {
            if (pollingTimer) {
                clearTimeout(pollingTimer);
            }
            const resp = await fetch(`/api/tasks/${taskId}`);
            const data = await resp.json();
            if (!data.success || !data.task) {
                updateScriptProgress('');
                return;
            }
            const task = data.task;
            updateScriptProgress(`生成中 ${task.progress || 0}%`);
            if (task.status === 'completed') {
                updateScriptProgress('完成');
                const result = task.result || {};
                lastEpisodes = result.episodes || [];
                currentScriptId = result.script_id || currentScriptId;
                loadAllEpisodeTable();
                return;
            }
            if (task.status === 'failed') {
                updateScriptProgress('失败');
                if (task.error) {
                    alert(task.error);
                }
                return;
            }
            pollingTimer = setTimeout(() => pollScriptTask(taskId), 2000);
        }

        async function resumeScriptTask() {
            const key = `script_task_${currentProjectId || 'default'}`;
            const taskId = localStorage.getItem(key);
            if (taskId) {
                pollScriptTask(taskId);
            }
        }

        function copyText(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
        }

        function exportText(id, type) {
            const text = document.getElementById(id).value || '';
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = type === 'md' ? 'script.md' : 'script.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function loadProjects() {
            const select = document.getElementById('projectSelect');
            if (!select) return;
            try {
                const resp = await fetch('/api/projects');
                const data = await resp.json();
                if (!data.success) throw new Error(data.error || '加载失败');
                select.innerHTML = '';
                currentProjectId = data.current_project_id;
                data.projects.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    if (String(p.id) === String(data.current_project_id)) {
                        opt.selected = true;
                    }
                    select.appendChild(opt);
                });
                resumeScriptTask();
            } catch (e) {
                select.innerHTML = '<option>项目加载失败</option>';
            }
        }

        async function switchProject(projectId) {
            const resp = await fetch('/api/projects/switch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ project_id: projectId })
            });
            const data = await resp.json();
            if (data.success) {
                location.reload();
            } else {
                alert(data.error || '切换失败');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTemplates();
            loadTemplate();
            const select = document.getElementById('projectSelect');
            if (select) {
                select.addEventListener('change', () => switchProject(select.value));
                loadProjects();
            }
            loadAllEpisodeTable();
        });
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="/static/react-app.js"></script>
    <script src="/static/sidebar-nav.js"></script>
</body>
</html>
