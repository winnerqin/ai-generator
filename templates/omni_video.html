<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能视频 - AI创作工具</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/sidebar-nav.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        .app-shell { min-height: 100vh; }
        .main-content { padding: 0; }
        .page-wrap { max-width: 1220px; margin: 0 auto; padding: 24px; }
        .page-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
        .page-subtitle { color: #aeb8d9; margin-bottom: 18px; }
        .grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 16px; }
        .panel { border-radius: 16px; padding: 18px; margin-bottom: 16px; }
        .field { display: grid; gap: 8px; margin-bottom: 14px; }
        .field input, .field select, .field textarea { width: 100%; box-sizing: border-box; }
        .field textarea { min-height: 110px; resize: vertical; }
        .filename-field { grid-template-columns: auto minmax(0, 1fr) auto; align-items: center; column-gap: 12px; }
        .filename-field label { white-space: nowrap; }
        .filename-input-wrap { position: relative; }
        .filename-input-wrap input { padding-right: 56px; }
        .filename-suffix { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #9ca8cf; font-size: 0.9rem; pointer-events: none; }
        .field-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .asset-card { border-radius: 12px; overflow: hidden; border: 1px solid rgba(86,111,255,0.2); background: rgba(255,255,255,0.02); cursor: pointer; }
        .asset-card.selected { border-color: rgba(86,111,255,0.9); box-shadow: 0 0 0 2px rgba(86,111,255,0.2) inset; }
        .asset-preview { height: 120px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.15); }
        .asset-preview img, .asset-preview video { width: 100%; height: 100%; object-fit: contain; display: block; }
        .asset-info { padding: 8px; display: grid; gap: 4px; font-size: 0.82rem; }
        .library-tabs { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
        .library-tab { border: 1px solid rgba(86,111,255,0.28); background: rgba(255,255,255,0.03); color: inherit; border-radius: 8px; padding: 7px 12px; cursor: pointer; }
        .library-tab.active { border-color: rgba(86,111,255,0.8); background: rgba(86,111,255,0.16); color: #fff; }
        .library-search { position: relative; flex: 0 0 126px; }
        .library-search input { width: 100%; box-sizing: border-box; height: 34px; padding: 7px 34px 7px 12px; }
        .library-clear-search { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; border: none; border-radius: 50%; background: rgba(255,255,255,0.12); color: #dce6ff; cursor: pointer; display: none; line-height: 20px; padding: 0; }
        .library-clear-search.visible { display: inline-flex; align-items: center; justify-content: center; }
        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .library-card { border-radius: 8px; overflow: hidden; border: 1px solid rgba(86,111,255,0.18); background: rgba(255,255,255,0.02); cursor: pointer; }
        .library-card.selected { border-color: rgba(86,111,255,0.9); box-shadow: 0 0 0 2px rgba(86,111,255,0.18) inset; }
        .library-preview { height: 92px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.15); }
        .library-preview img, .library-preview video { width: 100%; height: 100%; object-fit: contain; display: block; }
        .library-info { padding: 6px 8px; font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .library-pager { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
        .selected-list { display: grid; gap: 10px; }
        .selected-item { display: grid; grid-template-columns: 56px 1fr auto; gap: 10px; align-items: center; padding: 8px 10px; border-radius: 12px; background: rgba(86,111,255,0.08); }
        .selected-item[draggable="true"] { cursor: grab; }
        .selected-item.dragging { opacity: 0.5; }
        .selected-item.drag-over { outline: 1px dashed rgba(158,208,255,0.8); outline-offset: 2px; }
        .selected-thumb { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.16); border-radius: 10px; overflow: hidden; }
        .selected-thumb img, .selected-thumb video { width: 100%; height: 100%; object-fit: contain; }
        .selected-thumb { cursor: pointer; }
        .selected-label { font-weight: 600; }
        .upload-box { border: 2px dashed rgba(86,111,255,0.4); border-radius: 14px; padding: 18px; text-align: center; cursor: pointer; }
        .status-box { border: 1px solid rgba(86,111,255,0.22); border-radius: 14px; padding: 12px; background: rgba(86,111,255,0.05); }
        .task-meta { display: grid; gap: 8px; font-size: 0.92rem; }
        .video-preview { width: 100%; margin-top: 14px; border-radius: 12px; background: rgba(0,0,0,0.2); }
        .small-hint { color: #9ca8cf; font-size: 0.85rem; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .filename-audio-toggle { margin-top: 0; white-space: nowrap; }
        .task-actions { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; }
        .primary-submit { padding: 7px 14px; font-size: 1rem; font-weight: 700; }
        .picker-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
        .picker-modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.84); z-index: 2200; }
        .picker-inner { width: min(980px, 94vw); max-height: 88vh; overflow: auto; padding: 18px; border-radius: 16px; background: rgba(8,13,24,0.97); }
        .picker-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
        .picker-toolbar { position: sticky; top: 0; z-index: 5; margin: -18px -18px 14px; padding: 18px 18px 14px; background: rgba(8,13,24,0.98); border-bottom: 1px solid rgba(86,111,255,0.18); }
        .picker-search { margin-bottom: 14px; }
        .picker-search input { width: 100%; box-sizing: border-box; }
        .picker-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 14px; }
        .preview-modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.88); z-index: 2300; }
        .preview-inner { width: min(860px, 92vw); max-height: 88vh; padding: 18px; border-radius: 16px; background: rgba(8,13,24,0.97); }
        .preview-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
        .preview-body img, .preview-body video { width: 100%; max-height: 72vh; object-fit: contain; display: block; }
        .preview-body audio { width: 100%; margin-top: 18px; }
        .is-busy { opacity: 0.7; cursor: wait; }
        @media (max-width: 960px) {
            .grid { grid-template-columns: 1fr; }
            .field-row { grid-template-columns: 1fr; }
            .filename-field { grid-template-columns: auto minmax(0, 1fr); }
            .filename-audio-toggle { grid-column: 2; }
            .asset-upload-row { grid-template-columns: 1fr; }
            .asset-upload-row > div:last-child { padding-left: 0; border-left: none; margin-top: 16px; }
        }
    </style>
</head>
<body class="react-theme sidebar-compact">
    <div class="app-shell">
        {% set active_page = 'omni_video' %}
        {% include "_shared_sidebar.html" %}
        <main class="main-content">
            <div class="page-wrap">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <div class="page-title" style="margin-bottom: 0;">全能视频</div>
            <div id="balanceBar" style="display: flex; align-items: center; gap: 8px; font-size: 0.92rem;">
                <span id="balanceLabel" style="font-weight: 600;">账户余额：</span>
                <span id="balanceValue" style="color: #9ed0ff;">加载中...</span>
                <button id="refreshBalanceBtn" class="btn btn-secondary" style="padding: 2px 8px; font-size: 0.8rem;">刷新</button>
            </div>
        </div>

        <div class="grid">
            <div>
                <div class="panel">
                    <div class="field">
                        <label for="prompt">提示词</label>
                        <textarea id="prompt" placeholder="描述视频内容、镜头运动、风格、节奏和重点主体"></textarea>
                    </div>

                    <div class="field filename-field">
                        <label for="filename">文件名</label>
                        <div class="filename-input-wrap">
                            <input id="filename" type="text" maxlength="120" placeholder="不填则默认使用任务ID">
                            <span class="filename-suffix">.mp4</span>
                        </div>
                        <div class="checkbox-row filename-audio-toggle">
                            <input id="generateAudio" type="checkbox" checked>
                            <label for="generateAudio">生成声音</label>
                        </div>
                    </div>

                    <div class="field-row">
                        <div class="field">
                            <label for="model">模型</label>
                            <select id="model"></select>
                        </div>
                        <div class="field">
                            <label for="resolution">输出分辨率</label>
                            <select id="resolution">
                                <option value="720p" selected>720P</option>
                                <option value="480p">480P</option>
                                <option value="1080p">1080P</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="aspectRatio">比例</label>
                            <select id="aspectRatio">
                                <option value="16:9">16:9</option>
                                <option value="9:16" selected>9:16</option>
                                <option value="1:1">1:1</option>
                                <option value="4:3">4:3</option>
                                <option value="3:4">3:4</option>
                            </select>
                        </div>
                    </div>

                    <div class="field-row">
                        <div class="field">
                            <label for="duration">时长(秒)</label>
                            <select id="duration">
                                <option value="-1" selected>-1</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="frameCount">帧数</label>
                            <input id="frameCount" type="number" min="29" max="289" placeholder="29-289">
                        </div>
                        <div class="field">
                            <label for="seed">Seed</label>
                            <input id="seed" type="number" value="-1">
                        </div>
                    </div>

                </div>

                <div class="panel">
                    <div class="asset-upload-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div>
                            <div style="font-weight: 600; margin-bottom: 10px;">素材上传与选择</div>
                            <div class="upload-box" id="uploadBox">
                                点击上传图片、音频或视频素材
                                <input id="uploadInput" type="file" accept="image/*,audio/*,video/*" multiple style="display:none;">
                            </div>
                            <div class="picker-actions" style="display:none;">
                                <button id="openImagePickerBtn" class="btn btn-secondary" type="button">选择图片素材</button>
                                <button id="openMediaPickerBtn" class="btn btn-secondary" type="button">选择音/视频素材</button>
                            </div>
                        </div>
                        <div style="padding-left: 16px; border-left: 1px solid rgba(86,111,255,0.2);">
                            <div style="font-weight: 600; margin-bottom: 10px;">虚拟人像</div>
                            <div style="display: flex; gap: 10px;">
                                <input id="virtualAvatarInput" type="text" placeholder="输入虚拟人像ID" style="flex: 1;">
                                <button id="addVirtualAvatarBtn" class="btn btn-secondary">添加</button>
                            </div>
                            <div class="small-hint" style="margin-top: 8px;">ID格式：asset-20260310030618-88hlb</div>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <div class="panel">
                    <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;">
                        <div style="font-weight: 600;">已选全能参考素材</div>
                        <button id="clearSelectedAssetsBtn" class="btn btn-secondary" type="button" style="padding:4px 10px; font-size:0.86rem;">清除素材</button>
                    </div>
                    <div class="small-hint" style="margin-bottom: 10px;">图片素材最多 9 个，音/视频素材最多 3 个。</div>
                    <div id="selectedList" class="selected-list">
                        <div class="small-hint">还没有选择参考素材。</div>
                    </div>
                </div>

                <div class="panel">
                    <div class="task-actions" style="margin-bottom: 12px;">
                        <button id="submitBtn" class="btn btn-primary primary-submit">创建全能视频任务</button>
                        <a class="btn btn-secondary" href="/omni-video-tasks">查看任务管理</a>
                    </div>
                    <div class="status-box">
                        <div id="taskStatus" class="task-meta">
                            <div>最近任务会显示在这里。</div>
                        </div>
                        <video id="videoPreview" class="video-preview" controls style="display:none;"></video>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div style="font-weight: 600; margin-bottom: 10px;">素材库</div>
            <div class="library-tabs" id="libraryTabs">
                <button class="library-tab" type="button" data-library-tab="image_material">图片素材</button>
                <button class="library-tab" type="button" data-library-tab="media">音/视频素材</button>
                <button class="library-tab" type="button" data-library-tab="recent_generated">最近生成</button>
                <div class="library-search">
                    <input id="librarySearchInput" type="text" placeholder="按文件名搜索">
                    <button id="libraryClearSearchBtn" class="library-clear-search" type="button" aria-label="清除搜索">×</button>
                </div>
            </div>
            <div id="libraryContent" class="library-grid">
                <div class="small-hint">点击上方标签后加载素材。</div>
            </div>
            <div class="library-pager">
                <div id="libraryPagerInfo" class="small-hint">未加载</div>
                <div class="row">
                    <button id="libraryPrevBtn" class="btn btn-secondary" type="button">上一页</button>
                    <button id="libraryNextBtn" class="btn btn-secondary" type="button">下一页</button>
                </div>
            </div>
        </div>
            </div>
        </main>
    </div>

    <div id="assetPickerModal" class="picker-modal">
        <div class="picker-inner">
            <div class="picker-toolbar">
                <div class="picker-header">
                    <div>
                        <div id="pickerTitle" style="font-weight: 700; font-size: 1.1rem;">选择素材</div>
                        <div id="pickerHint" class="small-hint"></div>
                    </div>
                    <button id="closePickerBtn" class="btn btn-secondary">关闭</button>
                </div>
                <div class="picker-search">
                    <input id="pickerSearch" type="text" placeholder="按文件名搜索当前素材">
                </div>
                <div class="picker-footer" style="margin-top: 0;">
                    <div id="pickerSelectionInfo" class="small-hint">已选择 0 个</div>
                    <button id="applyPickerBtn" class="btn btn-primary">加入参考列表</button>
                </div>
            </div>
            <div id="pickerGrid" class="asset-grid"></div>
        </div>
    </div>

    <div id="selectedPreviewModal" class="preview-modal">
        <div class="preview-inner">
            <div class="preview-header">
                <div id="selectedPreviewTitle" style="font-weight:700;">素材预览</div>
                <button id="closeSelectedPreviewBtn" class="btn btn-secondary">关闭</button>
            </div>
            <div id="selectedPreviewBody" class="preview-body"></div>
        </div>
    </div>

    <script src="/static/sidebar-nav.js"></script>
    <script src="/static/sidebar-shared.js"></script>
    <script>
        const pickerConfigs = {
            image_material: { label: '图片素材', max: 9, hint: '可从原人物/场景素材中多选，最多 9 个。' },
            media: { label: '音/视频素材', max: 3, hint: '可选择音频或视频素材，最多 3 个。' },
            virtual_avatar: { label: '虚拟人像', max: 9, hint: '虚拟人像作为图片素材，最多 9 个。' },
        };

        let currentPickerType = null;
        let pickerAssets = [];
        let tempSelectedIds = new Set();
        let selectedAssets = [];
        let omniConfig = { models: [], default_model: null, model_aliases: {}, configured: false };
        let pickerLoading = false;
        const selectedAssetsStorageKey = 'omniVideoSelectedAssets';
        const libraryPageSize = 20;
        let libraryState = { activeType: null, page: 1, total: 0, items: [], loading: false, search: '' };
        let librarySearchTimer = null;

        function setButtonBusy(button, busy, busyText = null) {
            if (!button) return;
            if (busy) {
                if (button.dataset.busy === 'true') return;
                button.dataset.busy = 'true';
                if (busyText != null) {
                    button.dataset.originalText = button.textContent;
                    button.textContent = busyText;
                }
                button.disabled = true;
                button.classList.add('is-busy');
                return;
            }
            button.disabled = false;
            button.classList.remove('is-busy');
            if (button.dataset.originalText != null) {
                button.textContent = button.dataset.originalText;
                delete button.dataset.originalText;
            }
            delete button.dataset.busy;
        }

        async function withButtonBusy(button, busyText, action) {
            if (button?.dataset.busy === 'true') return;
            setButtonBusy(button, true, busyText);
            try {
                return await action();
            } finally {
                setButtonBusy(button, false);
            }
        }

        function debugLog(label, payload) {
            console.group(`[OmniVideo] ${label}`);
            console.log(payload);
            console.groupEnd();
        }

        function isVideoAsset(asset) {
            return asset.type === 'video' || /\.(mp4|webm|mov)$/i.test(asset.url || '');
        }

        function isAudioAsset(asset) {
            return asset.type === 'audio' || /\.(mp3|wav|m4a|aac|ogg)$/i.test(asset.url || '');
        }

        function isVirtualAvatarAsset(asset) {
            return asset.type === 'virtual_avatar' || (asset.url && asset.url.startsWith('asset://'));
        }

        function isAssetSelected(asset) {
            return selectedAssets.some((item) => item.url === asset.url);
        }

        function updateLibrarySelectionState() {
            document.querySelectorAll('[data-library-url]').forEach((card) => {
                const url = card.getAttribute('data-library-url');
                const selected = selectedAssets.some((asset) => asset.url === url);
                card.classList.toggle('selected', selected);
            });
        }

        function renderPickerGrid() {
            const keyword = document.getElementById('pickerSearch').value.trim().toLowerCase();
            const grid = document.getElementById('pickerGrid');
            const assets = pickerAssets.filter((asset) => (asset.filename || '').toLowerCase().includes(keyword));
            if (!assets.length) {
                grid.innerHTML = '<div class="small-hint">当前素材库暂无可选素材。</div>';
                return;
            }

            grid.innerHTML = assets.map((asset) => {
                let preview = `<img src="${asset.url}" alt="${asset.filename || 'asset'}">`;
                if (isVideoAsset(asset)) preview = `<video src="${asset.url}" preload="metadata"></video>`;
                if (isAudioAsset(asset)) preview = '<div style="font-size:42px;">♪</div>';
                return `
                    <div class="asset-card ${tempSelectedIds.has(String(asset.id)) ? 'selected' : ''}" data-pick="${asset.id}">
                        <div class="asset-preview">${preview}</div>
                        <div class="asset-info">
                            <div>${asset.filename || '-'}</div>
                            <div class="small-hint">${asset.type || '-'}</div>
                            <div class="small-hint">${tempSelectedIds.has(String(asset.id)) ? '已选择' : '点击选择'}</div>
                        </div>
                    </div>
                `;
            }).join('');

            grid.querySelectorAll('[data-pick]').forEach((card) => {
                card.addEventListener('click', () => toggleTempAsset(card.getAttribute('data-pick')));
            });
        }

        function getSelectionKind(asset) {
            if (isVirtualAvatarAsset(asset)) return 'virtual_avatar';
            return isAudioAsset(asset) || isVideoAsset(asset) ? 'media' : 'image_material';
        }

        function isIntlModelSelected() {
            const model = document.getElementById('model').value || '';
            return model.startsWith('dreamina-');
        }

        function supports1080p(model) {
            const alias = (omniConfig.model_aliases && omniConfig.model_aliases[model]) || '';
            return model === 'doubao-seedance-2-0-260128'
                || model === 'dreamina-seedance-2-0-260128'
                || alias === 'doubao-seedance-2-0-260128'
                || alias === 'dreamina-seedance-2-0-260128';
        }

        function modelAlias(model) {
            return (omniConfig.model_aliases && omniConfig.model_aliases[model]) || model || '-';
        }

        function renderModelOptions(models, preferredModel) {
            const modelEl = document.getElementById('model');
            const list = Array.isArray(models) ? models.filter(Boolean) : [];
            if (!list.length) {
                modelEl.innerHTML = '<option value="">未配置可用模型</option>';
                modelEl.value = '';
                return;
            }
            modelEl.innerHTML = list.map((model) => `<option value="${model}">${modelAlias(model)}</option>`).join('');
            if (preferredModel && list.includes(preferredModel)) {
                modelEl.value = preferredModel;
            } else {
                modelEl.value = list[0];
            }
        }

        async function loadOmniConfig() {
            try {
                const resp = await fetch('/api/omni-video/config');
                const data = await resp.json();
                if (!resp.ok || !data.success) {
                    throw new Error(data.error || '加载配置失败');
                }
                omniConfig = data;
                renderModelOptions(data.models || [], data.default_model || '');
            } catch (error) {
                console.error('load omni config failed', error);
                renderModelOptions([], '');
            }
            syncResolutionOptions();
        }

        function syncResolutionOptions() {
            const model = document.getElementById('model').value || '';
            const resolutionEl = document.getElementById('resolution');
            const current = resolutionEl.value;
            const option1080 = resolutionEl.querySelector('option[value="1080p"]');
            const enabled1080 = supports1080p(model);
            if (option1080) {
                option1080.disabled = !enabled1080;
                option1080.hidden = !enabled1080;
            }
            if (!enabled1080 && current === '1080p') {
                resolutionEl.value = '720p';
            }
        }

        function getAssetLabel(asset) {
            const useEnglish = isIntlModelSelected();
            // 图片类型（含虚拟人像）统一按顺序编号
            const isImageKind = !isAudioAsset(asset) && !isVideoAsset(asset);
            if (isImageKind) {
                // 所有图片类型素材统一计数
                const allImages = selectedAssets.filter((item) => !isAudioAsset(item) && !isVideoAsset(item));
                const index = allImages.findIndex((item) => item.url === asset.url) + 1;
                const filename = asset.filename || '';
                if (isVirtualAvatarAsset(asset)) {
                    return useEnglish ? `Image ${index} Virtual Avatar` : `图片${index} 虚拟人像`;
                }
                return useEnglish ? `Image ${index}${filename ? ' ' + filename : ''}` : `图片${index}${filename ? ' ' + filename : ''}`;
            }
            // 音频和视频单独计数
            const kind = isAudioAsset(asset) ? 'audio' : 'video';
            const filtered = selectedAssets.filter((item) => {
                if (kind === 'audio') return isAudioAsset(item);
                return isVideoAsset(item);
            });
            const index = filtered.findIndex((item) => item.url === asset.url) + 1;
            if (kind === 'audio') return useEnglish ? `Audio ${index}` : `音频${index}`;
            return useEnglish ? `Video ${index}` : `视频${index}`;
        }

        function renderSelectedAssets() {
            const container = document.getElementById('selectedList');
            persistSelectedAssets();
            updateLibrarySelectionState();
            if (!selectedAssets.length) {
                container.innerHTML = '<div class="small-hint">还没有选择参考素材。</div>';
                return;
            }

            container.innerHTML = selectedAssets.map((asset, index) => {
                let preview = `<img src="${asset.url}" alt="${asset.filename || 'asset'}">`;
                if (isVirtualAvatarAsset(asset)) preview = '<div style="font-size:28px;color:#9ed0ff;">👤</div>';
                else if (isVideoAsset(asset)) preview = `<video src="${asset.url}" preload="metadata"></video>`;
                else if (isAudioAsset(asset)) preview = '<div style="font-size:28px;">♪</div>';
                const hintText = isVirtualAvatarAsset(asset) ? `ID: ${asset.filename}` : '双击缩略图可放大预览';
                return `
                    <div class="selected-item" draggable="true" data-selected-index="${index}">
                        <div class="selected-thumb" data-preview-selected="${index}" title="${isVirtualAvatarAsset(asset) ? '虚拟人像' : '双击放大预览'}">${preview}</div>
                        <div>
                            <div class="selected-label">${getAssetLabel(asset)}</div>
                            <div class="small-hint">${hintText}</div>
                        </div>
                        <div class="row">
                            <button class="btn btn-danger" data-remove="${index}">移除</button>
                        </div>
                    </div>
                `;
            }).join('');

            container.querySelectorAll('[data-remove]').forEach((button) => {
                button.addEventListener('click', () => {
                    selectedAssets.splice(Number(button.getAttribute('data-remove')), 1);
                    renderSelectedAssets();
                });
            });
            container.querySelectorAll('[data-selected-index]').forEach((item) => {
                item.addEventListener('dragstart', (event) => {
                    item.classList.add('dragging');
                    event.dataTransfer.effectAllowed = 'move';
                    event.dataTransfer.setData('text/plain', item.getAttribute('data-selected-index'));
                });
                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                    container.querySelectorAll('.drag-over').forEach((target) => target.classList.remove('drag-over'));
                });
                item.addEventListener('dragover', (event) => {
                    event.preventDefault();
                    event.dataTransfer.dropEffect = 'move';
                    item.classList.add('drag-over');
                });
                item.addEventListener('dragleave', () => {
                    item.classList.remove('drag-over');
                });
                item.addEventListener('drop', (event) => {
                    event.preventDefault();
                    item.classList.remove('drag-over');
                    const fromIndex = Number(event.dataTransfer.getData('text/plain'));
                    const toIndex = Number(item.getAttribute('data-selected-index'));
                    if (!Number.isInteger(fromIndex) || !Number.isInteger(toIndex) || fromIndex === toIndex) return;
                    const [moved] = selectedAssets.splice(fromIndex, 1);
                    selectedAssets.splice(toIndex, 0, moved);
                    renderSelectedAssets();
                });
            });
            container.querySelectorAll('[data-preview-selected]').forEach((thumb) => {
                thumb.addEventListener('dblclick', () => {
                    const asset = selectedAssets[Number(thumb.getAttribute('data-preview-selected'))];
                    if (asset) openSelectedPreview(asset);
                });
            });
        }

        function persistSelectedAssets() {
            try {
                localStorage.setItem(selectedAssetsStorageKey, JSON.stringify(selectedAssets));
            } catch (_error) {
                // Ignore storage failures; the current page state still works.
            }
        }

        function restoreSelectedAssets() {
            try {
                const raw = localStorage.getItem(selectedAssetsStorageKey);
                if (!raw) return;
                const assets = JSON.parse(raw);
                if (!Array.isArray(assets)) return;
                selectedAssets = assets.filter((asset) => asset && asset.url);
                renderSelectedAssets();
            } catch (_error) {
                selectedAssets = [];
                renderSelectedAssets();
            }
        }

        function clearSelectedAssets() {
            selectedAssets = [];
            try {
                localStorage.removeItem(selectedAssetsStorageKey);
            } catch (_error) {
                // Ignore storage cleanup failures.
            }
            renderSelectedAssets();
        }

        function addOrRemoveReferenceAsset(asset) {
            if (!asset || !asset.url) return;
            const existingIndex = selectedAssets.findIndex((item) => item.url === asset.url);
            if (existingIndex >= 0) {
                selectedAssets.splice(existingIndex, 1);
                renderSelectedAssets();
                return;
            }

            const kind = getSelectionKind(asset);
            const max = pickerConfigs[kind]?.max || 9;
            const currentCount = selectedAssets.filter((item) => getSelectionKind(item) === kind).length;
            if (currentCount >= max) {
                alert(`最多只能选择 ${max} 个${pickerConfigs[kind]?.label || '素材'}`);
                return;
            }
            selectedAssets.push(asset);
            renderSelectedAssets();
        }

        function normalizeLibraryAsset(asset, type) {
            return {
                id: asset.id || asset.task_id || asset.url,
                url: asset.url,
                filename: asset.filename || asset.task_id || '',
                type: type === 'image_material' ? 'image' : (asset.type || 'video'),
                meta: asset.meta || {},
                created_at: asset.created_at || asset.updated_at || '',
            };
        }

        function taskToLibraryAsset(task) {
            const url = task.video_url || task.result_url || task.output_url || '';
            if (!url) return null;
            return {
                id: `omni-task-${task.task_id || url}`,
                url,
                filename: task.filename || task.task_id || 'generated-video',
                type: 'video',
                meta: { task_id: task.task_id, source: 'omni_video', model: task.model },
                created_at: task.created_at || task.updated_at || '',
            };
        }

        function renderLibraryGrid() {
            const content = document.getElementById('libraryContent');
            const pagerInfo = document.getElementById('libraryPagerInfo');
            const searchInput = document.getElementById('librarySearchInput');
            const clearSearchBtn = document.getElementById('libraryClearSearchBtn');
            const totalPages = Math.max(1, Math.ceil((libraryState.total || 0) / libraryPageSize));
            if (searchInput.value !== libraryState.search) searchInput.value = libraryState.search || '';
            clearSearchBtn.classList.toggle('visible', !!searchInput.value.trim());
            document.querySelectorAll('[data-library-tab]').forEach((tab) => {
                tab.classList.toggle('active', tab.getAttribute('data-library-tab') === libraryState.activeType);
            });

            if (!libraryState.activeType) {
                content.innerHTML = '<div class="small-hint">点击上方标签后加载素材。</div>';
                pagerInfo.textContent = '未加载';
                document.getElementById('libraryPrevBtn').disabled = true;
                document.getElementById('libraryNextBtn').disabled = true;
                return;
            }
            const disablePrev = libraryState.loading || libraryState.page <= 1;
            const disableNext = libraryState.loading || libraryState.page >= totalPages;
            document.getElementById('libraryPrevBtn').disabled = disablePrev;
            document.getElementById('libraryNextBtn').disabled = disableNext;
            if (libraryState.loading) {
                content.innerHTML = '<div class="small-hint">加载中...</div>';
                pagerInfo.textContent = `第 ${libraryState.page} 页`;
                return;
            }
            if (!libraryState.items.length) {
                content.innerHTML = '<div class="small-hint">当前暂无素材。</div>';
                pagerInfo.textContent = `第 ${libraryState.page} 页 / 共 ${totalPages} 页，合计 ${libraryState.total || 0} 条`;
                return;
            }

            content.innerHTML = libraryState.items.map((asset, index) => {
                let preview = `<img src="${asset.url}" alt="${asset.filename || 'asset'}">`;
                if (isVideoAsset(asset)) preview = `<video src="${asset.url}" preload="metadata"></video>`;
                if (isAudioAsset(asset)) preview = '<div style="font-size:42px;">♪</div>';
                return `
                    <div class="library-card ${isAssetSelected(asset) ? 'selected' : ''}" data-library-index="${index}" data-library-url="${asset.url}">
                        <div class="library-preview">${preview}</div>
                        <div class="library-info" title="${asset.filename || '-'}">${asset.filename || '-'}</div>
                    </div>
                `;
            }).join('');
            pagerInfo.textContent = `第 ${libraryState.page} 页 / 共 ${totalPages} 页，合计 ${libraryState.total || 0} 条`;
            content.querySelectorAll('[data-library-index]').forEach((card) => {
                card.addEventListener('click', () => {
                    const asset = libraryState.items[Number(card.getAttribute('data-library-index'))];
                    addOrRemoveReferenceAsset(asset);
                });
            });
        }

        async function loadLibrary(type, page = 1, search = libraryState.search || '') {
            libraryState = { activeType: type, page, total: libraryState.total, items: [], loading: true, search };
            renderLibraryGrid();
            try {
                let items = [];
                let total = 0;
                if (type === 'recent_generated') {
                    const params = new URLSearchParams({ page: String(page), page_size: String(libraryPageSize), status: 'succeeded' });
                    if (search.trim()) params.set('search', search.trim());
                    const resp = await fetch(`/api/omni-video/tasks?${params.toString()}`);
                    const data = await resp.json();
                    if (!resp.ok || !data.success) throw new Error(data.error || '加载最近生成失败');
                    items = (data.items || []).map(taskToLibraryAsset).filter(Boolean);
                    total = data.total || items.length;
                } else {
                    const params = new URLSearchParams({ type, page: String(page), page_size: String(libraryPageSize) });
                    if (search.trim()) params.set('search', search.trim());
                    const resp = await fetch(`/api/content-library?${params.toString()}`);
                    const data = await resp.json();
                    if (!resp.ok || !data.success) throw new Error(data.error || '加载素材失败');
                    items = (data.assets || data.items || []).map((asset) => normalizeLibraryAsset(asset, type)).filter((asset) => asset.url);
                    total = data.total || items.length;
                }
                libraryState = { activeType: type, page, total, items, loading: false, search };
            } catch (error) {
                libraryState = { activeType: type, page, total: 0, items: [], loading: false, search };
                alert(error.message || '加载素材失败');
            }
            renderLibraryGrid();
        }

        async function openPicker(type) {
            if (pickerLoading) return;
            pickerLoading = true;
            currentPickerType = type;
            const config = pickerConfigs[type];
            document.getElementById('pickerTitle').textContent = `选择${config.label}`;
            document.getElementById('pickerHint').textContent = config.hint;
            document.getElementById('pickerSearch').value = '';
            tempSelectedIds = new Set(
                selectedAssets
                    .filter((asset) => getSelectionKind(asset) === type)
                    .map((asset) => String(asset.id))
            );
            debugLog('content-library request', { type });
            try {
                const resp = await fetch(`/api/content-library?type=${encodeURIComponent(type)}`);
                const data = await resp.json();
                debugLog('content-library response', data);
                pickerAssets = data.success ? (data.assets || []) : [];
                updatePickerSelectionInfo();
                renderPickerGrid();
                document.getElementById('assetPickerModal').style.display = 'flex';
            } finally {
                pickerLoading = false;
            }
        }

        function closePicker() {
            document.getElementById('assetPickerModal').style.display = 'none';
            pickerAssets = [];
            tempSelectedIds = new Set();
            currentPickerType = null;
        }

        function updatePickerSelectionInfo() {
            const count = tempSelectedIds.size;
            const max = currentPickerType ? pickerConfigs[currentPickerType].max : 0;
            document.getElementById('pickerSelectionInfo').textContent = `已选择 ${count} 个 / 最多 ${max} 个`;
        }

        function toggleTempAsset(assetId) {
            const asset = pickerAssets.find((item) => String(item.id) === String(assetId));
            if (!asset) return;
            const id = String(asset.id);
            if (tempSelectedIds.has(id)) {
                tempSelectedIds.delete(id);
            } else {
                const max = pickerConfigs[currentPickerType].max;
                if (tempSelectedIds.size >= max) {
                    alert(`最多只能选择 ${max} 个${pickerConfigs[currentPickerType].label}`);
                    return;
                }
                tempSelectedIds.add(id);
            }
            updatePickerSelectionInfo();
            renderPickerGrid();
        }

        function applyPickerSelection() {
            if (!currentPickerType) return;
            const type = currentPickerType;
            selectedAssets = selectedAssets.filter((asset) => getSelectionKind(asset) !== type);
            const picked = pickerAssets.filter((asset) => tempSelectedIds.has(String(asset.id)));
            selectedAssets = selectedAssets.concat(picked);
            renderSelectedAssets();
            closePicker();
        }

        function openSelectedPreview(asset) {
            document.getElementById('selectedPreviewTitle').textContent = getAssetLabel(asset);
            const body = document.getElementById('selectedPreviewBody');
            if (isVirtualAvatarAsset(asset)) {
                body.innerHTML = `<div style="text-align:center;padding:40px;"><div style="font-size:80px;color:#9ed0ff;">👤</div><div style="margin-top:20px;color:#9ed0ff;">虚拟人像</div><div style="margin-top:10px;font-size:0.9rem;color:#aeb8d9;">ID: ${asset.filename}</div></div>`;
            } else if (isVideoAsset(asset)) {
                body.innerHTML = `<video controls autoplay src="${asset.url}"></video>`;
            } else if (isAudioAsset(asset)) {
                body.innerHTML = `<div style="text-align:center;font-size:64px;">♪</div><audio controls autoplay src="${asset.url}"></audio>`;
            } else {
                body.innerHTML = `<img src="${asset.url}" alt="${getAssetLabel(asset)}">`;
            }
            document.getElementById('selectedPreviewModal').style.display = 'flex';
        }

        function closeSelectedPreview() {
            document.getElementById('selectedPreviewModal').style.display = 'none';
            document.getElementById('selectedPreviewBody').innerHTML = '';
        }

        function addUploadedAsset(asset) {
            if (!asset || !asset.url) return;
            const normalized = {
                id: asset.id,
                url: asset.url,
                filename: asset.filename || '',
                type: asset.type === 'image_material' ? 'image' : asset.type,
                meta: asset.meta || {},
            };
            const kind = getSelectionKind(normalized);
            const max = pickerConfigs[kind].max;
            if (selectedAssets.some((item) => item.url === normalized.url)) return;
            const currentCount = selectedAssets.filter((item) => getSelectionKind(item) === kind).length;
            if (currentCount >= max) return;
            selectedAssets.push(normalized);
        }

        function addVirtualAvatar(assetId) {
            if (!assetId) return;
            // 验证格式：asset-20260310030618-88hlb
            const trimmed = assetId.trim();
            if (!/^asset-\d{14}-[a-z0-9]{4,6}$/i.test(trimmed)) {
                alert('虚拟人像ID格式不正确，应为：asset-20260310030618-88hlb');
                return;
            }
            const url = `asset://${trimmed}`;
            const normalized = {
                id: `virtual-avatar-${trimmed}`,
                url: url,
                filename: trimmed,
                type: 'virtual_avatar',
                meta: {},
            };
            // 检查是否已存在
            if (selectedAssets.some((item) => item.url === url)) {
                alert('该虚拟人像已添加');
                return;
            }
            // 检查数量限制（虚拟人像和普通图片共用9个限制）
            const imageCount = selectedAssets.filter((item) => !isAudioAsset(item) && !isVideoAsset(item)).length;
            if (imageCount >= pickerConfigs.image_material.max) {
                alert(`图片素材（含虚拟人像）最多 ${pickerConfigs.image_material.max} 个`);
                return;
            }
            selectedAssets.push(normalized);
            renderSelectedAssets();
            document.getElementById('virtualAvatarInput').value = '';
        }

        function inferAssetTypeFromUrl(url) {
            const value = String(url || '').toLowerCase();
            if (value.startsWith('asset://')) return 'virtual_avatar';
            if (/\.(mp3|wav|m4a|aac|ogg)(\?|$)/.test(value)) return 'audio';
            if (/\.(mp4|webm|mov|mkv)(\?|$)/.test(value)) return 'video';
            return 'image';
        }

        function buildPrefillAsset(url, index) {
            const type = inferAssetTypeFromUrl(url);
            let filename = '';
            // 虚拟人像URL格式: asset://asset-xxx，提取asset ID作为filename
            if (type === 'virtual_avatar' && url.startsWith('asset://')) {
                filename = url.replace('asset://', '');
            }
            return {
                id: `prefill-${index}`,
                url,
                filename,
                type,
                meta: {},
            };
        }

        function applyRegeneratePrefill() {
            let raw = null;
            try {
                raw = localStorage.getItem('omniVideoRegenerateData');
            } catch (_error) {
                return;
            }
            if (!raw) return;

            try {
                const data = JSON.parse(raw);
                document.getElementById('prompt').value = data.prompt || '';
                document.getElementById('filename').value = data.filename_base || data.filename || '';
                if (data.model) document.getElementById('model').value = data.model;
                if (data.resolution) document.getElementById('resolution').value = data.resolution;
                if (data.aspect_ratio) document.getElementById('aspectRatio').value = data.aspect_ratio;
                document.getElementById('seed').value = data.seed ?? -1;
                document.getElementById('generateAudio').checked = data.generate_audio !== false;

                const frameCountValue = data.frame_count;
                const isValidFrameCount = frameCountValue != null && frameCountValue >= 29 && frameCountValue <= 289;
                if (isValidFrameCount) {
                    document.getElementById('frameCount').value = frameCountValue;
                    // 保存原始 duration 值，以便用户清空 frameCount 后能恢复
                    window._prefillBackupDuration = data.duration ?? -1;
                    document.getElementById('duration').value = '-1';
                } else {
                    document.getElementById('frameCount').value = '';
                    document.getElementById('duration').value = String(data.duration ?? -1);
                    window._prefillBackupDuration = undefined;
                }

                selectedAssets = Array.isArray(data.reference_urls)
                    ? data.reference_urls.filter(Boolean).map((url, index) => buildPrefillAsset(url, index))
                    : [];
                renderSelectedAssets();
                syncDurationState();
            } catch (_error) {
                // Ignore malformed prefill data and continue with defaults.
            } finally {
                try {
                    localStorage.removeItem('omniVideoRegenerateData');
                } catch (_error) {
                    // Ignore storage cleanup failures.
                }
            }
        }

        async function uploadMedia(files) {
            const list = Array.from(files || []);
            for (const file of list) {
                const formData = new FormData();
                formData.append('file', file);
                const uploadType = file.type.startsWith('image/') ? 'image_material' : 'media';
                formData.append('type', uploadType);
                debugLog('upload-media request', { filename: file.name, size: file.size, type: file.type });
                const resp = await fetch('/api/upload-media-asset', { method: 'POST', body: formData });
                const data = await resp.json();
                debugLog('upload-media response', data);
                if (!resp.ok || !data.success) {
                    alert(data.error || `上传失败: ${file.name}`);
                    return;
                }
                addUploadedAsset(data.asset || {});
            }
            renderSelectedAssets();
            if (currentPickerType) {
                await openPicker(currentPickerType);
            }
        }

        function syncDurationState() {
            const frameCount = document.getElementById('frameCount').value.trim();
            const durationEl = document.getElementById('duration');
            const wasDisabled = durationEl.disabled;
            durationEl.disabled = !!frameCount;
            // 当 frameCount 被清空（从有值变为无值）且存在备份 duration 时，恢复备份值
            if (!frameCount && wasDisabled && window._prefillBackupDuration != null) {
                durationEl.value = String(window._prefillBackupDuration);
                window._prefillBackupDuration = undefined;
            }
        }

        function buildPayload() {
            const frameCountValue = document.getElementById('frameCount').value.trim();
            const hasFrameCount = frameCountValue && Number(frameCountValue) >= 29 && Number(frameCountValue) <= 289;
            return {
                prompt: document.getElementById('prompt').value.trim(),
                filename: document.getElementById('filename').value.trim(),
                model: document.getElementById('model').value,
                resolution: document.getElementById('resolution').value,
                // 当有有效的 frame_count 时，duration 不应提交（设为 -1 让后端忽略）
                duration: hasFrameCount ? -1 : Number(document.getElementById('duration').value || -1),
                frame_count: hasFrameCount ? Number(frameCountValue) : null,
                aspect_ratio: document.getElementById('aspectRatio').value,
                seed: Number(document.getElementById('seed').value || -1),
                generate_audio: document.getElementById('generateAudio').checked,
                reference_urls: selectedAssets.map((asset) => asset.url).filter(Boolean),
            };
        }

        function renderTask(task, message) {
            const box = document.getElementById('taskStatus');
            const video = document.getElementById('videoPreview');
            const inputPayload = task.input_payload_json || {};
            box.innerHTML = `
                <div><strong>文件名：</strong>${task.filename || '-'}</div>
                <div><strong>任务ID：</strong>${task.task_id || '-'}</div>
                <div><strong>状态：</strong>${task.status || '-'}</div>
                <div><strong>模型：</strong>${modelAlias(task.model || inputPayload.model || '-')}</div>
                <div><strong>分辨率：</strong>${task.resolution || inputPayload.resolution || '-'}</div>
                <div><strong>比例：</strong>${task.aspect_ratio || inputPayload.aspect_ratio || inputPayload.ratio || '-'}</div>
                <div><strong>时长：</strong>${inputPayload.frame_count ? '-' : (inputPayload.duration ?? '-')}</div>
                <div><strong>帧数：</strong>${inputPayload.frame_count ?? '-'}</div>
                <div><strong>生成声音：</strong>${String(inputPayload.generate_audio ?? true)}</div>
                <div><strong>说明：</strong>${message || '-'}</div>
            `;
            if (task.video_url) {
                video.style.display = 'block';
                video.src = task.video_url;
            } else {
                video.style.display = 'none';
                video.removeAttribute('src');
            }
        }

        async function createTask() {
            const payload = buildPayload();
            debugLog('create-task payload', payload);
            if (!payload.prompt) {
                alert('提示词不能为空');
                return;
            }
            const button = document.getElementById('submitBtn');
            await withButtonBusy(button, '创建中...', async () => {
                const resp = await fetch('/api/omni-video/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await resp.json();
                debugLog('create-task response', data);
                if (!resp.ok || !data.success) {
                    throw new Error(data.error || '创建任务失败');
                }
                renderTask(data.task || {}, data.message);
            }).catch((error) => {
                alert(error.message || '创建任务失败');
            });
        }

        document.getElementById('submitBtn').addEventListener('click', createTask);
        document.getElementById('clearSelectedAssetsBtn').addEventListener('click', clearSelectedAssets);
        document.getElementById('uploadBox').addEventListener('click', () => {
            document.getElementById('uploadInput').click();
        });
        document.getElementById('uploadInput').addEventListener('change', async (event) => {
            const trigger = document.getElementById('uploadBox');
            try {
                await withButtonBusy(trigger, '上传中...', () => uploadMedia(event.target.files));
            } finally {
                event.target.value = '';
            }
        });
        document.getElementById('frameCount').addEventListener('input', syncDurationState);
        document.getElementById('openImagePickerBtn').addEventListener('click', (event) => withButtonBusy(event.currentTarget, '打开中...', () => openPicker('image_material')));
        document.getElementById('openMediaPickerBtn').addEventListener('click', (event) => withButtonBusy(event.currentTarget, '打开中...', () => openPicker('media')));
        document.querySelectorAll('[data-library-tab]').forEach((tab) => {
            tab.addEventListener('click', () => {
                loadLibrary(tab.getAttribute('data-library-tab'), 1, document.getElementById('librarySearchInput').value.trim());
            });
        });
        document.getElementById('librarySearchInput').addEventListener('input', (event) => {
            const value = event.target.value.trim();
            document.getElementById('libraryClearSearchBtn').classList.toggle('visible', !!value);
            if (!libraryState.activeType) return;
            clearTimeout(librarySearchTimer);
            librarySearchTimer = setTimeout(() => loadLibrary(libraryState.activeType, 1, value), 300);
        });
        document.getElementById('libraryClearSearchBtn').addEventListener('click', () => {
            document.getElementById('librarySearchInput').value = '';
            document.getElementById('libraryClearSearchBtn').classList.remove('visible');
            if (libraryState.activeType) loadLibrary(libraryState.activeType, 1, '');
        });
        document.getElementById('libraryPrevBtn').addEventListener('click', () => {
            if (!libraryState.activeType || libraryState.page <= 1) return;
            loadLibrary(libraryState.activeType, libraryState.page - 1, libraryState.search);
        });
        document.getElementById('libraryNextBtn').addEventListener('click', () => {
            if (!libraryState.activeType) return;
            const totalPages = Math.max(1, Math.ceil((libraryState.total || 0) / libraryPageSize));
            if (libraryState.page >= totalPages) return;
            loadLibrary(libraryState.activeType, libraryState.page + 1, libraryState.search);
        });
        document.getElementById('pickerSearch').addEventListener('input', renderPickerGrid);
        document.getElementById('closePickerBtn').addEventListener('click', closePicker);
        document.getElementById('applyPickerBtn').addEventListener('click', (event) => withButtonBusy(event.currentTarget, '加入中...', async () => {
            applyPickerSelection();
        }));
        document.getElementById('assetPickerModal').addEventListener('click', (event) => {
            if (event.target === event.currentTarget) {
                closePicker();
            }
        });
        document.getElementById('closeSelectedPreviewBtn').addEventListener('click', closeSelectedPreview);
        document.getElementById('selectedPreviewModal').addEventListener('click', (event) => {
            if (event.target === event.currentTarget) {
                closeSelectedPreview();
            }
        });

        // 虚拟人像相关事件
        document.getElementById('addVirtualAvatarBtn').addEventListener('click', (event) => withButtonBusy(event.currentTarget, '添加中...', async () => {
            const input = document.getElementById('virtualAvatarInput');
            addVirtualAvatar(input.value);
        }));
        document.getElementById('virtualAvatarInput').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                addVirtualAvatar(event.target.value);
            }
        });

        // 模型选择变化时重新渲染素材列表，更新素材名称显示
        document.getElementById('model').addEventListener('change', () => {
            syncResolutionOptions();
            renderSelectedAssets();
        });

        syncDurationState();
        renderLibraryGrid();
        loadOmniConfig().then(() => {
            restoreSelectedAssets();
            applyRegeneratePrefill();
            syncResolutionOptions();
        });

        // 账户余额查询逻辑
        const BALANCE_REFRESH_MS = 60 * 60 * 1000; // 1小时
        let balanceTimer = null;

        function formatBalance(amount) {
            return `¥${Number(amount || 0).toFixed(2)}`;
        }

        async function loadBalance() {
            const labelEl = document.getElementById('balanceLabel');
            const valueEl = document.getElementById('balanceValue');
            const btnEl = document.getElementById('refreshBalanceBtn');
            try {
                valueEl.textContent = '查询中...';
                setButtonBusy(btnEl, true, '刷新中...');
                const resp = await fetch('/api/omni-video/balance');
                const data = await resp.json();
                if (data.success) {
                    labelEl.textContent = data.balance_type === 'user' ? '我的余额：' : '系统余额：';
                    valueEl.textContent = formatBalance(data.available_balance);
                } else {
                    valueEl.textContent = '查询失败';
                }
            } catch (error) {
                valueEl.textContent = '查询失败';
            } finally {
                setButtonBusy(btnEl, false);
            }
        }

        function startBalanceTimer() {
            if (balanceTimer) {
                clearInterval(balanceTimer);
            }
            balanceTimer = setInterval(loadBalance, BALANCE_REFRESH_MS);
        }

        document.getElementById('refreshBalanceBtn').addEventListener('click', loadBalance);
        loadBalance();
        startBalanceTimer();
    </script>
</body>
</html>
