<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报表统计 - Ai创作工具</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/sidebar-nav.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        .app-shell { display: flex; min-height: 100vh; }
        .main-content { padding: 0; flex: 1; min-width: 0; }
        .page-wrap { padding: 20px 24px 36px; }
        .page-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 16px; }
        .panel { border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .stat-card { background: linear-gradient(135deg, rgba(126,184,255,0.18) 0%, rgba(90,156,245,0.08) 100%); border: 1px solid rgba(86,111,255,0.3); border-radius: 14px; padding: 14px; }
        .stat-card .label { font-size: 0.85rem; color: #c8d2ff; opacity: 0.9; }
        .stat-card .value { margin-top: 8px; font-size: 1.6rem; font-weight: 800; color: #fff; }
        .stat-card .sub { margin-top: 4px; font-size: 0.8rem; color: #9ed0ff; }
        .filter-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .filter-row label { font-weight: 600; font-size: 0.9rem; }
        .filter-input { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(86,111,255,0.3); background: rgba(11,15,26,0.6); color: #e6ebff; font-size: 0.9rem; }
        .period-btn { padding: 8px 16px; border-radius: 10px; border: 1px solid rgba(86,111,255,0.3); background: rgba(11,15,26,0.6); color: #e6ebff; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
        .period-btn:hover { background: rgba(86,111,255,0.2); }
        .period-btn.active { background: rgba(86,111,255,0.3); border-color: rgba(86,111,255,0.6); color: #fff; }
        .tab-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
        .tab-btn { padding: 8px 18px; border-radius: 10px; border: 1px solid rgba(86,111,255,0.3); background: rgba(11,15,26,0.6); color: #c8d2ff; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
        .tab-btn:hover { background: rgba(86,111,255,0.15); }
        .tab-btn.active { background: rgba(86,111,255,0.25); border-color: rgba(86,111,255,0.5); color: #fff; font-weight: 600; }
        .btn-export { padding: 8px 16px; border-radius: 10px; border: 1px solid rgba(40,167,69,0.4); background: rgba(40,167,69,0.15); color: #9ed0ff; font-size: 0.9rem; cursor: pointer; margin-left: auto; }
        .btn-export:hover { background: rgba(40,167,69,0.25); }
        .table-wrap { overflow-x: auto; margin-top: 10px; }
        .tbl { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .tbl th, .tbl td { padding: 10px 12px; border: 1px solid rgba(86,111,255,0.25); text-align: left; vertical-align: top; }
        .tbl th { background: rgba(86,111,255,0.15); font-weight: 600; color: #e6ebff; }
        .tbl td { color: #c8d2ff; }
        .tbl tr:hover td { background: rgba(86,111,255,0.08); }
        .duration-value { color: #9ed0ff; font-weight: 600; }
        .section-title { font-weight: 800; margin-bottom: 10px; color: #e6ebff; }
    </style>
</head>
<body>
    <div id="reactApp"></div>
    <script>
        window.__APP_CONTEXT__ = { username: "{{ user.username }}", is_system_admin: {{ 'true' if user.username == 'system_admin' else 'false' }} };
    </script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="/static/sidebar-react.js"></script>
    <script src="/static/sidebar-nav.js"></script>
    {% raw %}
    <script type="text/babel">
        const { useEffect, useState } = React;

        const Sidebar = (props) => <window.AppSidebar {...props} activePage="stats" />;

        function formatDuration(seconds) {
            if (!seconds || seconds === 0) return '0秒';
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            if (hours > 0) return `${hours}时${minutes}分${secs}秒`;
            if (minutes > 0) return `${minutes}分${secs}秒`;
            return `${secs}秒`;
        }

        function App() {
            const [projects, setProjects] = useState([]);
            const [currentProjectId, setCurrentProjectId] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const [period, setPeriod] = useState('last7days');
            const [customStart, setCustomStart] = useState('');
            const [customEnd, setCustomEnd] = useState('');
            const [usernameFilter, setUsernameFilter] = useState('');
            const [activeTab, setActiveTab] = useState('user');

            const [overview, setOverview] = useState({
                total_users: 0,
                image: { total: 0, today: 0, last7days: 0, period: 0 },
                video: { total: 0, today: 0, last7days: 0, period: 0, total_duration: 0, today_duration: 0, last7days_duration: 0, period_duration: 0 },
                enhance: { total: 0, today: 0, last7days: 0, period: 0 }
            });
            const [userStats, setUserStats] = useState([]);
            const [dailyStats, setDailyStats] = useState([]);
            const [statusReport, setStatusReport] = useState({});
            const [tokenReport, setTokenReport] = useState({
                total_tokens: 0,
                video_generation_tokens: 0,
                daily_tokens: [],
                user_tokens: []
            });

            useEffect(() => {
                document.body.classList.add('react-theme', 'sidebar-compact');
            }, []);

            useEffect(() => {
                fetch('/api/projects').then(res => res.json()).then(data => {
                    if (data.success) {
                        setProjects(data.projects || []);
                        setCurrentProjectId(String(data.current_project_id || ''));
                    }
                });
            }, []);

            useEffect(() => {
                loadStats();
            }, [period]);

            const onProjectChange = async (pid) => {
                const r = await fetch('/api/projects/switch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project_id: pid })
                });
                const d = await r.json();
                if (d.success) window.location.reload();
            };

            const loadStats = async () => {
                setLoading(true);
                setError('');
                try {
                    const params = new URLSearchParams();
                    params.append('period', period);
                    if (period === 'custom' && customStart && customEnd) {
                        params.append('start_date', customStart);
                        params.append('end_date', customEnd);
                    }
                    if (usernameFilter) {
                        params.append('username', usernameFilter);
                    }
                    const res = await fetch('/api/stats?' + params.toString());
                    const json = await res.json();
                    if (!json.success) throw new Error(json.error || '加载统计失败');

                    const data = json.data;
                    setOverview(data.overview || {});
                    setUserStats(data.user_stats || []);
                    setDailyStats(data.daily_stats || []);
                    setStatusReport(data.status_report || {});
                    setTokenReport(data.token_report || { total_tokens: 0, daily_tokens: [], user_tokens: [] });
                } catch (e) {
                    setError(e.message || '加载失败');
                } finally {
                    setLoading(false);
                }
            };

            const handleUsernameSearch = () => {
                loadStats();
            };

            const clearUsernameFilter = () => {
                setUsernameFilter('');
                loadStats();
            };

            const handlePeriodChange = (p) => {
                setPeriod(p);
                if (p !== 'custom') {
                    loadStats();
                }
            };

            const handleCustomSearch = () => {
                if (customStart && customEnd) {
                    loadStats();
                }
            };

            const exportCSV = () => {
                let csvContent = '';
                let filename = '';

                if (activeTab === 'user') {
                    filename = 'user_stats.csv';
                    csvContent = '用户ID,用户名,图片数,视频数,视频时长(秒),增强数,视频Token,总计,最后活动\n';
                    userStats.forEach(s => {
                        csvContent += `${s.user_id},${s.username},${s.image_count},${s.video_count},${s.video_duration},${s.enhance_count},${s.video_tokens || 0},${s.total_count},${s.last_active || '无'}\n`;
                    });
                } else {
                    filename = 'daily_stats.csv';
                    csvContent = '日期,图片数,视频数,视频时长(秒),增强数,视频Token,参与用户\n';
                    dailyStats.forEach(s => {
                        csvContent += `${s.date},${s.image_count},${s.video_count},${s.video_duration},${s.enhance_count},${s.video_tokens || 0},${s.user_count}\n`;
                    });
                }

                const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            };

            return (
                <div className="app-shell">
                    <Sidebar
                        username={window.__APP_CONTEXT__?.username || 'system_admin'}
                        projects={projects}
                        currentProjectId={currentProjectId}
                        onProjectChange={onProjectChange}
                    />
                    <div className="main-content">
                        <div className="page-wrap">
                            <div className="page-title">📊 报表统计</div>
                            {error && <div className="small-hint" style={{ color: '#ff9aa2', marginBottom: 12 }}>{error}</div>}

                            {/* 日期筛选 */}
                            <div className="panel">
                                <div className="filter-row">
                                    <button className={`period-btn ${period === 'day' ? 'active' : ''}`} onClick={() => handlePeriodChange('day')}>今日</button>
                                    <button className={`period-btn ${period === 'last7days' ? 'active' : ''}`} onClick={() => handlePeriodChange('last7days')}>近7天</button>
                                    <button className={`period-btn ${period === 'month' ? 'active' : ''}`} onClick={() => handlePeriodChange('month')}>近30天</button>
                                    <button className={`period-btn ${period === 'custom' ? 'active' : ''}`} onClick={() => handlePeriodChange('custom')}>自定义</button>
                                    {period === 'custom' && (
                                        <>
                                            <input className="filter-input" type="date" value={customStart} onChange={(e) => setCustomStart(e.target.value)} />
                                            <span className="small-hint">至</span>
                                            <input className="filter-input" type="date" value={customEnd} onChange={(e) => setCustomEnd(e.target.value)} />
                                            <button className="btn-convert" onClick={handleCustomSearch} disabled={loading}>{loading ? '查询中...' : '查询'}</button>
                                        </>
                                    )}
                                </div>
                                {/* 用户名筛选 */}
                                <div className="filter-row" style={{ marginTop: '10px' }}>
                                    <label className="small-hint">用户名:</label>
                                    <input className="filter-input" type="text" placeholder="输入用户名筛选" value={usernameFilter} onChange={(e) => setUsernameFilter(e.target.value)} style={{ width: '150px' }} />
                                    <button className="btn-convert" onClick={handleUsernameSearch} disabled={loading}>筛选</button>
                                    {usernameFilter && <button className="period-btn" onClick={clearUsernameFilter}>清除</button>}
                                </div>
                            </div>

                            {/* 概览卡片 */}
                            <div className="panel">
                                <div className="section-title">📈 任务概览</div>
                                <div className="stats-grid">
                                    <div className="stat-card">
                                        <div className="label">👤 用户总数</div>
                                        <div className="value">{overview.total_users}</div>
                                    </div>
                                    <div className="stat-card">
                                        <div className="label">🖼️ 图片生成</div>
                                        <div className="value">{overview.image?.period || overview.image?.last7days || overview.image?.total || 0}</div>
                                        <div className="sub">今日: {overview.image?.today || 0}</div>
                                    </div>
                                    <div className="stat-card">
                                        <div className="label">🎬 视频生成</div>
                                        <div className="value">{overview.video?.period || overview.video?.last7days || overview.video?.total || 0}</div>
                                        <div className="sub">今日: {overview.video?.today || 0}</div>
                                    </div>
                                    <div className="stat-card">
                                        <div className="label">✨ 增强任务</div>
                                        <div className="value">{overview.enhance?.period || overview.enhance?.last7days || overview.enhance?.total || 0}</div>
                                        <div className="sub">今日: {overview.enhance?.today || 0}</div>
                                    </div>
                                </div>
                            </div>

                            {/* 视频时长统计 */}
                            <div className="panel">
                                <div className="section-title">⏱️ 视频时长统计</div>
                                <div className="stats-grid">
                                    <div className="stat-card">
                                        <div className="label">总时长</div>
                                        <div className="value duration-value">{formatDuration(overview.video?.period_duration || overview.video?.last7days_duration || overview.video?.total_duration || 0)}</div>
                                    </div>
                                    <div className="stat-card">
                                        <div className="label">今日时长</div>
                                        <div className="value duration-value">{formatDuration(overview.video?.today_duration || 0)}</div>
                                    </div>
                                    <div className="stat-card">
                                        <div className="label">近7天时长</div>
                                        <div className="value duration-value">{formatDuration(overview.video?.last7days_duration || 0)}</div>
                                    </div>
                                </div>
                            </div>

                            {/* Token消耗统计 */}
                            <div className="panel">
                                <div className="section-title">🔋 Token消耗统计（全能视频）</div>
                                <div className="stats-grid">
                                    <div className="stat-card">
                                        <div className="label">总消耗</div>
                                        <div className="value">{tokenReport.total_tokens || 0}</div>
                                    </div>
                                </div>
                            </div>

                            {/* 任务状态统计 */}
                            <div className="panel">
                                <div className="section-title">📋 任务状态统计</div>
                                <div className="stats-grid">
                                    <div className="stat-card">
                                        <div className="label">图片成功率</div>
                                        <div className="value">{statusReport.image?.success_rate || 0}%</div>
                                        <div className="sub">成功: {statusReport.image?.success || 0} / 失败: {statusReport.image?.failed || 0}</div>
                                    </div>
                                    <div className="stat-card">
                                        <div className="label">视频成功率</div>
                                        <div className="value">{statusReport.video?.success_rate || 0}%</div>
                                        <div className="sub">成功: {statusReport.video?.success || 0} / 待处理: {statusReport.video?.pending || 0}</div>
                                    </div>
                                    <div className="stat-card">
                                        <div className="label">全能视频成功率</div>
                                        <div className="value">{statusReport.omni_video?.success_rate || 0}%</div>
                                        <div className="sub">成功: {statusReport.omni_video?.success || 0} / 排队: {statusReport.omni_video?.queued || 0}</div>
                                    </div>
                                    <div className="stat-card">
                                        <div className="label">增强成功率</div>
                                        <div className="value">{statusReport.enhance?.success_rate || 0}%</div>
                                        <div className="sub">成功: {statusReport.enhance?.success || 0} / 排队: {statusReport.enhance?.queued || 0}</div>
                                    </div>
                                </div>
                            </div>

                            {/* Tab切换 */}
                            <div className="panel">
                                <div className="tab-bar">
                                    <button className={`tab-btn ${activeTab === 'user' ? 'active' : ''}`} onClick={() => setActiveTab('user')}>用户统计</button>
                                    <button className={`tab-btn ${activeTab === 'daily' ? 'active' : ''}`} onClick={() => setActiveTab('daily')}>每日趋势</button>
                                    <button className="btn-export" onClick={exportCSV}>导出CSV</button>
                                </div>

                                {activeTab === 'user' && (
                                    <div className="table-wrap">
                                        <table className="tbl">
                                            <thead>
                                                <tr>
                                                    <th>用户ID</th>
                                                    <th>用户名</th>
                                                    <th>图片数</th>
                                                    <th>视频数</th>
                                                    <th>视频时长</th>
                                                    <th>增强数</th>
                                                    <th>视频Token</th>
                                                    <th>总计</th>
                                                    <th>最后活动</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {userStats.length === 0 ? (
                                                    <tr><td colSpan="9" className="small-hint">暂无数据</td></tr>
                                                ) : userStats.map(s => (
                                                    <tr key={s.user_id}>
                                                        <td>{s.user_id}</td>
                                                        <td style={{ fontWeight: 800 }}>{s.username}</td>
                                                        <td>{s.image_count}</td>
                                                        <td>{s.video_count}</td>
                                                        <td className="duration-value">{formatDuration(s.video_duration)}</td>
                                                        <td>{s.enhance_count}</td>
                                                        <td style={{ color: '#9ed0ff' }}>{s.video_tokens || 0}</td>
                                                        <td style={{ fontWeight: 600 }}>{s.total_count}</td>
                                                        <td>{s.last_active || '无'}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {activeTab === 'daily' && (
                                    <div className="table-wrap">
                                        <table className="tbl">
                                            <thead>
                                                <tr>
                                                    <th>日期</th>
                                                    <th>图片数</th>
                                                    <th>视频数</th>
                                                    <th>视频时长</th>
                                                    <th>增强数</th>
                                                    <th>视频Token</th>
                                                    <th>参与用户</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {dailyStats.length === 0 ? (
                                                    <tr><td colSpan="7" className="small-hint">暂无数据</td></tr>
                                                ) : dailyStats.map(s => (
                                                    <tr key={s.date}>
                                                        <td style={{ fontWeight: 800 }}>{s.date}</td>
                                                        <td>{s.image_count}</td>
                                                        <td>{s.video_count}</td>
                                                        <td className="duration-value">{formatDuration(s.video_duration)}</td>
                                                        <td>{s.enhance_count}</td>
                                                        <td style={{ color: '#9ed0ff' }}>{s.video_tokens || 0}</td>
                                                        <td>{s.user_count}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('reactApp')).render(<App />);
    </script>
    {% endraw %}
</body>
</html>
