<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分镜生成 - Ai创作工具</title>
    <script src="/static/state-manager.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/sidebar-nav.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        .page-title {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 14px;
            color: #333;
        }

        .panel {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            margin-bottom: 16px;
        }

        .panel-title {
            font-size: 1.05em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .form-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            min-height: 160px;
            resize: vertical;
            font-family: inherit;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-primary {
            background: #28a745;
            color: #fff;
        }

        .btn-secondary {
            background: #6c757d;
            color: #fff;
        }

        .episode-list {
            border: 1px dashed #ddd;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
        }

        .episode-item {
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }

        .episode-item:last-child {
            border-bottom: none;
        }

        .small-hint {
            color: #666;
            font-size: 0.85em;
        }

        .workflow {
            display: flex;
            gap: 12px;
            align-items: stretch;
            flex-wrap: wrap;
        }

        .workflow-node {
            flex: 1;
            min-width: 220px;
            background: #f8f9fb;
            border: 1px solid #e6e9ef;
            border-radius: 10px;
            padding: 12px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
        }

        .workflow-arrow {
            display: flex;
            align-items: center;
            font-size: 1.4em;
            color: #999;
        }

        .node-title {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .node-body {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
    </style>
</head>
<body class="sidebar-compact">
    <div id="reactApp"></div>
    {% set active_page = 'storyboard_studio' %}
    {% include "_shared_sidebar.html" %}

    <div class="main-content">
        <div class="container">
            <div class="content" style="padding-top: 20px;">
                <div class="panel">
                    <div class="panel-title">分镜生成已下线</div>
                    <div class="small-hint">请使用「分镜制作」页面完成分镜生产流程。</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentProjectId = null;

        async function loadProjects() {
            const select = document.getElementById('projectSelect');
            if (!select) return;
            try {
                const resp = await fetch('/api/projects');
                const data = await resp.json();
                if (!data.success) throw new Error(data.error || '加载失败');
                select.innerHTML = '';
                currentProjectId = data.current_project_id;
                data.projects.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    if (String(p.id) === String(data.current_project_id)) {
                        opt.selected = true;
                    }
                    select.appendChild(opt);
                });
            } catch (e) {
                select.innerHTML = '<option>项目加载失败</option>';
            }
        }

        async function switchProject(projectId) {
            const resp = await fetch('/api/projects/switch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ project_id: projectId })
            });
            const data = await resp.json();
            if (data.success) {
                location.reload();
            } else {
                alert(data.error || '切换失败');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('projectSelect');
            if (select) {
                select.addEventListener('change', () => switchProject(select.value));
                loadProjects();
            }
        });
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="/static/react-app.js"></script>
    <script src="/static/sidebar-nav.js"></script>
    <script src="/static/sidebar-shared.js"></script>
</body>
</html>
