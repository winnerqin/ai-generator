<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转换工具 - Ai创作工具</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <style>
        .app-shell { display: flex; min-height: 100vh; }
        .main-content { padding: 0; flex: 1; min-width: 0; }
        .page-wrap { padding: 20px 24px 36px; }
        .page-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 16px; }
        .panel { border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .txt2csv-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .txt2csv-tab { padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; border: 1px solid rgba(86,111,255,0.3); background: rgba(11,15,26,0.5); color: #c8d2ff; }
        .txt2csv-tab:hover { background: rgba(86,111,255,0.12); }
        .txt2csv-tab.active { background: linear-gradient(135deg, #5a9cf5 0%, #4a8ae5 100%); color: #fff; border-color: transparent; }
        .txt2csv-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .txt2csv-row label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
        .txt2csv-input, .txt2csv-output { width: 100%; min-height: 180px; padding: 12px; border-radius: 10px; border: 1px solid rgba(86,111,255,0.3); background: rgba(11,15,26,0.6); color: #e6ebff; font-size: 0.9rem; resize: vertical; font-family: inherit; }
        .txt2csv-output { font-family: ui-monospace, monospace; white-space: pre-wrap; }
        .txt2csv-table-wrap { overflow-x: auto; margin-top: 12px; }
        .txt2csv-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .txt2csv-table th, .txt2csv-table td { padding: 8px 10px; border: 1px solid rgba(86,111,255,0.25); text-align: left; vertical-align: top; }
        .txt2csv-table td { white-space: pre-wrap; }
        .txt2csv-table th { background: rgba(86,111,255,0.15); font-weight: 600; }
        .txt2csv-table tr:hover { background: rgba(86,111,255,0.06); }
        .btn-convert { padding: 10px 24px; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; border: none; background: linear-gradient(135deg, #7eb8ff 0%, #5a9cf5 100%); color: #fff; }
        .btn-convert:hover:not(:disabled) { background: linear-gradient(135deg, #8fc5ff 0%, #6aa8f7 100%); }
        .btn-convert:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-export { padding: 8px 16px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; border: 1px solid rgba(86,111,255,0.4); background: rgba(86,111,255,0.15); color: #c8d2ff; }
        .btn-export:hover:not(:disabled) { background: rgba(86,111,255,0.25); }
        .btn-export:disabled { opacity: 0.5; cursor: not-allowed; }
        .storyboard-md-wrap { min-height: 120px; padding: 12px; border-radius: 10px; border: 1px solid rgba(86,111,255,0.3); background: rgba(11,15,26,0.6); color: #e6ebff; font-size: 0.9rem; line-height: 1.6; }
        .storyboard-md-wrap h1,.storyboard-md-wrap h2,.storyboard-md-wrap h3 { margin-top: 1em; margin-bottom: 0.5em; color: #b8c8ff; }
        .storyboard-md-wrap p { margin: 0.5em 0; }
        .storyboard-md-wrap ul { margin: 0.5em 0; padding-left: 1.5em; }
        .storyboard-md-wrap table { display: block; margin: 8px 0; }
        .storyboard-md-wrap th, .storyboard-md-wrap td { display: block; border: none; padding: 4px 0; border-bottom: 1px solid rgba(86,111,255,0.2); }
        .storyboard-md-wrap th { background: transparent; color: #b8c8ff; }
        #promptEditorContainer .toastui-editor-defaultUI { border-radius: 10px; overflow: hidden; }
        #promptEditorContainer .toastui-editor-defaultUI-toolbar { background: #f0f2f5; border-color: #ddd; }
        #promptEditorContainer .toastui-editor-md-container,
        #promptEditorContainer .toastui-editor-ww-container { background: #fff; }
        #promptEditorContainer .toastui-editor-md-preview,
        #promptEditorContainer .toastui-editor-contents,
        #promptEditorContainer .toastui-editor-ww-container .toastui-editor-contents { background: #fff !important; color: #333 !important; }
        #promptEditorContainer .ProseMirror { color: #333; }
        #promptEditorContainer .toastui-editor-md-editor .CodeMirror-line { color: #333; }
        #promptEditorContainer .toastui-editor-md-editor .CodeMirror-cursor { border-left-color: #333; }
        #promptEditorContainer .CodeMirror { background: #fff !important; color: #333 !important; }
        #promptEditorContainer .CodeMirror-line { color: #333; }
        .prompt-editor-resize-wrap { resize: vertical; overflow: hidden; min-height: 320px; height: 400px; border: 1px solid rgba(86,111,255,0.3); border-radius: 10px; }
        .prompt-editor-resize-wrap .prompt-editor-inner { height: 100%; min-height: 300px; }
        .storyboard-with-queue { display: flex; gap: 20px; align-items: flex-start; }
        .storyboard-main { flex: 1; min-width: 0; }
        .storyboard-queue-panel { width: 380px; flex-shrink: 0; border-radius: 12px; border: 1px solid rgba(86,111,255,0.3); background: rgba(11,15,26,0.7); padding: 12px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
        .storyboard-queue-panel h3 { margin: 0 0 10px 0; font-size: 1rem; }
        .storyboard-queue-list { flex: 1; overflow-y: auto; }
        .storyboard-queue-item { border: 1px solid rgba(86,111,255,0.2); border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 0.8rem; }
        .storyboard-queue-item .row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .storyboard-queue-item .status { font-weight: 600; }
        .storyboard-queue-item .status.pending { color: #9aa; }
        .storyboard-queue-item .status.running { color: #7eb8ff; }
        .storyboard-queue-item .status.completed { color: #7ed49c; }
        .storyboard-queue-item .status.failed { color: #ff9aa2; }
        .storyboard-queue-preview { max-height: 120px; overflow-y: auto; margin-top: 6px; font-size: 0.75rem; color: #9aa; white-space: pre-wrap; word-break: break-all; }
        .storyboard-queue-preview.md { margin-top: 4px; }
        .storyboard-queue-preview.md div { line-height: 1.4; }
        .storyboard-queue-table-wrap { max-height: 100px; overflow: auto; margin-top: 4px; }
        .storyboard-queue-table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        .storyboard-queue-table-wrap th, .storyboard-queue-table-wrap td { border: 1px solid rgba(86,111,255,0.2); padding: 2px 4px; }
    </style>
</head>
<body>
    <div id="reactApp"></div>
    <script>
        window.__APP_CONTEXT__ = { username: "{{ user.username }}", user_id: "{{ user.id or '' }}" };
    </script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    {% raw %}
    <script type="text/babel">
        const { useEffect, useState, useRef } = React;

        const Sidebar = ({ username, projects, currentProjectId, onProjectChange }) => (
            <nav className="sidebar-nav" id="sidebarNav">
                <div className="sidebar-nav-header">
                    <div className="sidebar-nav-title">Ai创作工具</div>
                    <button className="sidebar-nav-toggle" onClick={() => toggleSidebar()} title="收缩/展开">
                        <span id="toggleIcon">‹</span>
                    </button>
                </div>
                <div className="sidebar-nav-menu">
                    <a href="/" className="sidebar-nav-item"><span className="sidebar-nav-icon">🎨</span><span className="sidebar-nav-text">单图生成</span></a>
                    <a href="/batch" className="sidebar-nav-item"><span className="sidebar-nav-icon">📦</span><span className="sidebar-nav-text">批量生成</span></a>
                    <a href="/records" className="sidebar-nav-item"><span className="sidebar-nav-icon">📊</span><span className="sidebar-nav-text">生图任务</span></a>
                    <a href="/video-generate" className="sidebar-nav-item"><span className="sidebar-nav-icon">🎬</span><span className="sidebar-nav-text">视频生成</span></a>
                    <a href="/video-tasks" className="sidebar-nav-item"><span className="sidebar-nav-icon">📹</span><span className="sidebar-nav-text">视频任务</span></a>
                    <a href="/script-generate" className="sidebar-nav-item"><span className="sidebar-nav-icon">📜</span><span className="sidebar-nav-text">剧本生成</span></a>
                    <a href="/storyboard-studio" className="sidebar-nav-item"><span className="sidebar-nav-icon">🧩</span><span className="sidebar-nav-text">分镜制作</span></a>
                    <a href="/content-management" className="sidebar-nav-item"><span className="sidebar-nav-icon">📚</span><span className="sidebar-nav-text">内容管理</span></a>
                    <a href="/txt2csv" className="sidebar-nav-item active"><span className="sidebar-nav-icon">🔄</span><span className="sidebar-nav-text">转换工具</span></a>
                </div>
                <div className="sidebar-nav-user">
                    <div className="sidebar-nav-user-info">
                        <div className="sidebar-nav-user-avatar">👤</div>
                        <div className="sidebar-nav-user-name">{username}</div>
                        <a href="/logout" className="sidebar-nav-logout">登出</a>
                    </div>
                    {projects.length > 0 && (
                        <div style={{ marginTop: '8px' }}>
                            <label style={{ fontSize: '0.85em', color: '#cbd4f5' }}>当前项目</label>
                            <select
                                style={{ width: '100%', padding: '6px', borderRadius: '6px' }}
                                value={currentProjectId || ''}
                                onChange={(e) => onProjectChange(e.target.value)}
                            >
                                {projects.map(p => (
                                    <option key={p.id} value={p.id}>{p.name}</option>
                                ))}
                            </select>
                        </div>
                    )}
                </div>
            </nav>
        );

        function csvToRows(csvText) {
            if (!csvText || !csvText.trim()) return { headers: [], rows: [] };
            const text = (csvText || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const all = [];
            let row = [];
            let field = '';
            let inQuoted = false;
            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                if (inQuoted) {
                    if (c === '"') {
                        if (text[i + 1] === '"') { field += '"'; i++; }
                        else inQuoted = false;
                    } else {
                        field += c;
                    }
                } else {
                    if (c === '"') {
                        inQuoted = true;
                    } else if (c === ',') {
                        row.push(field);
                        field = '';
                    } else if (c === '\n') {
                        row.push(field);
                        field = '';
                        if (row.some(cell => (cell || '').length > 0)) all.push(row);
                        row = [];
                    } else {
                        field += c;
                    }
                }
            }
            row.push(field);
            if (row.some(cell => (cell || '').length > 0)) all.push(row);
            if (all.length === 0) return { headers: [], rows: [] };
            const headers = (all[0] || []).map(h => (h || '').trim());
            const rows = all.slice(1);
            return { headers, rows };
        }

        function App() {
            const [projects, setProjects] = useState([]);
            const [currentProjectId, setCurrentProjectId] = useState('');
            const [activeTab, setActiveTab] = useState('txt2csv');
            const [inputText, setInputText] = useState('');
            const [outputText, setOutputText] = useState('');
            const [tableData, setTableData] = useState({ headers: [], rows: [] });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const outputEndRef = useRef(null);
            const [storyboardInput, setStoryboardInput] = useState('');
            const [storyboardMarkdown, setStoryboardMarkdown] = useState('');
            const [storyboardCsv, setStoryboardCsv] = useState('');
            const [storyboardTableData, setStoryboardTableData] = useState({ headers: [], rows: [] });
            const [storyboardLoading, setStoryboardLoading] = useState(false);
            const [storyboardCsvLoading, setStoryboardCsvLoading] = useState(false);
            const [storyboardError, setStoryboardError] = useState('');
            const [storyboardMdView, setStoryboardMdView] = useState('preview'); // 'edit' | 'preview'
            const [storyboardPromptFiles, setStoryboardPromptFiles] = useState([]);
            const [storyboardPromptFile, setStoryboardPromptFile] = useState('storyboard.md');
            const [queueTasks, setQueueTasks] = useState([]);
            const [queueLoading, setQueueLoading] = useState(false);
            const [queueProcessing, setQueueProcessing] = useState(false);
            const [queueSelectedFileNames, setQueueSelectedFileNames] = useState([]);
            const storyboardFileInputRef = useRef(null);
            const [promptFiles, setPromptFiles] = useState([]);
            const [promptCurrentFile, setPromptCurrentFile] = useState('');
            const [promptContent, setPromptContent] = useState('');
            const [promptNewFilename, setPromptNewFilename] = useState('');
            const [promptSaveLoading, setPromptSaveLoading] = useState(false);
            const [promptError, setPromptError] = useState('');
            const promptEditorRef = useRef(null);
            const promptEditorContainerRef = useRef(null);
            const promptPasteHandlerRef = useRef(null);

            useEffect(() => {
                document.body.classList.add('react-theme', 'sidebar-compact');
            }, []);

            useEffect(() => {
                fetch('/api/projects').then(res => res.json()).then(data => {
                    if (data.success) {
                        setProjects(data.projects || []);
                        setCurrentProjectId(String(data.current_project_id || ''));
                    }
                });
            }, []);

            useEffect(() => {
                if (outputEndRef.current) outputEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [outputText]);

            useEffect(() => {
                if (activeTab === 'prompts') {
                    fetch('/api/config-prompts').then(r => r.json()).then(d => {
                        if (d.success) setPromptFiles(d.files || []);
                    });
                }
                if (activeTab === 'storyboard') {
                    fetch('/api/config-prompts').then(r => r.json()).then(d => {
                        if (d.success) setStoryboardPromptFiles(d.files || []);
                    });
                    fetch('/api/storyboard-queue').then(r => r.json()).then(d => {
                        if (d.success) setQueueTasks(d.tasks || []);
                    });
                }
            }, [activeTab]);

            const fetchStoryboardQueue = () => {
                fetch('/api/storyboard-queue').then(r => r.json()).then(d => {
                    if (d.success) setQueueTasks(d.tasks || []);
                });
            };

            useEffect(() => {
                if (activeTab !== 'prompts') {
                    if (promptEditorRef.current) {
                        try {
                            const md = promptEditorRef.current.getMarkdown();
                            setPromptContent(md);
                        } catch (e) {}
                        try { promptEditorRef.current.destroy(); } catch (e) {}
                        promptEditorRef.current = null;
                    }
                    return;
                }
                const el = promptEditorContainerRef.current;
                const EditorClass = window.Editor || (window.toastui && window.toastui.Editor);
                if (!el || !EditorClass) return;
                const timer = setTimeout(() => {
                    if (!el.isConnected) return;
                    try {
                        const ed = new EditorClass({
                            el,
                            height: '100%',
                            initialEditType: 'wysiwyg',
                            initialValue: promptContent,
                            previewStyle: 'vertical',
                            hideModeSwitch: false
                        });
                        promptEditorRef.current = ed;
                        const markedFn = typeof marked !== 'undefined' ? marked : (window && window.marked);
                        const looksLikeMarkdown = (text) => /#+\s|\*\*[^*]+\*\*|^\s*[-*+]\s|^\s*\d+\.\s|\[.+\]\(.+\)|^>\s|^```|`[^`]+`/.test(text.trim());
                        promptPasteHandlerRef.current = function(ev) {
                            if (!ev.clipboardData || !el.contains(ev.target)) return;
                            const text = ev.clipboardData.getData('text/plain');
                            if (!text || !text.trim()) return;
                            if (!looksLikeMarkdown(text)) return;
                            if (!markedFn) return;
                            try {
                                if (markedFn.setOptions) markedFn.setOptions({ gfm: true, breaks: true });
                                const html = (markedFn.parse || markedFn)(text);
                                ev.preventDefault();
                                ev.stopPropagation();
                                document.execCommand('insertHTML', false, html);
                            } catch (_) {}
                        };
                        el.addEventListener('paste', promptPasteHandlerRef.current, true);
                    } catch (e) { console.warn('Toast UI Editor init', e); }
                }, 100);
                return () => {
                    clearTimeout(timer);
                    if (promptPasteHandlerRef.current && el) {
                        el.removeEventListener('paste', promptPasteHandlerRef.current, true);
                        promptPasteHandlerRef.current = null;
                    }
                    if (promptEditorRef.current) {
                        try {
                            const md = promptEditorRef.current.getMarkdown();
                            setPromptContent(md);
                        } catch (e) {}
                        try { promptEditorRef.current.destroy(); } catch (e) {}
                        promptEditorRef.current = null;
                    }
                    if (el && el.firstChild) {
                        while (el.firstChild) el.removeChild(el.firstChild);
                    }
                };
            }, [activeTab]);

            const loadPromptFile = (filename) => {
                if (!filename) {
                    setPromptContent('');
                    setPromptCurrentFile('');
                    setPromptNewFilename('');
                    if (promptEditorRef.current && typeof promptEditorRef.current.setMarkdown === 'function') {
                        promptEditorRef.current.setMarkdown('');
                    }
                    return;
                }
                setPromptError('');
                fetch('/api/config-prompts/' + encodeURIComponent(filename)).then(r => r.json()).then(d => {
                    if (d.success) {
                        const content = d.content || '';
                        setPromptContent(content);
                        setPromptCurrentFile(d.filename || filename);
                        setPromptNewFilename('');
                        if (promptEditorRef.current && typeof promptEditorRef.current.setMarkdown === 'function') {
                            promptEditorRef.current.setMarkdown(content);
                        }
                    } else setPromptError(d.error || '加载失败');
                });
            };

            const handleSavePrompt = async () => {
                const filename = (promptNewFilename || promptCurrentFile || '').trim();
                if (!filename) { setPromptError('请填写文件名（如 xxx.md）'); return; }
                if (!filename.endsWith('.md')) { setPromptError('文件名必须以 .md 结尾'); return; }
                const content = (promptEditorRef.current && typeof promptEditorRef.current.getMarkdown === 'function')
                    ? promptEditorRef.current.getMarkdown() : promptContent;
                setPromptError('');
                setPromptSaveLoading(true);
                try {
                    const res = await fetch('/api/config-prompts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename, content })
                    });
                    const data = await res.json();
                    if (!data.success) throw new Error(data.error || '保存失败');
                    if (!promptFiles.includes(filename)) setPromptFiles([...promptFiles, filename].sort());
                    setPromptCurrentFile(filename);
                    setPromptNewFilename('');
                } catch (e) {
                    setPromptError(e.message || '保存失败');
                } finally {
                    setPromptSaveLoading(false);
                }
            };

            const handleDeletePrompt = async () => {
                const filename = promptCurrentFile || promptNewFilename.trim();
                if (!filename) return;
                if (!confirm('确定删除 ' + filename + ' 吗？')) return;
                setPromptError('');
                try {
                    const res = await fetch('/api/config-prompts/' + encodeURIComponent(filename), { method: 'DELETE' });
                    const data = await res.json();
                    if (!data.success) throw new Error(data.error || '删除失败');
                    setPromptFiles(promptFiles.filter(f => f !== filename));
                    setPromptCurrentFile('');
                    setPromptNewFilename('');
                    setPromptContent('');
                    if (promptEditorRef.current && typeof promptEditorRef.current.setMarkdown === 'function') {
                        promptEditorRef.current.setMarkdown('');
                    }
                } catch (e) {
                    setPromptError(e.message || '删除失败');
                }
            };

            const handleConvert = async () => {
                const text = (inputText || '').trim();
                if (!text) {
                    setError('请输入文本内容');
                    return;
                }
                setError('');
                setOutputText('');
                setTableData({ headers: [], rows: [] });
                setLoading(true);

                try {
                    const res = await fetch('/api/txt2csv-stream', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text })
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.error || res.statusText);
                    }
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buffer = '';
                    let fullCsv = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const parts = buffer.split(/\n\n/);
                        buffer = parts.pop() || '';

                        for (const part of parts) {
                            const line = part.trim();
                            if (!line.startsWith('data:')) continue;
                            try {
                                const json = JSON.parse(line.slice(5).trim());
                                if (json.type === 'chunk' && json.content) {
                                    fullCsv += json.content;
                                    setOutputText(prev => prev + json.content);
                                } else if (json.type === 'complete' && json.csv) {
                                    fullCsv = json.csv;
                                    setOutputText(fullCsv);
                                    setTableData(csvToRows(fullCsv));
                                } else if (json.type === 'error') {
                                    setError(json.error || '转换失败');
                                }
                            } catch (_) {}
                        }
                    }

                    if (buffer.trim()) {
                        const line = buffer.trim();
                        if (line.startsWith('data:')) {
                            try {
                                const json = JSON.parse(line.slice(5).trim());
                                if (json.type === 'chunk' && json.content) {
                                    fullCsv += json.content;
                                    setOutputText(prev => prev + json.content);
                                } else if (json.type === 'complete' && json.csv) {
                                    fullCsv = json.csv;
                                    setOutputText(fullCsv);
                                    setTableData(csvToRows(fullCsv));
                                } else if (json.type === 'error') setError(json.error || '转换失败');
                            } catch (_) {}
                        }
                    }

                    if (fullCsv) setTableData(csvToRows(fullCsv));
                } catch (e) {
                    setError(e.message || '请求失败');
                } finally {
                    setLoading(false);
                }
            };

            const handleStoryboardGenerateMarkdown = async () => {
                const text = (storyboardInput || '').trim();
                if (!text) {
                    setStoryboardError('请输入剧本内容');
                    return;
                }
                setStoryboardError('');
                setStoryboardMarkdown('');
                setStoryboardCsv('');
                setStoryboardTableData({ headers: [], rows: [] });
                setStoryboardLoading(true);
                try {
                    const res = await fetch('/api/storyboard-from-script', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text, prompt_file: storyboardPromptFile || 'storyboard.md', output: 'markdown' })
                    });
                    const data = await res.json();
                    if (!data.success) throw new Error(data.error || '生成失败');
                    setStoryboardMarkdown(data.markdown || '');
                    setStoryboardMdView('preview');
                } catch (e) {
                    setStoryboardError(e.message || '请求失败');
                } finally {
                    setStoryboardLoading(false);
                }
            };

            const handleQueueUpload = () => {
                const input = storyboardFileInputRef.current;
                if (!input || !input.files || !input.files.length) {
                    setStoryboardError('请选择至少一个剧本文件');
                    return;
                }
                setStoryboardError('');
                setQueueLoading(true);
                const form = new FormData();
                form.append('prompt_file', storyboardPromptFile || 'storyboard.md');
                for (let i = 0; i < input.files.length; i++) form.append('files[]', input.files[i]);
                fetch('/api/storyboard-queue/upload', { method: 'POST', body: form })
                    .then(r => r.json())
                    .then(d => {
                        if (d.success) {
                            setQueueTasks(d.tasks || []);
                            input.value = '';
                            setQueueSelectedFileNames([]);
                        } else setStoryboardError(d.error || '上传失败');
                    })
                    .finally(() => setQueueLoading(false));
            };

            const handleProcessQueue = async () => {
                setQueueProcessing(true);
                setStoryboardError('');
                try {
                    while (true) {
                        const res = await fetch('/api/storyboard-queue/process-one', { method: 'POST' });
                        const d = await res.json();
                        if (!d.success) {
                            setStoryboardError(d.error || '处理失败');
                            break;
                        }
                        if (d.tasks) setQueueTasks(d.tasks);
                        if (!d.processed) break;
                    }
                } finally {
                    setQueueProcessing(false);
                }
            };

            const handleDeleteQueueTask = (taskId) => {
                if (!confirm('确定删除该任务？')) return;
                fetch('/api/storyboard-queue/' + taskId, { method: 'DELETE' })
                    .then(r => r.json())
                    .then(d => { if (d.success) setQueueTasks(d.tasks || []); });
            };

            const handleQueuePreviewTask = async (task) => {
                if (!task) return;
                setStoryboardError('');
                try {
                    const uid = window.__APP_CONTEXT__?.user_id;
                    const pid = currentProjectId;
                    if (uid && pid && (task.output_md || task.output_csv)) {
                        if (task.output_md) {
                            const mdRes = await fetch(`/output/${uid}/${pid}/${task.output_md}`);
                            const mdText = await mdRes.text();
                            setStoryboardMarkdown(mdText || '');
                        } else {
                            setStoryboardMarkdown(task.markdown_preview || '');
                        }
                        if (task.output_csv) {
                            const csvRes = await fetch(`/output/${uid}/${pid}/${task.output_csv}`);
                            const csvText = await csvRes.text();
                            setStoryboardCsv(csvText || '');
                            setStoryboardTableData(csvToRows(csvText || ''));
                        } else {
                            setStoryboardCsv(task.csv_preview || '');
                            setStoryboardTableData(csvToRows(task.csv_preview || ''));
                        }
                    } else {
                        setStoryboardMarkdown(task.markdown_preview || '');
                        setStoryboardCsv(task.csv_preview || '');
                        setStoryboardTableData(csvToRows(task.csv_preview || ''));
                    }
                    setStoryboardMdView('preview');
                } catch (e) {
                    setStoryboardError('预览加载失败');
                    setStoryboardMarkdown(task.markdown_preview || '');
                    setStoryboardCsv(task.csv_preview || '');
                    setStoryboardTableData(csvToRows(task.csv_preview || ''));
                    setStoryboardMdView('preview');
                }
            };

            const handleStoryboardGenerateCsv = async () => {
                const text = (storyboardInput || '').trim();
                const md = (storyboardMarkdown || '').trim();
                if (!md) {
                    setStoryboardError('请先生成分镜文本（Markdown）后再生成 CSV');
                    return;
                }
                setStoryboardError('');
                setStoryboardCsv('');
                setStoryboardTableData({ headers: [], rows: [] });
                setStoryboardCsvLoading(true);
                try {
                    const res = await fetch('/api/storyboard-from-script', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text, markdown: md, prompt_file: storyboardPromptFile || 'storyboard.md', output: 'csv' })
                    });
                    const data = await res.json();
                    if (!data.success) throw new Error(data.error || '生成失败');
                    setStoryboardCsv(data.csv || '');
                    setStoryboardTableData(csvToRows(data.csv || ''));
                } catch (e) {
                    setStoryboardError(e.message || '请求失败');
                } finally {
                    setStoryboardCsvLoading(false);
                }
            };

            const exportMarkdown = () => {
                if (!storyboardMarkdown) return;
                const blob = new Blob([storyboardMarkdown], { type: 'text/markdown;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'storyboard_' + new Date().toISOString().slice(0,10) + '.md';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const exportStoryboardCsv = () => {
                if (!storyboardCsv) return;
                const bom = '\uFEFF';
                const blob = new Blob([bom + storyboardCsv], { type: 'text/csv;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'storyboard_' + new Date().toISOString().slice(0,10) + '.csv';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const renderMarkdown = (md) => {
                if (!md) return '';
                const m = typeof marked !== 'undefined' ? marked : (window && window.marked);
                if (!m) return md;
                try {
                    if (m.setOptions) m.setOptions({ gfm: true, breaks: true });
                    return (m.parse || m)(md);
                } catch (_) { return md; }
            };

            return (
                <div className="app-shell">
                    <Sidebar
                        username={window.__APP_CONTEXT__?.username || 'user'}
                        projects={projects}
                        currentProjectId={currentProjectId}
                        onProjectChange={async (pid) => {
                            const r = await fetch('/api/projects/switch', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ project_id: pid })
                            });
                            const d = await r.json();
                            if (d.success) window.location.reload();
                        }}
                    />
                    <div className="main-content">
                        <div className="page-wrap">
                            <div className="page-title">🔄 转换工具</div>
                            <div className="txt2csv-tabs">
                                <button className={`txt2csv-tab ${activeTab === 'txt2csv' ? 'active' : ''}`} onClick={() => setActiveTab('txt2csv')}>文本转 CSV</button>
                                <button className={`txt2csv-tab ${activeTab === 'storyboard' ? 'active' : ''}`} onClick={() => setActiveTab('storyboard')}>生成分镜</button>
                                <button className={`txt2csv-tab ${activeTab === 'prompts' ? 'active' : ''}`} onClick={() => setActiveTab('prompts')}>提示词管理</button>
                            </div>

                            {activeTab === 'txt2csv' && (
                            <div className="panel">
                                <div className="txt2csv-row">
                                    <div style={{ flex: 1 }}>
                                        <label>输入文本</label>
                                        <textarea
                                            className="txt2csv-input"
                                            placeholder="在此粘贴或输入需要转换的剧本/文本..."
                                            value={inputText}
                                            onChange={(e) => setInputText(e.target.value)}
                                            disabled={loading}
                                        />
                                    </div>
                                </div>
                                <div className="txt2csv-row" style={{ alignItems: 'flex-end' }}>
                                    <button className="btn-convert" onClick={handleConvert} disabled={loading}>
                                        {loading ? '转换中...' : '开始转换'}
                                    </button>
                                </div>
                                {error && <div className="small-hint" style={{ color: '#ff9aa2', marginTop: 8 }}>{error}</div>}
                                <div className="txt2csv-row" style={{ marginTop: 16 }}>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                                            <label style={{ marginBottom: 0 }}>输出内容（CSV）</label>
                                            <button type="button" className="btn-export" disabled={!outputText.trim()}
                                                onClick={() => {
                                                    if (!outputText.trim()) return;
                                                    const bom = '\uFEFF';
                                                    const blob = new Blob([bom + outputText], { type: 'text/csv;charset=utf-8' });
                                                    const url = URL.createObjectURL(blob);
                                                    const a = document.createElement('a');
                                                    a.href = url;
                                                    a.download = 'txt2csv_' + new Date().toISOString().slice(0,10) + '_' + new Date().toTimeString().slice(0,8).replace(/:/g,'') + '.csv';
                                                    document.body.appendChild(a);
                                                    a.click();
                                                    document.body.removeChild(a);
                                                    URL.revokeObjectURL(url);
                                                }}
                                            >导出为 CSV</button>
                                        </div>
                                        <div style={{ position: 'relative' }}>
                                            <textarea className="txt2csv-output" readOnly value={outputText} placeholder="转换结果将在此实时显示..." />
                                            <div ref={outputEndRef} />
                                        </div>
                                    </div>
                                </div>
                                <div className="txt2csv-row" style={{ marginTop: 16 }}>
                                    <div style={{ flex: 1 }}>
                                        <label>表格预览</label>
                                        <div className="txt2csv-table-wrap">
                                            {tableData.headers.length > 0 ? (
                                                <table className="txt2csv-table">
                                                    <thead><tr>{tableData.headers.map((h, i) => <th key={i}>{h}</th>)}</tr></thead>
                                                    <tbody>
                                                        {tableData.rows.map((row, i) => (
                                                            <tr key={i}>{row.map((cell, j) => <td key={j}>{cell}</td>)}</tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            ) : (
                                                <div className="small-hint">转换完成后将按格式显示表格</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            )}

                            {activeTab === 'storyboard' && (
                            <div className="panel storyboard-with-queue">
                                <div className="storyboard-main">
                                <div className="txt2csv-row">
                                    <div style={{ flex: 1 }}>
                                        <label>批量生成（队列）</label>
                                        <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                                            <input
                                                type="file"
                                                ref={storyboardFileInputRef}
                                                multiple
                                                accept=".txt,.md,.json"
                                                style={{ display: 'none' }}
                                                onChange={(e) => {
                                                    const files = e.target.files;
                                                    setQueueSelectedFileNames(files && files.length ? Array.from(files).map(f => f.name) : []);
                                                }}
                                            />
                                            <button type="button" className="btn-export" onClick={() => storyboardFileInputRef.current && storyboardFileInputRef.current.click()}>选择文件</button>
                                            <span className="small-hint" style={{ color: '#9aa' }}>可多选 .txt / .md 剧本文件</span>
                                            <button type="button" className="btn-convert" onClick={handleQueueUpload} disabled={queueLoading}>加入队列</button>
                                            <button type="button" className="btn-convert" onClick={handleProcessQueue} disabled={queueProcessing || !queueTasks.some(t => t.status === 'pending')}>
                                                {queueProcessing ? '处理中...' : '开始处理队列'}
                                            </button>
                                        </div>
                                        {queueSelectedFileNames.length > 0 && (
                                            <div className="small-hint" style={{ marginTop: 6, color: '#b8c8ff' }}>
                                                已选文件：{queueSelectedFileNames.join('、')}
                                            </div>
                                        )}
                                        <div className="small-hint" style={{ marginTop: 4, color: '#9aa' }}>生成后的 .md 与 .csv 保存在 output / 当前用户 / 当前项目 下</div>
                                    </div>
                                </div>
                                <div className="txt2csv-row">
                                    <div style={{ flex: 1 }}>
                                        <label>提示词选择（config 目录下 .md）</label>
                                        <select
                                            value={storyboardPromptFile}
                                            onChange={(e) => setStoryboardPromptFile(e.target.value)}
                                            disabled={storyboardLoading}
                                            style={{ minWidth: 220, padding: 8, borderRadius: 8, background: 'rgba(11,15,26,0.6)', color: '#e6ebff', border: '1px solid rgba(86,111,255,0.3)' }}
                                        >
                                            {[].concat('storyboard.md', storyboardPromptFiles).filter((f, i, a) => a.indexOf(f) === i).sort().map(f => <option key={f} value={f}>{f}</option>)}
                                        </select>
                                        <span className="small-hint" style={{ marginLeft: 8, color: '#9aa' }}>使用所选文件的格式要求进行生成</span>
                                    </div>
                                </div>
                                <div className="txt2csv-row">
                                    <div style={{ flex: 1 }}>
                                        <label>输入剧本</label>
                                        <textarea
                                            className="txt2csv-input"
                                            placeholder="在此粘贴或输入剧本内容；先点击「第一步：生成分镜文本」，可编辑与预览后再点击「生成 CSV 表格」"
                                            value={storyboardInput}
                                            onChange={(e) => setStoryboardInput(e.target.value)}
                                            disabled={storyboardLoading}
                                        />
                                    </div>
                                </div>
                                <div className="txt2csv-row" style={{ alignItems: 'flex-end' }}>
                                    <button className="btn-convert" onClick={handleStoryboardGenerateMarkdown} disabled={storyboardLoading}>
                                        {storyboardLoading ? '生成中...' : '第一步：生成分镜文本'}
                                    </button>
                                </div>
                                {storyboardError && <div className="small-hint" style={{ color: '#ff9aa2', marginTop: 8 }}>{storyboardError}</div>}
                                <div className="txt2csv-row" style={{ marginTop: 16 }}>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6, flexWrap: 'wrap', gap: 8 }}>
                                            <label style={{ marginBottom: 0 }}>分镜文本（Markdown）— 可粘贴、可编辑、可预览，按 Markdown 格式展示（不渲染为表格）</label>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                                <button type="button" className="btn-export" style={{ opacity: storyboardMarkdown ? 1 : 0.6 }} disabled={!storyboardMarkdown.trim()} onClick={() => setStoryboardMdView('edit')}>编辑</button>
                                                <button type="button" className="btn-export" style={{ opacity: storyboardMarkdown ? 1 : 0.6 }} disabled={!storyboardMarkdown.trim()} onClick={() => setStoryboardMdView('preview')}>预览</button>
                                                <button type="button" className="btn-export" disabled={!storyboardMarkdown.trim()} onClick={exportMarkdown}>导出为 .md</button>
                                            </div>
                                        </div>
                                        {storyboardMdView === 'edit' || !storyboardMarkdown ? (
                                            <textarea
                                                className="txt2csv-input"
                                                value={storyboardMarkdown}
                                                onChange={(e) => setStoryboardMarkdown(e.target.value)}
                                                placeholder="可直接粘贴 Markdown 格式分镜内容，或点击「第一步：生成分镜文本」由剧本生成；然后点击「生成 CSV 表格」"
                                                style={{ minHeight: 280, maxHeight: 420, resize: 'vertical', fontFamily: 'monospace', fontSize: '0.9rem' }}
                                            />
                                        ) : (
                                            <div className="storyboard-md-wrap" style={{ maxHeight: '420px', overflowY: 'auto' }}>
                                                <div dangerouslySetInnerHTML={{ __html: renderMarkdown(storyboardMarkdown) }} />
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="txt2csv-row" style={{ marginTop: 16 }}>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6, flexWrap: 'wrap', gap: 8 }}>
                                            <label style={{ marginBottom: 0 }}>第二步：生成 CSV 表格</label>
                                            <button className="btn-convert" onClick={handleStoryboardGenerateCsv} disabled={!storyboardMarkdown.trim() || storyboardCsvLoading}>
                                                {storyboardCsvLoading ? '生成中...' : '生成 CSV 表格'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div className="txt2csv-row" style={{ marginTop: 8 }}>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                                            <label style={{ marginBottom: 0 }}>分镜表格（CSV 预览）</label>
                                            <button type="button" className="btn-export" disabled={!storyboardCsv.trim()} onClick={exportStoryboardCsv}>导出为 CSV</button>
                                        </div>
                                        <div className="txt2csv-table-wrap">
                                            {storyboardTableData.headers.length > 0 ? (
                                                <table className="txt2csv-table">
                                                    <thead><tr>{storyboardTableData.headers.map((h, i) => <th key={i}>{h}</th>)}</tr></thead>
                                                    <tbody>
                                                        {storyboardTableData.rows.map((row, i) => (
                                                            <tr key={i}>{row.map((cell, j) => <td key={j}>{cell}</td>)}</tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            ) : (
                                                <div className="small-hint">在分镜文本生成或编辑后，点击「生成 CSV 表格」可在此预览并导出 CSV</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                </div>
                                <div className="storyboard-queue-panel">
                                    <h3>任务列表</h3>
                                    <div className="storyboard-queue-list">
                                        {queueTasks.length === 0 ? (
                                            <div className="small-hint">选择文件并点击「加入队列」后，任务将显示在此</div>
                                        ) : (
                                            [...queueTasks].sort((a, b) => {
                                                const ta = a.started_at || a.created_at || '';
                                                const tb = b.started_at || b.created_at || '';
                                                return tb.localeCompare(ta);
                                            }).map(t => {
                                                const startTime = t.started_at || t.created_at;
                                                const statusLabel = { pending: '等待', running: '生成中', completed: '已完成', failed: '失败' }[t.status] || t.status;
                                                const canPreview = t.status === 'completed' && (t.markdown_preview || t.csv_preview);
                                                return (
                                                    <div key={t.id} className="storyboard-queue-item">
                                                        <div className="row"><span>任务ID</span><span>{t.id}</span></div>
                                                        <div className="row"><span>状态</span><span className={'status ' + (t.status || '')}>{statusLabel}</span></div>
                                                        <div className="row"><span>文件名</span><span>{t.filename || '-'}</span></div>
                                                        <div className="row"><span>提示词文件</span><span>{t.prompt_file || 'storyboard.md'}</span></div>
                                                        <div className="row"><span>开始时间</span><span>{startTime ? new Date(startTime).toLocaleString('zh-CN') : '-'}</span></div>
                                                        <div style={{ marginTop: 6, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                                                            {canPreview && (
                                                                <button type="button" className="btn-export" style={{ fontSize: '0.75rem', padding: 4 }} onClick={() => handleQueuePreviewTask(t)}>预览</button>
                                                            )}
                                                            {t.status === 'completed' && (t.output_md || t.output_csv) && window.__APP_CONTEXT__?.user_id && currentProjectId && (
                                                                <>
                                                                    {t.output_md && <a href={`/output/${window.__APP_CONTEXT__.user_id}/${currentProjectId}/${t.output_md}`} target="_blank" rel="noopener noreferrer" style={{ fontSize: '0.8rem' }}>下载 .md</a>}
                                                                    {t.output_csv && <a href={`/output/${window.__APP_CONTEXT__.user_id}/${currentProjectId}/${t.output_csv}`} target="_blank" rel="noopener noreferrer" style={{ fontSize: '0.8rem' }}>下载 .csv</a>}
                                                                </>
                                                            )}
                                                            <button type="button" className="btn-export" style={{ fontSize: '0.75rem', padding: 4 }} onClick={() => handleDeleteQueueTask(t.id)}>删除任务</button>
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            </div>
                            )}

                            {activeTab === 'prompts' && (
                            <div className="panel">
                                <div className="txt2csv-row">
                                    <div style={{ flex: 1 }}>
                                        <label>选择或新建文件（config 目录下 .md）</label>
                                        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
                                            <select
                                                value={promptCurrentFile}
                                                onChange={(e) => { setPromptNewFilename(''); loadPromptFile(e.target.value); }}
                                                style={{ minWidth: 180, padding: 8, borderRadius: 8, background: 'rgba(11,15,26,0.6)', color: '#e6ebff', border: '1px solid rgba(86,111,255,0.3)' }}
                                            >
                                                <option value="">— 新建文件 —</option>
                                                {promptFiles.map(f => <option key={f} value={f}>{f}</option>)}
                                            </select>
                                            {!promptCurrentFile && (
                                                <input
                                                    type="text"
                                                    placeholder="新文件名，如 my_prompt.md"
                                                    value={promptNewFilename}
                                                    onChange={(e) => setPromptNewFilename(e.target.value)}
                                                    style={{ minWidth: 200, padding: 8, borderRadius: 8, background: 'rgba(11,15,26,0.6)', color: '#e6ebff', border: '1px solid rgba(86,111,255,0.3)' }}
                                                />
                                            )}
                                            {promptCurrentFile && (
                                                <span className="small-hint" style={{ color: '#b8c8ff' }}>当前：{promptCurrentFile}</span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                <div className="txt2csv-row">
                                    <div style={{ flex: 1 }}>
                                        <label>内容（所见即所得编辑，可切换 Markdown / 预览；右下角可拖动缩放；从 .md 复制的文本粘贴时自动识别格式）</label>
                                        <div className="prompt-editor-resize-wrap">
                                            <div className="prompt-editor-inner" id="promptEditorContainer" ref={promptEditorContainerRef} />
                                        </div>
                                    </div>
                                </div>
                                <div className="txt2csv-row" style={{ alignItems: 'center', gap: 12 }}>
                                    <button className="btn-convert" onClick={handleSavePrompt} disabled={promptSaveLoading || (!promptCurrentFile && !promptNewFilename.trim())}>
                                        {promptSaveLoading ? '保存中...' : (promptCurrentFile ? '保存' : '新建并保存')}
                                    </button>
                                    {promptCurrentFile && (
                                        <button type="button" className="btn-export" onClick={handleDeletePrompt} style={{ color: '#ff9aa2', borderColor: 'rgba(255,120,120,0.5)' }}>
                                            删除当前文件
                                        </button>
                                    )}
                                </div>
                                {promptError && <div className="small-hint" style={{ color: '#ff9aa2', marginTop: 8 }}>{promptError}</div>}
                            </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('reactApp')).render(<App />);
    </script>
    {% endraw %}
    <script src="/static/sidebar-nav.js"></script>
</body>
</html>
