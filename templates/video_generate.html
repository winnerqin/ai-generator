<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频生成 - Ai创作工具</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        .app-shell { display: flex; min-height: 100vh; }
        .main-content { padding: 0; }
        .page-wrap { padding: 20px 24px 36px; }
        .page-title { font-size: 1.4rem; font-weight: 600; }
        .panel { border-radius: 16px; padding: 16px; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .row.space { justify-content: space-between; }
        .grid { display: grid; gap: 16px; grid-template-columns: 1.2fr 0.8fr; }
        .form-row { display: grid; gap: 12px; }
        .form-row.two { grid-template-columns: 1fr 1fr; }
        .form-row.three { grid-template-columns: repeat(3, 1fr); }
        .type-card { padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(86,111,255,0.25); cursor: pointer; }
        .type-card.active { background: rgba(86,111,255,0.2); border-color: rgba(86,111,255,0.5); }
        .image-preview { width: 100%; max-width: 260px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(86,111,255,0.25); }
        .image-preview img { width: 100%; height: 160px; object-fit: contain; display: block; background: rgba(0,0,0,0.12); }
        .reference-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .reference-item { border-radius: 12px; overflow: hidden; border: 1px solid rgba(86,111,255,0.25); position: relative; }
        .reference-item img { width: 100%; height: 140px; object-fit: contain; display: block; background: rgba(0,0,0,0.12); }
        .reference-item button { position: absolute; top: 6px; right: 6px; }
        .modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(6,10,20,0.7); z-index: 2000; }
        .modal-card { width: min(980px, 92vw); max-height: 86vh; overflow: auto; padding: 16px; border-radius: 16px; }
        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .library-card { border-radius: 12px; overflow: hidden; border: 1px solid rgba(86,111,255,0.25); cursor: pointer; }
        .library-card img { width: 100%; height: 140px; object-fit: contain; display: block; background: rgba(0,0,0,0.12); }
        .dropzone { border: 2px dashed rgba(86,111,255,0.5); border-radius: 12px; padding: 14px; text-align: center; cursor: pointer; }
        .panel textarea { min-height: 96px; height: 96px; resize: vertical; box-sizing: border-box; }
        .panel select, .panel input[type="number"], .panel input[type="text"] { height: 32px; box-sizing: border-box; }
        .prompt-row { display: flex; gap: 12px; align-items: flex-start; }
        .prompt-row textarea { flex: 1; min-width: 0; }
        .video-btn-generate { flex-shrink: 0; font-size: 1.1rem; padding: 10px 20px; white-space: nowrap; }
        .task-list-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        .task-list-table th, .task-list-table td { padding: 8px 10px; border-bottom: 1px solid rgba(86,111,255,0.2); text-align: left; }
        .task-list-table th { font-weight: 600; }
        .task-list-table tr:hover { background: rgba(86,111,255,0.06); }
        .status-badge { padding: 3px 8px; border-radius: 999px; font-size: 0.75rem; }
        .status-queued { background: rgba(86,111,255,0.2); }
        .status-running { background: rgba(255,193,7,0.2); }
        .status-succeeded { background: rgba(40,167,69,0.2); }
        .status-failed { background: rgba(220,53,69,0.2); }
        .status-cancelled { background: rgba(108,117,125,0.2); }
        .video-play-fullscreen { position: fixed; inset: 0; z-index: 2000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); }
        .video-play-fullscreen video { width: 100vw; height: 100vh; object-fit: contain; cursor: pointer; }
        .video-play-fullscreen .video-close { position: absolute; top: 16px; right: 16px; z-index: 10; width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.2); color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .video-play-fullscreen .video-close:hover { background: rgba(255,255,255,0.35); }
        .frame-thumbs { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .frame-thumbs img { width: 40px; height: 40px; object-fit: contain; border-radius: 6px; border: 1px solid rgba(86,111,255,0.25); cursor: pointer; background: rgba(0,0,0,0.12); }
    </style>
</head>
<body>
    <div id="reactApp"></div>
    <script>
        window.__APP_CONTEXT__ = { username: "{{ user.username }}", is_system_admin: {{ 'true' if user.username == 'system_admin' else 'false' }} };
    </script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    {% raw %}
    <script type="text/babel">
        const { useEffect, useMemo, useState, useRef } = React;

        const Sidebar = ({ username, projects, currentProjectId, onProjectChange }) => (
            <nav className="sidebar-nav" id="sidebarNav">
                <div className="sidebar-nav-header">
                    <div className="sidebar-nav-title">Ai创作工具</div>
                    <button className="sidebar-nav-toggle" onClick={() => toggleSidebar()} title="收缩/展开">
                        <span id="toggleIcon">‹</span>
                    </button>
                </div>
                <div className="sidebar-nav-menu">
                    <a href="/" className="sidebar-nav-item"><span className="sidebar-nav-icon">🎨</span><span className="sidebar-nav-text">单图生成</span></a>
                    <a href="/batch" className="sidebar-nav-item"><span className="sidebar-nav-icon">📦</span><span className="sidebar-nav-text">批量生成</span></a>
                    <a href="/records" className="sidebar-nav-item"><span className="sidebar-nav-icon">📊</span><span className="sidebar-nav-text">生图任务</span></a>
                    <a href="/video-generate" className="sidebar-nav-item active"><span className="sidebar-nav-icon">🎬</span><span className="sidebar-nav-text">视频生成</span></a>
                    <a href="/video-tasks" className="sidebar-nav-item"><span className="sidebar-nav-icon">📹</span><span className="sidebar-nav-text">视频任务</span></a>
                    <a href="/script-generate" className="sidebar-nav-item"><span className="sidebar-nav-icon">📜</span><span className="sidebar-nav-text">剧本生成</span></a>
                    <a href="/storyboard-studio" className="sidebar-nav-item"><span className="sidebar-nav-icon">🧩</span><span className="sidebar-nav-text">分镜制作</span></a>
                    <a href="/content-management" className="sidebar-nav-item"><span className="sidebar-nav-icon">📚</span><span className="sidebar-nav-text">内容管理</span></a>
                    <a href="/txt2csv" className="sidebar-nav-item"><span className="sidebar-nav-icon">🔄</span><span className="sidebar-nav-text">转换工具</span></a>
                    {window.__APP_CONTEXT__?.is_system_admin && (
                        <>
                            <div className="sidebar-nav-divider"></div>
                            <a href="/admin" className="sidebar-nav-item"><span className="sidebar-nav-icon">🛠️</span><span className="sidebar-nav-text">系统管理</span></a>
                            <a href="/stats" className="sidebar-nav-item"><span className="sidebar-nav-icon">📈</span><span className="sidebar-nav-text">系统统计</span></a>
                        </>
                    )}
                </div>
                <div className="sidebar-nav-user">
                    <div className="sidebar-nav-user-info">
                        <div className="sidebar-nav-user-avatar">👤</div>
                        <div className="sidebar-nav-user-name">{username}</div>
                        <a href="/logout" className="sidebar-nav-logout">登出</a>
                    </div>
                    <div style={{ marginTop: '8px' }}>
                        <label style={{ fontSize: '0.85em', color: '#cbd4f5' }}>当前项目</label>
                        <select
                            style={{ width: '100%', padding: '6px', borderRadius: '6px' }}
                            value={currentProjectId || ''}
                            onChange={(e) => onProjectChange(e.target.value)}
                        >
                            {projects.length === 0 && <option>加载中...</option>}
                            {projects.map(p => (
                                <option key={p.id} value={p.id}>{p.name}</option>
                            ))}
                        </select>
                    </div>
                </div>
            </nav>
        );

        function App() {
            const [projects, setProjects] = useState([]);
            const [currentProjectId, setCurrentProjectId] = useState('');
            const [generateType, setGenerateType] = useState('text');
            const [prompt, setPrompt] = useState('');
            const [resolution, setResolution] = useState('1080p');
            const [ratio, setRatio] = useState('9:16');
            const [duration, setDuration] = useState(5);
            const [seed, setSeed] = useState(-1);
            const [cameraFixed, setCameraFixed] = useState('false');
            const [watermark, setWatermark] = useState('false');
            const [generateAudio, setGenerateAudio] = useState('false');
            const [returnLastFrame, setReturnLastFrame] = useState('false');
            const [firstFrame, setFirstFrame] = useState(null);
            const [lastFrame, setLastFrame] = useState(null);
            const [referenceImages, setReferenceImages] = useState([]);
            const [loading, setLoading] = useState(false);
            const [taskId, setTaskId] = useState('');
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            const [modalOpen, setModalOpen] = useState(false);
            const [modalType, setModalType] = useState('first');
            const [libraryType, setLibraryType] = useState('person');
            const [libraryAssets, setLibraryAssets] = useState([]);
            const [taskListTasks, setTaskListTasks] = useState([]);
            const [taskListPage, setTaskListPage] = useState(1);
            const [taskListTotalPages, setTaskListTotalPages] = useState(1);
            const [taskListPageSize, setTaskListPageSize] = useState(10);
            const [taskIdSearch, setTaskIdSearch] = useState('');
            const [statusFilter, setStatusFilter] = useState('');
            const [taskListAutoRefresh, setTaskListAutoRefresh] = useState(false);
            const [modalVideo, setModalVideo] = useState('');
            const videoRef = useRef(null);

            function statusBadge(status) {
                const map = {
                    queued: { text: '排队中', cls: 'status-queued' },
                    running: { text: '运行中', cls: 'status-running' },
                    succeeded: { text: '成功', cls: 'status-succeeded' },
                    failed: { text: '失败', cls: 'status-failed' },
                    cancelled: { text: '已取消', cls: 'status-cancelled' }
                };
                const info = map[status] || { text: status, cls: 'status-queued' };
                return <span className={`status-badge ${info.cls}`}>{info.text}</span>;
            }

            const loadTasks = async (page) => {
                const p = page ?? taskListPage;
                let url = `/api/video-tasks?page=${p}&page_size=${taskListPageSize}`;
                if (taskIdSearch) url += `&task_id=${encodeURIComponent(taskIdSearch)}`;
                if (statusFilter) url += `&status=${encodeURIComponent(statusFilter)}`;
                const resp = await fetch(url);
                const data = await resp.json();
                if (!data.success) {
                    setTaskListTasks([]);
                    return;
                }
                const items = data.items || data.tasks || [];
                setTaskListTasks(items);
                const total = data.total || items.length;
                setTaskListTotalPages(Math.max(1, Math.ceil(total / taskListPageSize)));
                setTaskListPage(p);
            };

            const playVideo = (url) => {
                if (!url || url === '-') return;
                setModalVideo(url);
            };

            const downloadVideo = (url, taskId) => {
                if (!url || url === '-') return;
                const downloadUrl = `/api/download-file?url=${encodeURIComponent(url)}`;
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = `video_${taskId}.mp4`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const deleteTaskFromList = async (taskId) => {
                if (!confirm('确定删除任务吗？')) return;
                const resp = await fetch(`/api/video-tasks/${taskId}`, { method: 'DELETE' });
                const data = await resp.json();
                if (data.success) loadTasks(1);
                else alert(data.error || '删除失败');
            };

            const regenerateFromTask = (task) => {
                if (!task) return;
                const params = new URLSearchParams();
                if (task.prompt) params.append('prompt', task.prompt);
                const content = task.content || {};
                let generateType = 'text';
                let referenceImageCount = 0;
                let hasFirstFromContent = false, hasLastFromContent = false;
                const contentArray = Array.isArray(content) ? content : (Array.isArray(content.content) ? content.content : []);
                contentArray.forEach(item => {
                    if (item.type === 'image_url' && item.role === 'reference_image') {
                        params.append(`reference_image_url_${referenceImageCount}`, item.image_url?.url || '');
                        referenceImageCount += 1;
                    } else if (item.type === 'image_url' && item.role === 'first_frame') {
                        generateType = 'first_last_frame';
                        params.append('first_frame_url', item.image_url?.url || '');
                        hasFirstFromContent = true;
                    } else if (item.type === 'image_url' && item.role === 'last_frame') {
                        generateType = 'first_last_frame';
                        params.append('last_frame_url', item.image_url?.url || '');
                        hasLastFromContent = true;
                    } else if (item.type === 'image_url' && !item.role) {
                        generateType = 'first_frame';
                        params.append('first_frame_url', item.image_url?.url || '');
                        hasFirstFromContent = true;
                    }
                });
                if (!hasFirstFromContent && (task.first_frame_url || (content && content.first_frame_url))) {
                    const url = task.first_frame_url || content.first_frame_url;
                    params.set('first_frame_url', url);
                    if (!generateType || generateType === 'text') generateType = 'first_frame';
                    if (task.last_frame_url || (content && content.last_frame_url)) generateType = 'first_last_frame';
                }
                if (!hasLastFromContent && (task.last_frame_url || (content && content.last_frame_url))) {
                    const url = task.last_frame_url || content.last_frame_url;
                    params.set('last_frame_url', url);
                    generateType = 'first_last_frame';
                }
                if (referenceImageCount > 0) {
                    generateType = 'reference_image';
                    params.append('reference_image_count', referenceImageCount);
                }
                params.append('generate_type', generateType);
                if (task.resolution) params.append('resolution', task.resolution);
                if (task.ratio) params.append('ratio', task.ratio);
                if (task.duration) params.append('duration', task.duration);
                if (task.seed !== undefined) params.append('seed', task.seed);
                if (task.camera_fixed !== undefined) params.append('camera_fixed', task.camera_fixed);
                if (task.watermark !== undefined) params.append('watermark', task.watermark);
                if (task.generate_audio !== undefined) params.append('generate_audio', task.generate_audio);
                if (task.return_last_frame !== undefined) params.append('return_last_frame', task.return_last_frame);
                window.location.href = `/video-generate?${params.toString()}`;
            };

            useEffect(() => {
                document.body.classList.add('react-theme', 'sidebar-compact');
            }, []);

            useEffect(() => {
                fetch('/api/projects').then(res => res.json()).then(data => {
                    if (data.success) {
                        setProjects(data.projects || []);
                        setCurrentProjectId(String(data.current_project_id || ''));
                    }
                });
            }, []);

            useEffect(() => { loadTasks(1); }, []);
            useEffect(() => { loadTasks(1); }, [currentProjectId]);

            useEffect(() => {
                if (!taskListAutoRefresh) return;
                const timer = setInterval(() => loadTasks(taskListPage), 5000);
                return () => clearInterval(timer);
            }, [taskListAutoRefresh, taskListPage, taskListPageSize, taskIdSearch, statusFilter]);

            useEffect(() => {
                if (!modalOpen) return;
                fetch(`/api/content-library?type=${libraryType}`).then(res => res.json()).then(data => {
                    if (data.success) setLibraryAssets(data.assets || []);
                    else setLibraryAssets([]);
                });
            }, [modalOpen, libraryType]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const type = params.get('generate_type');
                if (type) setGenerateType(type);
                if (params.get('prompt')) setPrompt(params.get('prompt'));
                if (params.get('first_frame_url')) setFirstFrame({ url: params.get('first_frame_url'), source: 'library' });
                if (params.get('last_frame_url')) setLastFrame({ url: params.get('last_frame_url'), source: 'library' });
                if (params.get('reference_image_url')) {
                    setReferenceImages([{ url: params.get('reference_image_url'), source: 'library' }]);
                }
            }, []);

            const handleFilePreview = (file, setter) => {
                const reader = new FileReader();
                reader.onload = () => setter({ file, url: reader.result, source: 'upload' });
                reader.readAsDataURL(file);
            };

            const uploadReferenceImages = async (files) => {
                const incoming = Array.from(files || []).filter(f => f.type.startsWith('image/'));
                if (!incoming.length) return;
                const remaining = 4 - referenceImages.length;
                const slice = incoming.slice(0, remaining);
                const uploads = [];
                for (const file of slice) {
                    const preview = await new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                    const item = { file, url: preview, source: 'upload', filename: file.name };
                    uploads.push(item);
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('category', 'scene');
                    fetch('/api/upload-sample-image', { method: 'POST', body: formData })
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                item.ossUrl = data.url;
                            }
                        })
                        .catch(() => {});
                }
                setReferenceImages(prev => prev.concat(uploads));
            };

            const addReferenceFromLibrary = (asset) => {
                if (referenceImages.length >= 4) return;
                if (referenceImages.some(img => img.url === asset.url)) return;
                setReferenceImages(prev => prev.concat({ url: asset.url, source: 'library', filename: asset.filename }));
            };

            const openLibrary = (type) => {
                setModalType(type);
                setModalOpen(true);
                setLibraryType('person');
            };

            const selectLibraryAsset = (asset) => {
                if (modalType === 'reference') {
                    addReferenceFromLibrary(asset);
                } else if (modalType === 'first') {
                    setFirstFrame({ url: asset.url, source: 'library', filename: asset.filename });
                    setModalOpen(false);
                } else if (modalType === 'last') {
                    setLastFrame({ url: asset.url, source: 'library', filename: asset.filename });
                    setModalOpen(false);
                }
            };

            const buildFormData = () => {
                const formData = new FormData();
                formData.append('generate_type', generateType);
                formData.append('prompt', prompt);
                formData.append('resolution', resolution);
                formData.append('ratio', ratio);
                formData.append('duration', String(duration));
                formData.append('seed', String(seed));
                formData.append('camera_fixed', cameraFixed);
                formData.append('watermark', watermark);
                formData.append('generate_audio', generateAudio);
                formData.append('return_last_frame', returnLastFrame);

                if (generateType === 'first_frame') {
                    if (firstFrame?.file) formData.append('first_frame', firstFrame.file);
                    else if (firstFrame?.url) formData.append('first_frame_url', firstFrame.url);
                }
                if (generateType === 'first_last_frame') {
                    if (firstFrame?.file) formData.append('first_frame', firstFrame.file);
                    else if (firstFrame?.url) formData.append('first_frame_url', firstFrame.url);
                    if (lastFrame?.file) formData.append('last_frame', lastFrame.file);
                    else if (lastFrame?.url) formData.append('last_frame_url', lastFrame.url);
                }
                if (generateType === 'reference_image') {
                    referenceImages.forEach((img, index) => {
                        if (img.ossUrl) {
                            formData.append(`reference_image_url_${index}`, img.ossUrl);
                        } else if (img.file) {
                            formData.append(`reference_image_${index}`, img.file);
                        } else if (img.url) {
                            formData.append(`reference_image_url_${index}`, img.url);
                        }
                    });
                    formData.append('reference_image_count', referenceImages.length);
                }
                return formData;
            };

            const handleSubmit = async () => {
                setError('');
                setSuccess('');
                if (!prompt.trim()) {
                    setError('请输入提示词');
                    return;
                }
                if (generateType === 'first_frame' && !firstFrame) {
                    setError('请选择首帧图片');
                    return;
                }
                if (generateType === 'first_last_frame' && (!firstFrame || !lastFrame)) {
                    setError('请选择首帧与尾帧图片');
                    return;
                }
                if (generateType === 'reference_image' && referenceImages.length === 0) {
                    setError('请至少选择1张参考图');
                    return;
                }
                setLoading(true);
                try {
                    const resp = await fetch('/api/video-generate', { method: 'POST', body: buildFormData() });
                    const data = await resp.json();
                    if (data.success) {
                        setTaskId(data.task_id || '');
                        setSuccess('视频生成任务创建成功！');
                        loadTasks(1);
                    } else {
                        setError(data.error || '创建任务失败');
                    }
                } catch (err) {
                    setError('请求失败: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="app-shell">
                    <Sidebar
                        username={window.__APP_CONTEXT__?.username || 'user'}
                        projects={projects}
                        currentProjectId={currentProjectId}
                        onProjectChange={async (pid) => {
                            const resp = await fetch('/api/projects/switch', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ project_id: pid })
                            });
                            const data = await resp.json();
                            if (data.success) window.location.reload();
                        }}
                    />
                    <div className="main-content">
                        <div className="page-wrap">
                            <div className="page-title">🎬 视频生成</div>
                            <div className="grid" style={{ marginTop: '16px' }}>
                                <div className="panel">
                                    <div className="section-title">生成参数</div>
                                    <div className="form-row">
                                        <div className="prompt-row">
                                            <textarea value={prompt} onChange={(e) => setPrompt(e.target.value)} placeholder="描述你想要生成的视频内容..." />
                                            <button className="btn btn-primary video-btn-generate" onClick={handleSubmit} disabled={loading}>
                                                {loading ? '生成中...' : '开始生成'}
                                            </button>
                                        </div>
                                        <div className="form-row three">
                                            <div>
                                                <label>分辨率</label>
                                                <select value={resolution} onChange={(e) => setResolution(e.target.value)}>
                                                    <option value="1080p">1080p</option>
                                                    <option value="720p">720p</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label>比例</label>
                                                <select value={ratio} onChange={(e) => setRatio(e.target.value)}>
                                                    <option value="9:16">9:16</option>
                                                    <option value="16:9">16:9</option>
                                                    <option value="1:1">1:1</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label>时长</label>
                                                <input type="number" min="2" max="12" value={duration} onChange={(e) => setDuration(Number(e.target.value))} />
                                            </div>
                                        </div>
                                        <div className="form-row three">
                                            <div>
                                                <label>种子</label>
                                                <input type="number" value={seed} onChange={(e) => setSeed(Number(e.target.value))} />
                                            </div>
                                            <div>
                                                <label>镜头固定</label>
                                                <select value={cameraFixed} onChange={(e) => setCameraFixed(e.target.value)}>
                                                    <option value="false">否</option>
                                                    <option value="true">是</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label>水印</label>
                                                <select value={watermark} onChange={(e) => setWatermark(e.target.value)}>
                                                    <option value="false">关闭</option>
                                                    <option value="true">开启</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="form-row two">
                                            <div>
                                                <label>生成音频</label>
                                                <select value={generateAudio} onChange={(e) => setGenerateAudio(e.target.value)}>
                                                    <option value="false">否</option>
                                                    <option value="true">是</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label>返回尾帧</label>
                                                <select value={returnLastFrame} onChange={(e) => setReturnLastFrame(e.target.value)}>
                                                    <option value="false">否</option>
                                                    <option value="true">是</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="panel">
                                    <div className="section-title">生成方式</div>
                                    <div className="form-row">
                                        {[
                                            { value: 'text', label: '文本生成' },
                                            { value: 'first_frame', label: '首帧生成' },
                                            { value: 'first_last_frame', label: '首尾帧生成' },
                                            { value: 'reference_image', label: '参考图生成' }
                                        ].map(option => (
                                            <div
                                                key={option.value}
                                                className={`type-card ${generateType === option.value ? 'active' : ''}`}
                                                onClick={() => setGenerateType(option.value)}
                                            >
                                                {option.label}
                                            </div>
                                        ))}
                                    </div>

                                    {generateType === 'first_frame' && (
                                        <div style={{ marginTop: '12px' }}>
                                            <div className="section-title">首帧选择</div>
                                            <div className="row">
                                                <button className="btn btn-secondary" onClick={() => openLibrary('first')}>从库选择</button>
                                                <label className="btn btn-secondary">
                                                    上传首帧
                                                    <input type="file" accept="image/*" style={{ display: 'none' }}
                                                        onChange={(e) => handleFilePreview(e.target.files[0], setFirstFrame)} />
                                                </label>
                                            </div>
                                            {firstFrame && (
                                                <div className="image-preview" style={{ marginTop: '10px' }}>
                                                    <img src={firstFrame.url} alt="first-frame" />
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {generateType === 'first_last_frame' && (
                                        <div style={{ marginTop: '12px' }}>
                                            <div className="section-title">首帧与尾帧</div>
                                            <div className="row">
                                                <button className="btn btn-secondary" onClick={() => openLibrary('first')}>首帧从库</button>
                                                <label className="btn btn-secondary">
                                                    上传首帧
                                                    <input type="file" accept="image/*" style={{ display: 'none' }}
                                                        onChange={(e) => handleFilePreview(e.target.files[0], setFirstFrame)} />
                                                </label>
                                            </div>
                                            {firstFrame && <div className="image-preview" style={{ marginTop: '8px' }}><img src={firstFrame.url} alt="first-frame" /></div>}
                                            <div className="row" style={{ marginTop: '12px' }}>
                                                <button className="btn btn-secondary" onClick={() => openLibrary('last')}>尾帧从库</button>
                                                <label className="btn btn-secondary">
                                                    上传尾帧
                                                    <input type="file" accept="image/*" style={{ display: 'none' }}
                                                        onChange={(e) => handleFilePreview(e.target.files[0], setLastFrame)} />
                                                </label>
                                            </div>
                                            {lastFrame && <div className="image-preview" style={{ marginTop: '8px' }}><img src={lastFrame.url} alt="last-frame" /></div>}
                                        </div>
                                    )}

                                    {generateType === 'reference_image' && (
                                        <div style={{ marginTop: '12px' }}>
                                            <div className="section-title">参考图</div>
                                            <div className="row">
                                                <button className="btn btn-secondary" onClick={() => openLibrary('reference')}>从库选择</button>
                                                <label className="btn btn-secondary">
                                                    上传参考图
                                                    <input type="file" accept="image/*" multiple style={{ display: 'none' }}
                                                        onChange={(e) => uploadReferenceImages(e.target.files)} />
                                                </label>
                                            </div>
                                            <div className="dropzone" style={{ marginTop: '10px' }}
                                                onDragOver={(e) => e.preventDefault()}
                                                onDrop={(e) => { e.preventDefault(); uploadReferenceImages(e.dataTransfer.files); }}>
                                                拖拽图片到此处（最多4张）
                                            </div>
                                            <div className="reference-grid" style={{ marginTop: '10px' }}>
                                                {referenceImages.map((img, idx) => (
                                                    <div key={idx} className="reference-item">
                                                        <img src={img.url} alt="reference" />
                                                        <button className="btn btn-danger" onClick={() => setReferenceImages(prev => prev.filter((_, i) => i !== idx))}>删除</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="row" style={{ marginTop: '12px' }}>
                                        {taskId && <a className="btn btn-secondary" href="/video-tasks">查看任务管理</a>}
                                    </div>
                                    {error && <div className="small-hint" style={{ color: '#ff9aa2' }}>{error}</div>}
                                    {success && <div className="small-hint" style={{ color: '#89f7c0' }}>{success} 任务ID：{taskId}</div>}
                                </div>
                            </div>

                            <div className="panel" style={{ marginTop: '24px' }}>
                                <div className="section-title">视频任务列表</div>
                                <div className="row space" style={{ marginBottom: '12px' }}>
                                    <div className="row">
                                        <input placeholder="任务ID（可选）" value={taskIdSearch} onChange={(e) => setTaskIdSearch(e.target.value)} style={{ width: '140px' }} />
                                        <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} style={{ width: '100px' }}>
                                            <option value="">全部状态</option>
                                            <option value="queued">排队中</option>
                                            <option value="running">运行中</option>
                                            <option value="succeeded">成功</option>
                                            <option value="failed">失败</option>
                                            <option value="cancelled">已取消</option>
                                        </select>
                                        <input type="number" min="1" max="50" value={taskListPageSize} onChange={(e) => setTaskListPageSize(Number(e.target.value))} style={{ width: '56px' }} title="每页条数" />
                                        <button className="btn btn-primary" onClick={() => loadTasks(1)}>查询</button>
                                        <button className="btn btn-secondary" onClick={() => loadTasks(taskListPage)}>刷新</button>
                                    </div>
                                    <label className="row" style={{ gap: '6px', margin: 0 }}>
                                        <input type="checkbox" checked={taskListAutoRefresh} onChange={(e) => setTaskListAutoRefresh(e.target.checked)} />
                                        <span className="small-hint">自动刷新</span>
                                    </label>
                                </div>
                                <div style={{ overflowX: 'auto' }}>
                                    <table className="task-list-table">
                                        <thead>
                                            <tr>
                                                <th>任务ID</th>
                                                <th>状态</th>
                                                <th>提示词</th>
                                                <th>首尾帧</th>
                                                <th>分辨率</th>
                                                <th>比例</th>
                                                <th>时长</th>
                                                <th>种子</th>
                                                <th>镜头</th>
                                                <th>水印</th>
                                                <th>操作</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {taskListTasks.map(task => {
                                                const taskId = task.id || task.task_id || '-';
                                                const videoUrl = task.video_url || (task.content && task.content.video_url) || '-';
                                                const firstFrame = task.first_frame_url || (task.content && task.content.first_frame_url) || '-';
                                                const lastFrame = task.last_frame_url || (task.content && task.content.last_frame_url) || '-';
                                                return (
                                                    <tr key={taskId}>
                                                        <td>{taskId}</td>
                                                        <td>{statusBadge(task.status)}</td>
                                                        <td style={{ maxWidth: '200px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={task.prompt || ''}>{task.prompt || '-'}</td>
                                                        <td>
                                                            <div className="frame-thumbs">
                                                                {firstFrame !== '-' && <img src={firstFrame} alt="首帧" title="首帧" onClick={() => window.open(firstFrame, '_blank')} />}
                                                                {lastFrame !== '-' && <img src={lastFrame} alt="尾帧" title="尾帧" onClick={() => window.open(lastFrame, '_blank')} />}
                                                                {firstFrame === '-' && lastFrame === '-' && '-'}
                                                            </div>
                                                        </td>
                                                        <td>{task.resolution || '-'}</td>
                                                        <td>{task.ratio || '-'}</td>
                                                        <td>{task.duration || '-'}</td>
                                                        <td>{task.seed ?? '-'}</td>
                                                        <td>{String(task.camera_fixed) || '-'}</td>
                                                        <td>{String(task.watermark) || '-'}</td>
                                                        <td>
                                                            {videoUrl !== '-' && <button className="btn btn-secondary" onClick={() => playVideo(videoUrl)}>播放</button>}
                                                            {videoUrl !== '-' && <button className="btn btn-secondary" onClick={() => downloadVideo(videoUrl, taskId)}>下载</button>}
                                                            <button className="btn btn-secondary" onClick={() => regenerateFromTask(task)}>重生成</button>
                                                            <button className="btn btn-danger" onClick={() => deleteTaskFromList(taskId)}>删除</button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                            {taskListTasks.length === 0 && (
                                                <tr>
                                                    <td colSpan="11"><div className="small-hint">暂无任务</div></td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="row space" style={{ marginTop: '12px' }}>
                                    <button className="btn btn-secondary" onClick={() => loadTasks(Math.max(1, taskListPage - 1))}>上一页</button>
                                    <span className="small-hint">第 {taskListPage} 页 / 共 {taskListTotalPages} 页</span>
                                    <button className="btn btn-secondary" onClick={() => loadTasks(Math.min(taskListTotalPages, taskListPage + 1))}>下一页</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {modalOpen && (
                        <div className="modal" onClick={() => setModalOpen(false)}>
                            <div className="modal-card panel" onClick={(e) => e.stopPropagation()}>
                                <div className="row space">
                                    <div className="section-title">
                                        {modalType === 'reference' ? `选择参考图 (${referenceImages.length}/4)` : '选择首帧/尾帧'}
                                    </div>
                                    <button className="btn btn-secondary" onClick={() => setModalOpen(false)}>关闭</button>
                                </div>
                                <div className="row" style={{ marginTop: '10px' }}>
                                    {['person', 'scene', 'image'].map(t => (
                                        <button
                                            key={t}
                                            className={`btn ${libraryType === t ? 'btn-primary' : 'btn-secondary'}`}
                                            onClick={() => setLibraryType(t)}
                                        >
                                            {t === 'person' ? '人物库' : t === 'scene' ? '场景库' : '图片库'}
                                        </button>
                                    ))}
                                </div>
                                <div className="library-grid" style={{ marginTop: '12px' }}>
                                    {libraryAssets.length === 0 && <div className="small-hint">暂无图片</div>}
                                    {libraryAssets.map((asset, idx) => (
                                        <div key={idx} className="library-card" onClick={() => selectLibraryAsset(asset)}>
                                            <img src={asset.url} alt={asset.filename || 'asset'} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {modalVideo && (
                        <div className="video-play-fullscreen" onClick={(e) => { if (e.target === e.currentTarget) setModalVideo(''); }}>
                            <button type="button" className="video-close" onClick={() => setModalVideo('')} title="关闭">×</button>
                            <video
                                ref={videoRef}
                                src={modalVideo}
                                onClick={(e) => { e.stopPropagation(); const v = videoRef.current; if (v) { if (v.paused) v.play(); else v.pause(); } }}
                                style={{ pointerEvents: 'auto' }}
                            />
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('reactApp')).render(<App />);
    </script>
    {% endraw %}
    <script src="/static/sidebar-nav.js"></script>
</body>
</html>
