<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能任务 - AI创作工具</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/sidebar-nav.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        .app-shell { min-height: 100vh; }
        .main-content { padding: 0; }
        .page-wrap { max-width: 1440px; margin: 0 auto; padding: 24px; }
        .page-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
        .page-subtitle { color: #aeb8d9; margin-bottom: 18px; }
        .panel { border-radius: 16px; padding: 18px; margin-bottom: 16px; }
        .filters { display: grid; grid-template-columns: 1.2fr 0.8fr 0.72fr 0.72fr auto auto auto; gap: 12px; align-items: end; }
        .filters input, .filters select { width: 100%; box-sizing: border-box; }
        .filters input[type="date"] { max-width: 150px; }
        .inline-options { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .task-table-wrap { overflow-x: auto; overflow-y: hidden; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
        .task-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; min-width: 1280px; }
        .task-table th, .task-table td { padding: 10px 12px; border-bottom: 1px solid rgba(86,111,255,0.18); text-align: left; vertical-align: top; }
        .task-table th { font-weight: 600; white-space: nowrap; }
        .select-cell { width: 34px; text-align: center; }
        .task-check { width: 16px; height: 16px; cursor: pointer; }
        .task-table td.filename-cell { min-width: 96px; max-width: 130px; word-break: break-all; }
        .status-pill { display: inline-block; padding: 4px 10px; border-radius: 999px; background: rgba(86,111,255,0.16); }
        .actions { display: grid; grid-template-columns: repeat(3, minmax(60px, 1fr)); gap: 6px; min-width: 210px; }
        .actions .btn { width: 100%; padding-left: 8px; padding-right: 8px; }
        .actions .btn[disabled] { opacity: 0.35; filter: grayscale(1); border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #7d86a8; }
        .btn.is-loading { opacity: 0.72; cursor: progress; position: relative; pointer-events: none; }
        .btn.is-loading::after { content: ""; display: inline-block; width: 12px; height: 12px; margin-left: 6px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; vertical-align: -2px; animation: spin 0.72s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        .detail-card { border-radius: 14px; padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(86,111,255,0.16); }
        .detail-card pre { white-space: pre-wrap; word-break: break-word; max-height: 320px; overflow: auto; }
        .meta-list { display: grid; gap: 6px; font-size: 0.92rem; }
        .small-hint { color: #9ca8cf; font-size: 0.86rem; }
        .reference-list { display: grid; gap: 6px; }
        .reference-list a { color: #9ed0ff; word-break: break-all; }
        .pager { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .preview-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .preview-inner { width: min(860px, 92vw); max-height: 88vh; padding: 18px; border-radius: 16px; background: rgba(8,13,24,0.96); }
        .preview-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
        .preview-video { width: 100%; max-height: 72vh; border-radius: 12px; background: rgba(0,0,0,0.24); }
        .btn:not([disabled]) { transition: transform 0.12s ease, opacity 0.12s ease, filter 0.12s ease; }
        .btn:not([disabled]):active { transform: translateY(1px) scale(0.98); }
        .toast-area { position: fixed; right: 18px; bottom: 18px; z-index: 4000; display: grid; gap: 10px; max-width: min(360px, calc(100vw - 32px)); }
        .toast { padding: 12px 14px; border-radius: 10px; background: rgba(14,20,36,0.96); border: 1px solid rgba(86,111,255,0.28); box-shadow: 0 14px 36px rgba(0,0,0,0.32); color: #e6ebff; font-size: 0.92rem; }
        .toast-success { border-color: rgba(46,204,113,0.5); }
        .toast-warning { border-color: rgba(245,166,35,0.55); }
        .toast-error { border-color: rgba(235,87,87,0.6); }
        .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
        @media (max-width: 980px) {
            .page-wrap { padding: 16px; }
            .filters { grid-template-columns: 1fr; }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="react-theme sidebar-compact">
    <div class="app-shell">
        {% set active_page = 'omni_video_tasks' %}
        {% include "_shared_sidebar.html" %}
        <main class="main-content">
            <div class="page-wrap">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <div class="page-title" style="margin-bottom: 0;">全能视频任务管理</div>
            <div id="balanceBar" style="display: flex; align-items: center; gap: 8px; font-size: 0.92rem;">
                <span id="balanceLabel" style="font-weight: 600;">账户余额：</span>
                <span id="balanceValue" style="color: #9ed0ff;">加载中...</span>
                <button id="refreshBalanceBtn" class="btn btn-secondary" style="padding: 2px 8px; font-size: 0.8rem;">刷新</button>
            </div>
        </div>
        <div class="page-subtitle">支持按日期范围筛选、分页查看、每 5 分钟自动刷新未完成任务，并在弹窗中直接预览生成视频。</div>

        <div class="panel">
            <div class="filters">
                <div>
                    <label for="search">搜索任务</label>
                    <input id="search" type="text" placeholder="按任务 ID、提示词或文件名搜索">
                </div>
                <div>
                    <label for="status">状态</label>
                    <select id="status">
                        <option value="">全部</option>
                        <option value="queued">queued</option>
                        <option value="running">running</option>
                        <option value="succeeded">succeeded</option>
                        <option value="failed">failed</option>
                        <option value="cancelled">cancelled</option>
                        <option value="expired">expired</option>
                    </select>
                </div>
                <div>
                    <label for="startDate">开始日期</label>
                    <input id="startDate" type="date">
                </div>
                <div>
                    <label for="endDate">结束日期</label>
                    <input id="endDate" type="date">
                </div>
                <button id="reloadBtn" class="btn btn-primary">查询任务</button>
                <button id="resetBtn" class="btn btn-secondary">重置</button>
                <a class="btn btn-secondary" href="/omni-video">创建新任务</a>
            </div>
            <div class="inline-options" style="margin-top: 12px;">
                <button id="refreshPendingBtn" class="btn btn-secondary">刷新</button>
                <button id="deleteSelectedBtn" class="btn btn-danger" disabled>删除所选</button>
                <label style="display:flex; align-items:center; gap:8px;">
                    <input id="autoRefresh" type="checkbox" checked>
                    <span>自动刷新未完成任务</span>
                </label>
                <span class="small-hint">开启后每 5 分钟自动刷新一次当前筛选结果。</span>
            </div>
        </div>

        <div class="panel task-table-wrap">
            <table class="task-table">
                <thead>
                    <tr>
                        <th class="select-cell"><input id="selectAllTasks" class="task-check" type="checkbox" aria-label="全选任务"></th>
                        <th>任务 ID</th>
                        <th>状态</th>
                        <th>模型</th>
                        <th>分辨率</th>
                        <th>文件名</th>
                        <th>Seed</th>
                        <th>时长(秒)</th>
                        <th>高宽比</th>
                        <th>Token 用量</th>
                        <th>金额(元)</th>
                        <th>创建时间</th>
                        <th>更新时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="taskRows">
                    <tr><td colspan="14">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="panel pager">
            <div id="pagerInfo" class="small-hint">第 1 页</div>
            <div class="actions">
                <button id="prevPageBtn" class="btn btn-secondary">上一页</button>
                <button id="nextPageBtn" class="btn btn-secondary">下一页</button>
            </div>
        </div>

        <div class="panel">
            <div style="font-weight: 600; margin-bottom: 12px;">任务详情</div>
            <div id="detailBox" class="detail-grid">
                <div class="detail-card">点击上方任务的“查看”按钮查看详情。</div>
            </div>
        </div>
            </div>
        </main>
    </div>

    <div id="previewModal" class="preview-modal">
        <div class="preview-inner">
            <div class="preview-header">
                <div id="previewTitle" style="font-weight:600;">视频预览</div>
                <button id="closePreviewBtn" class="btn btn-secondary">关闭</button>
            </div>
            <video id="previewVideo" class="preview-video" controls></video>
        </div>
    </div>
    <div id="enhanceModal" class="preview-modal" style="display:none;">
        <div class="preview-inner" style="width:min(500px, 92vw);">
            <div class="preview-header">
                <div id="enhanceModalTitle" style="font-weight:600;">画质增强</div>
                <button class="btn btn-secondary" id="enhanceModalClose">关闭</button>
            </div>
            <div style="padding:12px 0;">
                <div class="small-hint" style="margin-bottom:12px;">原视频：<span id="enhanceSourceFilename"></span></div>
                <div>
                    <label for="enhanceToolVersion" style="display:block;margin-bottom:6px;">工具版本</label>
                    <select id="enhanceToolVersion" style="width:100%;padding:8px;border-radius:8px;">
                        <option value="standard" selected>standard（推荐）</option>
                        <option value="professional">professional</option>
                    </select>
                </div>
                <div style="margin-top:12px;">
                    <label for="enhanceResolution" style="display:block;margin-bottom:6px;">目标分辨率</label>
                    <select id="enhanceResolution" style="width:100%;padding:8px;border-radius:8px;">
                        <option value="720p">720p</option>
                        <option value="1080p" selected>1080p（推荐）</option>
                        <option value="2k">2K</option>
                        <option value="4k">4K</option>
                    </select>
                </div>
                <button id="submitEnhanceBtn" class="btn btn-primary" style="width:100%;margin-top:16px;">开始增强</button>
            </div>
        </div>
    </div>
    <div id="toastArea" class="toast-area" aria-live="polite" aria-atomic="true"></div>

    <script src="/static/sidebar-nav.js"></script>
    <script src="/static/sidebar-shared.js"></script>
    <script>
        const PAGE_SIZE = 10;
        const AUTO_REFRESH_MS = 5 * 60 * 1000;
        const TERMINAL_STATUSES = ['succeeded', 'success', 'completed', 'done', 'finished', 'failed', 'cancelled', 'canceled', 'expired'];

        let currentTaskId = null;
        let currentItems = [];
        let currentPage = 1;
        let currentTotal = 0;
        let detailExpanded = false;
        let autoRefreshTimer = null;
        let modelAliases = {};
        let taskListLoading = false;
        let selectedTaskIds = new Set();
        let currentEnhanceTask = null;

        function debugLog(label, payload) {
            console.group(`[OmniVideoTasks] ${label}`);
            console.log(payload);
            console.groupEnd();
        }

        function showToast(message, type = 'success') {
            const area = document.getElementById('toastArea');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            area.appendChild(toast);
            window.setTimeout(() => {
                toast.remove();
            }, 3200);
        }

        async function withButtonBusy(button, busyText, action, options = {}) {
            if (!button) return action();
            if (button.disabled || button.classList.contains('is-loading')) {
                return;
            }
            const shouldRestoreText = options.restoreText !== false;
            const oldText = button.textContent;
            const oldWidth = button.offsetWidth;
            button.disabled = true;
            button.classList.add('is-loading');
            button.setAttribute('aria-busy', 'true');
            button.style.minWidth = `${oldWidth}px`;
            button.textContent = busyText;
            try {
                return await action();
            } finally {
                button.disabled = false;
                button.classList.remove('is-loading');
                button.removeAttribute('aria-busy');
                button.style.minWidth = '';
                if (shouldRestoreText) {
                    button.textContent = oldText;
                }
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function modelAlias(model) {
            return modelAliases[model] || model || '-';
        }

        function renderDuration(task) {
            if (task.duration === -1) return '-1';
            if (task.duration == null || task.duration === '') return '-';
            return `${task.duration}`;
        }

        function renderTokenUsage(task) {
            if (task.token_usage != null && task.token_usage !== '') return task.token_usage;
            const usage = task.usage_json || {};
            return usage.total_tokens ?? '-';
        }

        function renderFilename(task) {
            return task.filename || '';
        }

        function canDownload(task) {
            return Boolean(task && task.video_url);
        }

        function canEnhanceTask(task) {
            return Boolean(task && task.video_url);
        }

        function downloadTask(taskId) {
            const decodedTaskId = decodeURIComponent(taskId);
            const task = currentItems.find((item) => item.task_id === decodedTaskId);
            const filename = (task && (task.download_filename || task.filename)) || `${decodedTaskId}.mp4`;
            const link = document.createElement('a');
            link.href = `/api/omni-video/tasks/${encodeURIComponent(decodedTaskId)}/download`;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            link.remove();
        }

        async function downloadTaskWithFeedback(taskId, button = null) {
            return withButtonBusy(button, '下载中...', async () => {
                downloadTask(taskId);
                await new Promise((resolve) => window.setTimeout(resolve, 450));
            });
        }

        function canRefreshTask(task) {
            const status = String(task?.status || '').toLowerCase();
            return ['running', 'queued'].includes(status);
        }

        async function loadOmniConfig() {
            try {
                const resp = await fetch('/api/omni-video/config');
                const data = await resp.json();
                if (resp.ok && data.success) {
                    modelAliases = data.model_aliases || {};
                }
            } catch (error) {
                modelAliases = {};
            }
        }

        function collapseDetails(message = '点击上方任务的“查看”按钮查看详情。') {
            currentTaskId = null;
            detailExpanded = false;
            document.getElementById('detailBox').innerHTML = `<div class="detail-card">${escapeHtml(message)}</div>`;
            updateViewButtonLabels();
        }

        function updateViewButtonLabels(activeTaskId = null) {
            document.querySelectorAll('.task-view-btn').forEach((button) => {
                button.textContent = button.dataset.taskId === activeTaskId ? '收起' : '查看';
            });
        }

        function updateSelectionControls() {
            const deleteBtn = document.getElementById('deleteSelectedBtn');
            const selectAll = document.getElementById('selectAllTasks');
            const visibleIds = currentItems.map((item) => item.task_id).filter(Boolean);
            const selectedVisibleCount = visibleIds.filter((taskId) => selectedTaskIds.has(taskId)).length;
            deleteBtn.disabled = selectedTaskIds.size === 0;
            deleteBtn.textContent = selectedTaskIds.size ? `删除所选(${selectedTaskIds.size})` : '删除所选';
            if (selectAll) {
                selectAll.checked = visibleIds.length > 0 && selectedVisibleCount === visibleIds.length;
                selectAll.indeterminate = selectedVisibleCount > 0 && selectedVisibleCount < visibleIds.length;
            }
        }

        function toggleTaskSelection(taskId, checked) {
            if (!taskId) return;
            if (checked) selectedTaskIds.add(taskId);
            else selectedTaskIds.delete(taskId);
            updateSelectionControls();
        }

        function toggleAllVisibleTasks(checked) {
            currentItems.forEach((task) => {
                if (!task.task_id) return;
                if (checked) selectedTaskIds.add(task.task_id);
                else selectedTaskIds.delete(task.task_id);
            });
            document.querySelectorAll('.task-row-check').forEach((checkbox) => {
                checkbox.checked = checked;
            });
            updateSelectionControls();
        }

        function currentFilters() {
            return {
                search: document.getElementById('search').value.trim(),
                status: document.getElementById('status').value,
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value,
            };
        }

        function renderTaskRows() {
            const tbody = document.getElementById('taskRows');
            tbody.innerHTML = currentItems.map((task) => `
                <tr>
                    <td class="select-cell"><input class="task-check task-row-check" type="checkbox" data-task-id="${escapeHtml(task.task_id || '')}" ${selectedTaskIds.has(task.task_id) ? 'checked' : ''} onchange="toggleTaskSelection(this.dataset.taskId, this.checked)" aria-label="选择任务 ${escapeHtml(task.task_id || '')}"></td>
                    <td>${escapeHtml(task.task_id || '-')}</td>
                    <td><span class="status-pill">${escapeHtml(task.status || '-')}</span></td>
                    <td>${escapeHtml(modelAlias(task.model || '-'))}</td>
                    <td>${escapeHtml(task.resolution || '-')}</td>
                    <td class="filename-cell">${escapeHtml(renderFilename(task))}</td>
                    <td>${escapeHtml(task.seed ?? '-')}</td>
                    <td>${escapeHtml(renderDuration(task))}</td>
                    <td>${escapeHtml(task.aspect_ratio || '-')}</td>
                    <td>${escapeHtml(renderTokenUsage(task))}</td>
                    <td>${task.amount_yuan != null ? Number(task.amount_yuan).toFixed(2) : '-'}</td>
                    <td>${escapeHtml(task.created_at || '-')}</td>
                    <td>${escapeHtml(task.updated_at || '-')}</td>
                    <td>
                        <div class="actions">
                            <button class="btn btn-secondary task-view-btn" data-task-id="${escapeHtml(task.task_id || '')}" onclick="viewTask('${encodeURIComponent(task.task_id || '')}', this)">${currentTaskId === task.task_id && detailExpanded ? '收起' : '查看'}</button>
                            <button class="btn btn-secondary" onclick="previewTask('${encodeURIComponent(task.task_id || '')}', this)">预览</button>
                            <button class="btn btn-secondary" ${canDownload(task) ? '' : 'disabled title="视频生成成功后可下载"'} onclick="${canDownload(task) ? `downloadTaskWithFeedback('${encodeURIComponent(task.task_id || '')}', this)` : 'return false;'}">下载</button>
                            <button class="btn btn-secondary" ${canRefreshTask(task) ? '' : 'disabled title="仅 queued/running 状态可刷新"'} onclick="${canRefreshTask(task) ? `refreshTask('${encodeURIComponent(task.task_id || '')}', this)` : 'return false;'}">刷新</button>
                            <button class="btn btn-secondary" onclick="regenerateTask('${encodeURIComponent(task.task_id || '')}', this)">重做</button>
                            <button class="btn btn-secondary" ${canEnhanceTask(task) ? '' : 'disabled title="视频生成成功后可增强"'} onclick="${canEnhanceTask(task) ? `openEnhanceModalForTask('${encodeURIComponent(task.task_id || '')}', this)` : 'return false;'}">增强</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            updateSelectionControls();
        }

        async function loadTasks(page = currentPage) {
            if (taskListLoading) {
                showToast('任务列表正在加载，请稍候。', 'warning');
                return;
            }
            taskListLoading = true;
            currentPage = page;
            updatePager();
            const filters = currentFilters();
            const params = new URLSearchParams({ page: String(currentPage), page_size: String(PAGE_SIZE) });
            params.set('sync_running', 'false');
            if (filters.search) params.set('search', filters.search);
            if (filters.status) params.set('status', filters.status);
            if (filters.start_date) params.set('start_date', filters.start_date);
            if (filters.end_date) params.set('end_date', filters.end_date);

            debugLog('list request', { ...filters, page: currentPage, page_size: PAGE_SIZE });
            const tbody = document.getElementById('taskRows');
            tbody.innerHTML = '<tr><td colspan="14">加载中...</td></tr>';
            let data;
            try {
                const resp = await fetch(`/api/omni-video/tasks?${params.toString()}`);
                data = await resp.json();
                debugLog('list response', data);
                if (!resp.ok || !data.success) {
                    throw new Error(data.error || '加载失败');
                }
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="14">${escapeHtml(error.message || '加载失败')}</td></tr>`;
                showToast(error.message || '加载任务失败', 'error');
                return;
            } finally {
                taskListLoading = false;
                updatePager();
            }

            currentItems = data.items || [];
            selectedTaskIds = new Set([...selectedTaskIds].filter((taskId) => currentItems.some((task) => task.task_id === taskId)));
            currentTotal = data.total || 0;
            updatePager();
            updateSelectionControls();

            if (!currentItems.length) {
                tbody.innerHTML = '<tr><td colspan="14">暂无任务</td></tr>';
                collapseDetails('当前没有可查看的任务。');
                updateSelectionControls();
                return;
            }

            renderTaskRows();
        }

        function updatePager() {
            const totalPages = Math.max(1, Math.ceil(currentTotal / PAGE_SIZE));
            document.getElementById('pagerInfo').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页，合计 ${currentTotal} 条`;
            document.getElementById('prevPageBtn').disabled = taskListLoading || currentPage <= 1;
            document.getElementById('nextPageBtn').disabled = taskListLoading || currentPage >= totalPages;
        }

        function renderReferences(task) {
            const refs = task.reference_urls_json || [];
            if (!refs.length) return '<div class="small-hint">无</div>';
            return refs.map((url) => `<a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">${escapeHtml(url)}</a>`).join('');
        }

        function renderDetails(task) {
            const usage = task.usage_json || {};
            const requestPayload = task.input_payload_json || {};
            const remotePayload = task.raw_response_json || {};
            return `
                <div class="detail-card">
                    <div style="font-weight:600; margin-bottom: 8px;">基础信息</div>
                    <div class="meta-list">
                        <div><strong>任务 ID：</strong>${escapeHtml(task.task_id || '-')}</div>
                        <div><strong>文件名：</strong>${escapeHtml(task.filename || '-')}</div>
                        <div><strong>状态：</strong>${escapeHtml(task.status || '-')}</div>
                        <div><strong>模型：</strong>${escapeHtml(modelAlias(task.model || requestPayload.model || '-'))}</div>
                        <div><strong>提示词：</strong>${escapeHtml(task.prompt || '-')}</div>
                        <div><strong>分辨率：</strong>${escapeHtml(task.resolution || requestPayload.resolution || '-')}</div>
                        <div><strong>高宽比：</strong>${escapeHtml(task.aspect_ratio || requestPayload.aspect_ratio || requestPayload.ratio || '-')}</div>
                        <div><strong>时长：</strong>${escapeHtml(renderDuration(task))} 秒</div>
                        <div><strong>Seed：</strong>${escapeHtml(task.seed ?? '-')}</div>
                        <div><strong>生成声音：</strong>${escapeHtml(String(requestPayload.generate_audio ?? true))}</div>
                        <div><strong>Token 用量：</strong>${escapeHtml(renderTokenUsage(task))}</div>
                        <div><strong>创建时间：</strong>${escapeHtml(task.created_at || '-')}</div>
                        <div><strong>更新时间：</strong>${escapeHtml(task.updated_at || '-')}</div>
                        <div><strong>失败原因：</strong>${escapeHtml(task.fail_reason || '-')}</div>
                    </div>
                </div>
                <div class="detail-card">
                    <div style="font-weight:600; margin-bottom: 8px;">参考素材</div>
                    <div class="reference-list">${renderReferences(task)}</div>
                    <div style="font-weight:600; margin: 12px 0 8px;">用量信息</div>
                    <pre>${escapeHtml(JSON.stringify(usage, null, 2) || '{}')}</pre>
                </div>
                <div class="detail-card">
                    <div style="font-weight:600; margin-bottom: 8px;">请求参数</div>
                    <pre>${escapeHtml(JSON.stringify(requestPayload, null, 2) || '{}')}</pre>
                </div>
                <div class="detail-card">
                    <div style="font-weight:600; margin-bottom: 8px;">远端返回</div>
                    <pre>${escapeHtml(JSON.stringify(remotePayload, null, 2) || '{}')}</pre>
                </div>
            `;
        }

        async function fetchTask(taskId) {
            const decodedTaskId = decodeURIComponent(taskId);
            debugLog('detail request', { taskId: decodedTaskId });
            const resp = await fetch(`/api/omni-video/tasks/${encodeURIComponent(decodedTaskId)}`);
            const data = await resp.json();
            debugLog('detail response', data);
            if (!resp.ok || !data.success) {
                throw new Error(data.error || '任务不存在或加载失败');
            }
            return data.task || {};
        }

        function openPreviewModal(task) {
            if (!task.video_url) {
                alert('当前任务还没有可预览的视频结果');
                return false;
            }
            const modal = document.getElementById('previewModal');
            const video = document.getElementById('previewVideo');
            document.getElementById('previewTitle').textContent = `视频预览 / ${task.task_id || '-'}`;
            video.src = task.video_url;
            video.poster = task.cover_url || '';
            modal.style.display = 'flex';
            return true;
        }

        function closePreviewModal() {
            const modal = document.getElementById('previewModal');
            const video = document.getElementById('previewVideo');
            video.pause();
            video.removeAttribute('src');
            video.removeAttribute('poster');
            modal.style.display = 'none';
        }

        async function viewTask(taskId, button = null) {
            const decodedTaskId = decodeURIComponent(taskId);
            if (currentTaskId === decodedTaskId && detailExpanded) {
                collapseDetails();
                return;
            }

            return withButtonBusy(button, '查看中...', async () => {
                const task = await fetchTask(taskId);
                currentTaskId = decodedTaskId;
                detailExpanded = true;
                document.getElementById('detailBox').innerHTML = renderDetails(task);
                updateViewButtonLabels(decodedTaskId);
            }, { restoreText: false }).catch((error) => {
                collapseDetails(error.message || '任务不存在或加载失败。');
                showToast(error.message || '任务不存在或加载失败', 'error');
            });
        }

        async function previewTask(taskId, button = null) {
            const decodedTaskId = decodeURIComponent(taskId);
            let task = currentItems.find((item) => item.task_id === decodedTaskId);
            return withButtonBusy(button, '加载中...', async () => {
                if (!task || !task.video_url) {
                    task = await fetchTask(taskId);
                }
                openPreviewModal(task);
            }).catch((error) => {
                showToast(error.message || '预览失败', 'error');
            });
        }

        async function deleteSelectedTasks(button = null) {
            const taskIds = Array.from(selectedTaskIds);
            if (!taskIds.length) {
                showToast('请先选择要删除的任务。', 'warning');
                return;
            }
            if (!confirm(`确认删除选中的 ${taskIds.length} 个任务吗？`)) return;

            return withButtonBusy(button, '删除中...', async () => {
                const resp = await fetch('/api/omni-video/tasks/batch-delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_ids: taskIds }),
                });
                const data = await resp.json();
                if (!resp.ok || !data.success) {
                    throw new Error(data.error || '批量删除失败');
                }
                const deletedSet = new Set(taskIds.filter((taskId) => !(data.failed || []).includes(taskId)));
                selectedTaskIds = new Set([...selectedTaskIds].filter((taskId) => !deletedSet.has(taskId)));
                if (currentTaskId && deletedSet.has(currentTaskId)) {
                    collapseDetails('任务已删除。');
                }
                await loadTasks(currentPage);
                const failedCount = (data.failed || []).length;
                showToast(failedCount ? `已删除 ${data.deleted || 0} 个任务，${failedCount} 个失败` : data.message || '任务已删除', failedCount ? 'warning' : 'success');
                updateSelectionControls();
            }, { restoreText: false }).catch((error) => {
                showToast(error.message || '批量删除失败', 'error');
                updateSelectionControls();
            });
        }

        async function refreshTask(taskId, button = null) {
            const decodedTaskId = decodeURIComponent(taskId);
            return withButtonBusy(button, '刷新中...', async () => {
                let task = currentItems.find((item) => item.task_id === decodedTaskId);
                if (!task) {
                    task = await fetchTask(taskId);
                }
                if (!canRefreshTask(task)) {
                    showToast(`当前状态为 ${task.status || '-'}，不需要刷新。`, 'warning');
                    return;
                }
                const resp = await fetch(`/api/omni-video/tasks/${encodeURIComponent(decodedTaskId)}/refresh`, {
                    method: 'POST',
                });
                const data = await resp.json();
                if (!resp.ok || !data.success) {
                    throw new Error(data.error || '刷新任务失败');
                }
                if (currentTaskId === decodedTaskId && detailExpanded) {
                    document.getElementById('detailBox').innerHTML = renderDetails(data.task || task);
                }
                if (data.task) {
                    const idx = currentItems.findIndex((item) => item.task_id === decodedTaskId);
                    if (idx !== -1) {
                        currentItems[idx] = data.task;
                    }
                    renderTaskRows();
                    if (currentTaskId === decodedTaskId && detailExpanded) {
                        document.getElementById('detailBox').innerHTML = renderDetails(data.task);
                    }
                }
                showToast('任务已刷新');
            }).catch((error) => {
                showToast(error.message || '刷新失败', 'error');
            });
        }

        function taskToPrefill(task) {
            const payload = task.input_payload_json || {};
            return {
                prompt: task.prompt || payload.prompt || '',
                model: task.model || payload.model || '',
                resolution: task.resolution || payload.resolution || '',
                // 使用 ?? 避免空字符串被跳过，优先取 payload.filename（实际存储的字段）
                filename_base: ((payload.filename ?? task.filename ?? payload.filename_base ?? '') + '').replace(/\.mp4$/i, ''),
                duration: payload.duration ?? task.duration ?? -1,
                frame_count: payload.frame_count ?? null,
                // 使用 ?? 避免 aspect_ratio 为空字符串时被跳过，同时支持 payload.ratio 作为备用
                aspect_ratio: task.aspect_ratio ?? payload.aspect_ratio ?? payload.ratio ?? '9:16',
                seed: task.seed ?? payload.seed ?? -1,
                generate_audio: payload.generate_audio ?? true,
                reference_urls: task.reference_urls_json || payload.reference_urls || [],
            };
        }

        function hasPrefillData(task) {
            if (!task || typeof task !== 'object') return false;
            const payload = task.input_payload_json;
            const refs = task.reference_urls_json;
            const hasPayload = payload && typeof payload === 'object' && Object.keys(payload).length > 0;
            const hasRefs = Array.isArray(refs) && refs.length > 0;
            return hasPayload || hasRefs;
        }

        async function regenerateTask(taskId, button = null) {
            const decodedTaskId = decodeURIComponent(taskId);
            let task = currentItems.find((item) => item.task_id === decodedTaskId);
            return withButtonBusy(button, '准备中...', async () => {
                if (!hasPrefillData(task)) {
                    task = await fetchTask(taskId);
                }

                localStorage.setItem('omniVideoRegenerateData', JSON.stringify(taskToPrefill(task)));
                window.location.href = '/omni-video';
            }).catch((error) => {
                showToast(error.message || '加载任务失败', 'error');
            });
        }

        function openEnhanceModalForTask(taskId, button = null) {
            const decodedTaskId = decodeURIComponent(taskId);
            const task = currentItems.find((item) => item.task_id === decodedTaskId);
            if (!task || !task.video_url) {
                showToast('当前任务还没有可增强的视频。', 'warning');
                return;
            }
            currentEnhanceTask = task;
            document.getElementById('enhanceSourceFilename').textContent = task.download_filename || task.filename || `${decodedTaskId}.mp4`;
            document.getElementById('enhanceToolVersion').value = 'standard';
            document.getElementById('enhanceResolution').value = '1080p';
            document.getElementById('enhanceModal').style.display = 'flex';
        }

        function closeEnhanceModal() {
            document.getElementById('enhanceModal').style.display = 'none';
            currentEnhanceTask = null;
        }

        async function submitEnhanceTask(button = null) {
            if (!currentEnhanceTask || !currentEnhanceTask.video_url) {
                showToast('当前任务还没有可增强的视频。', 'warning');
                return;
            }
            const toolVersion = document.getElementById('enhanceToolVersion').value;
            const resolution = document.getElementById('enhanceResolution').value;
            return withButtonBusy(button, '提交中...', async () => {
                const resp = await fetch('/api/video-enhance/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        source_video_url: currentEnhanceTask.video_url,
                        source_video_id: currentEnhanceTask.task_id,
                        source_filename: currentEnhanceTask.download_filename || currentEnhanceTask.filename || `${currentEnhanceTask.task_id}.mp4`,
                        tool_version: toolVersion,
                        resolution: resolution,
                    }),
                });
                const data = await resp.json();
                if (!resp.ok || !data.success) {
                    throw new Error(data.error || '画质增强任务创建失败');
                }
                closeEnhanceModal();
                showToast(`画质增强任务已创建：${data.task_id || '-'}`);
            }).catch((error) => {
                showToast(error.message || '提交失败', 'error');
            });
        }

        function resetFilters() {
            document.getElementById('search').value = '';
            document.getElementById('status').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            currentPage = 1;
            return loadTasks(1);
        }

        async function refreshPendingTasksInPlace() {
            const pendingTasks = currentItems.filter((item) => canRefreshTask(item));
            if (pendingTasks.length === 0) {
                return 0;
            }
            debugLog('refresh pending tasks', pendingTasks.map(t => t.task_id));
            const refreshPromises = pendingTasks.map(async (task) => {
                try {
                    const resp = await fetch(`/api/omni-video/tasks/${encodeURIComponent(task.task_id)}/refresh`, {
                        method: 'POST',
                    });
                    const data = await resp.json();
                    if (data.success && data.task) {
                        const idx = currentItems.findIndex((item) => item.task_id === task.task_id);
                        if (idx !== -1) {
                            currentItems[idx] = data.task;
                        }
                    }
                } catch (error) {
                    debugLog('refresh pending error', { taskId: task.task_id, error: error.message });
                }
            });
            await Promise.all(refreshPromises);

            renderTaskRows();

            if (currentTaskId && detailExpanded) {
                const updatedTask = currentItems.find((item) => item.task_id === currentTaskId);
                if (updatedTask) {
                    document.getElementById('detailBox').innerHTML = renderDetails(updatedTask);
                }
            }
            return pendingTasks.length;
        }

        async function manualRefreshPending() {
            const btn = document.getElementById('refreshPendingBtn');
            return withButtonBusy(btn, '刷新中...', async () => {
                const count = await refreshPendingTasksInPlace();
                debugLog('manual refresh completed', { refreshedCount: count });
                showToast(count > 0 ? `已刷新 ${count} 个未完成任务` : '当前页没有未完成任务', count > 0 ? 'success' : 'warning');
            }).catch((error) => {
                showToast(error.message || '刷新失败', 'error');
            });
        }

        function setupAutoRefresh() {
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
                autoRefreshTimer = null;
            }
            if (!document.getElementById('autoRefresh').checked) return;
            autoRefreshTimer = setInterval(async () => {
                try {
                    const count = await refreshPendingTasksInPlace();
                    if (count > 0) {
                        debugLog('auto refresh completed', { refreshedCount: count });
                    }
                } catch (error) {
                    debugLog('auto refresh failed', { error: error.message });
                }
            }, AUTO_REFRESH_MS);
        }

        document.getElementById('reloadBtn').addEventListener('click', (event) => {
            withButtonBusy(event.currentTarget, '查询中...', () => loadTasks(1));
        });
        document.getElementById('refreshPendingBtn').addEventListener('click', manualRefreshPending);
        document.getElementById('deleteSelectedBtn').addEventListener('click', (event) => {
            deleteSelectedTasks(event.currentTarget);
        });
        document.getElementById('selectAllTasks').addEventListener('change', (event) => {
            toggleAllVisibleTasks(event.currentTarget.checked);
        });
        document.getElementById('resetBtn').addEventListener('click', (event) => {
            withButtonBusy(event.currentTarget, '重置中...', resetFilters);
        });
        document.getElementById('search').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') loadTasks(1);
        });
        document.getElementById('status').addEventListener('change', () => loadTasks(1));
        document.getElementById('startDate').addEventListener('change', () => loadTasks(1));
        document.getElementById('endDate').addEventListener('change', () => loadTasks(1));
        document.getElementById('autoRefresh').addEventListener('change', setupAutoRefresh);
        document.getElementById('prevPageBtn').addEventListener('click', () => {
            if (currentPage > 1) {
                withButtonBusy(document.getElementById('prevPageBtn'), '加载中...', () => loadTasks(currentPage - 1));
            }
        });
        document.getElementById('nextPageBtn').addEventListener('click', () => {
            const totalPages = Math.max(1, Math.ceil(currentTotal / PAGE_SIZE));
            if (currentPage < totalPages) {
                withButtonBusy(document.getElementById('nextPageBtn'), '加载中...', () => loadTasks(currentPage + 1));
            }
        });
        document.getElementById('closePreviewBtn').addEventListener('click', closePreviewModal);
        document.getElementById('previewModal').addEventListener('click', (event) => {
            if (event.target === event.currentTarget) {
                closePreviewModal();
            }
        });
        document.getElementById('enhanceModalClose').addEventListener('click', closeEnhanceModal);
        document.getElementById('enhanceModal').addEventListener('click', (event) => {
            if (event.target === event.currentTarget) {
                closeEnhanceModal();
            }
        });
        document.getElementById('submitEnhanceBtn').addEventListener('click', (event) => {
            submitEnhanceTask(event.currentTarget);
        });
        loadOmniConfig().then(() => {
            loadTasks(1);
            setupAutoRefresh();
        });

        // 账户余额查询逻辑
        const BALANCE_REFRESH_MS = 60 * 60 * 1000; // 1小时
        let balanceTimer = null;

        function formatBalance(amount) {
            return `¥${Number(amount || 0).toFixed(2)}`;
        }

        async function loadBalance(button = null) {
            const labelEl = document.getElementById('balanceLabel');
            const valueEl = document.getElementById('balanceValue');
            return withButtonBusy(button, '刷新中...', async () => {
                valueEl.textContent = '查询中...';
                const resp = await fetch('/api/omni-video/balance');
                const data = await resp.json();
                if (data.success) {
                    labelEl.textContent = data.balance_type === 'user' ? '我的余额：' : '系统余额：';
                    valueEl.textContent = formatBalance(data.available_balance);
                } else {
                    valueEl.textContent = '查询失败';
                }
            }).catch((error) => {
                valueEl.textContent = '查询失败';
            });
        }

        function startBalanceTimer() {
            if (balanceTimer) {
                clearInterval(balanceTimer);
            }
            balanceTimer = setInterval(loadBalance, BALANCE_REFRESH_MS);
        }

        document.getElementById('refreshBalanceBtn').addEventListener('click', (event) => {
            loadBalance(event.currentTarget);
        });
        loadBalance();
        startBalanceTimer();
    </script>
</body>
</html>
