<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分镜制作 - Ai创作工具</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        :root {
            color-scheme: dark;
        }
        body {
            background: radial-gradient(circle at top, rgba(82,108,255,0.18), transparent 40%), #0b0f1a;
            color: #e6ebff;
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .main-content {
            background: transparent;
            padding: 0;
        }
        .studio-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 28px 24px 40px;
        }
        .studio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .studio-title {
            font-size: 1.4rem;
            font-weight: 600;
        }
        .studio-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 18px;
        }
        .flow-column {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .studio-card {
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(93, 110, 170, 0.3);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 10px 30px rgba(5, 10, 25, 0.5);
            backdrop-filter: blur(10px);
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .card-hint {
            font-size: 0.85rem;
            color: #9aa3c7;
            margin-bottom: 12px;
        }
        textarea, input, select {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(86, 111, 255, 0.25);
            background: rgba(11, 15, 26, 0.8);
            color: #e6ebff;
            padding: 10px 12px;
            font-size: 0.92rem;
            outline: none;
        }
        textarea {
            min-height: 220px;
            resize: vertical;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .btn {
            padding: 9px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #5871ff, #3b7bff);
            color: #fff;
        }
        .btn-secondary {
            background: rgba(86, 111, 255, 0.15);
            color: #c8d2ff;
            border: 1px solid rgba(86, 111, 255, 0.4);
        }
        .progress-text {
            font-size: 0.85rem;
            color: #8fd3ff;
            margin-top: 8px;
        }
        .preview-list {
            border: 1px dashed rgba(120, 132, 183, 0.4);
            border-radius: 14px;
            padding: 12px;
            background: rgba(10, 14, 24, 0.6);
            min-height: 200px;
        }
        .preview-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(120, 132, 183, 0.2);
            font-size: 0.85rem;
            color: #cbd4f5;
        }
        .preview-item:last-child {
            border-bottom: none;
        }
        .flow-list {
            border: 1px solid rgba(86, 111, 255, 0.25);
            border-radius: 14px;
            background: rgba(10, 14, 24, 0.6);
            max-height: 360px;
            overflow: auto;
        }
        .flow-item {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(120, 132, 183, 0.2);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .flow-item:hover {
            background: rgba(86, 111, 255, 0.08);
        }
        .flow-item.active {
            background: rgba(86, 111, 255, 0.18);
            border-left: 3px solid #6f8bff;
        }
        .flow-item:last-child {
            border-bottom: none;
        }
        .flow-item-title {
            font-size: 0.92rem;
            font-weight: 600;
        }
        .flow-item-meta {
            font-size: 0.75rem;
            color: #8d95b5;
            margin-top: 4px;
        }
        .flow-item-summary {
            font-size: 0.8rem;
            color: #b9c3e6;
            margin-top: 6px;
            line-height: 1.4;
        }
        .storyboard-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 640px;
            overflow: auto;
        }
        .storyboard-node {
            background: rgba(12, 18, 32, 0.9);
            border: 1px solid rgba(86, 111, 255, 0.2);
            border-radius: 14px;
            padding: 12px;
        }
        .storyboard-node-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }
        .node-title {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .node-meta {
            font-size: 0.75rem;
            color: #9aa3c7;
        }
        .storyboard-node textarea {
            min-height: 120px;
        }
        .image-grid {
            display: grid;
            gap: 12px;
        }
        .image-card {
            background: rgba(12, 18, 32, 0.8);
            border-radius: 12px;
            border: 1px solid rgba(86, 111, 255, 0.2);
            padding: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .image-card.is-selected {
            border-color: rgba(111, 139, 255, 0.9);
            box-shadow: 0 0 0 1px rgba(111, 139, 255, 0.5);
        }
        .image-card img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }
        .reference-grid {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        }
        .file-input {
            border: 1px dashed rgba(86, 111, 255, 0.4);
            padding: 10px;
            border-radius: 12px;
        }
        @media (max-width: 1200px) {
            .studio-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                <label style="font-size: 0.85em; color: #cbd4f5;">当前项目</label>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>

    {% raw %}
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function StoryboardStudio() {
            const [episodes, setEpisodes] = useState([]);
            const [showEpisodePicker, setShowEpisodePicker] = useState(false);
            const [selectedEpisodeId, setSelectedEpisodeId] = useState(null);
            const [selectedEpisodeMeta, setSelectedEpisodeMeta] = useState(null);
            const [selectedEpisodeText, setSelectedEpisodeText] = useState('');
            const [prompt, setPrompt] = useState('基于剧本文本生成分镜，输出清晰分镜列表，包含场景、人物动作、镜头、时长建议。');
            const [progressText, setProgressText] = useState('');
            const [storyboardItems, setStoryboardItems] = useState([]);
            const [imageMap, setImageMap] = useState({});
            const [imageCount, setImageCount] = useState(3);
            const [activeGenerateEpisodeId, setActiveGenerateEpisodeId] = useState(null);
            const [materialType, setMaterialType] = useState('scene');
            const [materials, setMaterials] = useState([]);
            const [uploading, setUploading] = useState(false);
            const [showMaterialPicker, setShowMaterialPicker] = useState(false);
            const [selectedReferences, setSelectedReferences] = useState([]);
            const [previewRefUrl, setPreviewRefUrl] = useState(null);
            const draftRestoredRef = useRef(false);

            const getProjectId = () => document.getElementById('projectSelect')?.value || 'default';
            const DRAFT_KEY = () => `storyboard_studio_draft_${getProjectId()}`;

            useEffect(() => {
                loadEpisodes();
            }, []);

            // 恢复草稿：切页返回后恢复未完成状态（仅恢复一次）
            useEffect(() => {
                if (episodes.length === 0 || draftRestoredRef.current) return;
                draftRestoredRef.current = true;
                try {
                    const raw = localStorage.getItem(DRAFT_KEY());
                    if (!raw) return;
                    const draft = JSON.parse(raw);
                    if (draft.selectedEpisodeId != null) setSelectedEpisodeId(draft.selectedEpisodeId);
                    if (Array.isArray(draft.storyboardItems)) setStoryboardItems(draft.storyboardItems);
                    if (draft.imageMap && typeof draft.imageMap === 'object') setImageMap(draft.imageMap);
                    if (typeof draft.prompt === 'string') setPrompt(draft.prompt);
                    if (Array.isArray(draft.selectedReferences)) setSelectedReferences(draft.selectedReferences);
                    const ep = episodes.find(e => e.id === draft.selectedEpisodeId);
                    if (ep) {
                        setSelectedEpisodeMeta(ep);
                        loadEpisodeContent(ep.id).then(text => setSelectedEpisodeText(text || ''));
                    }
                } catch (e) { /* ignore */ }
            }, [episodes]);

            // 持久化草稿：任意相关状态变化时写入 localStorage，便于切页后断点续做
            useEffect(() => {
                const key = DRAFT_KEY();
                const payload = {
                    selectedEpisodeId,
                    storyboardItems,
                    imageMap,
                    prompt,
                    selectedReferences
                };
                try {
                    localStorage.setItem(key, JSON.stringify(payload));
                } catch (e) { /* ignore */ }
            }, [selectedEpisodeId, storyboardItems, imageMap, prompt, selectedReferences]);

            const loadEpisodes = async () => {
                const resp = await fetch('/api/script-episodes');
                const data = await resp.json();
                if (data.success) {
                    setEpisodes(data.episodes || []);
                }
            };

            const loadEpisodeContent = async (episodeId) => {
                const resp = await fetch(`/api/script-episodes/${episodeId}/content`);
                if (!resp.ok) return '';
                return await resp.text();
            };

            const loadSavedStoryboard = async (episodeId) => {
                const resp = await fetch(`/api/storyboard-episodes?script_episode_id=${episodeId}`);
                const data = await resp.json();
                if (!data.success || !data.record) return null;
                return data.record;
            };

            const buildItemsFromNodes = (nodes) => {
                if (!Array.isArray(nodes)) return [];
                return nodes.map((node, idx) => ({
                    id: node.id || `node-${idx + 1}`,
                    index: node.index || idx + 1,
                    text: node.text || '',
                    location_time: node.location_time || '',
                    shot: node.shot || '',
                    duration_seconds: node.duration_seconds || ''
                }));
            };

            const buildItemsFromEpisodes = (json) => {
                const items = [];
                if (json && Array.isArray(json.episodes)) {
                    json.episodes.forEach((ep) => {
                        const scenes = Array.isArray(ep.scenes) ? ep.scenes : [];
                        scenes.forEach((scene, idx) => {
                            const index = items.length + 1;
                            const location = scene.location_time || '';
                            const summary = scene.summary || '';
                            const shot = scene.shot || '';
                            const duration = scene.duration_seconds ? `${scene.duration_seconds}秒` : '';
                            const lines = [];
                            if (summary) lines.push(summary);
                            if (shot) lines.push(`镜头：${shot}`);
                            if (duration) lines.push(`时长：${duration}`);
                            const text = lines.join('\n') || JSON.stringify(scene, null, 2);
                            items.push({
                                id: `${ep.index || 1}-${scene.scene_index || idx + 1}-${index}`,
                                index,
                                text,
                                location_time: location,
                                shot,
                                duration_seconds: scene.duration_seconds || ''
                            });
                        });
                    });
                }
                return items;
            };

            const handleSelectEpisode = async (ep) => {
                setSelectedEpisodeId(ep.id);
                setSelectedEpisodeMeta(ep);
                const text = await loadEpisodeContent(ep.id);
                setSelectedEpisodeText(text);
                const saved = await loadSavedStoryboard(ep.id);
                if (saved && saved.storyboard_json) {
                    const nodes = saved.storyboard_json.nodes;
                    const items = nodes ? buildItemsFromNodes(nodes) : buildItemsFromEpisodes(saved.storyboard_json);
                    setStoryboardItems(items);
                    setImageMap(saved.images_json || {});
                    setProgressText('已加载已保存分镜');
                    return;
                }
                setStoryboardItems([]);
                setImageMap({});
                setProgressText('');
            };

            const buildStoryboardItems = (result) => {
                const json = result && result.storyboard_json ? result.storyboard_json : null;
                const items = buildItemsFromEpisodes(json);
                if (items.length > 0) return items;
                const raw = result && result.storyboard_text ? result.storyboard_text : '';
                if (raw) {
                    return [{ id: 'raw-1', index: 1, text: raw, location_time: '' }];
                }
                return [];
            };

            const generateStoryboard = async (overrideText) => {
                const script = (overrideText || selectedEpisodeText || '').trim();
                if (!script) {
                    alert('请先选择剧本分集');
                    return;
                }
                if (!selectedEpisodeId) {
                    alert('请先选择剧本分集');
                    return;
                }
                const targetEpisodeId = selectedEpisodeId;
                setActiveGenerateEpisodeId(targetEpisodeId);
                setProgressText('生成中 0%');
                setStoryboardItems([]);
                setImageMap({});
                const resp = await fetch('/api/storyboard-generate-async', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ script, prompt })
                });
                const data = await resp.json();
                if (!data.success) {
                    setProgressText('');
                    alert(data.error || '生成失败');
                    return;
                }
                pollTask(data.task_id, targetEpisodeId);
            };

            const pollTask = async (id, targetEpisodeId) => {
                const resp = await fetch(`/api/tasks/${id}`);
                const data = await resp.json();
                if (!data.success || !data.task) {
                    setProgressText('');
                    return;
                }
                const task = data.task;
                setProgressText(`生成中 ${task.progress || 0}%`);
                if (task.status === 'completed') {
                    setProgressText('完成');
                    const result = task.result || {};
                    const items = buildStoryboardItems(result);
                    setStoryboardItems(items);
                    await saveStoryboardEpisode(items, result, null, targetEpisodeId);
                    return;
                }
                if (task.status === 'failed') {
                    setProgressText('失败');
                    if (task.error) alert(task.error);
                    return;
                }
                setTimeout(() => pollTask(id, targetEpisodeId), 2000);
            };

            const updateItemText = (id, value) => {
                setStoryboardItems(prev => prev.map(item => (
                    item.id === id ? { ...item, text: value } : item
                )));
            };

            const saveStoryboardEpisode = async (items, rawResult = null, images = null, episodeIdOverride = null) => {
                const episodeId = episodeIdOverride || selectedEpisodeId;
                if (!episodeId) return;
                const nodes = items.map(item => ({
                    id: item.id,
                    index: item.index,
                    text: item.text,
                    location_time: item.location_time,
                    shot: item.shot,
                    duration_seconds: item.duration_seconds
                }));
                const payload = {
                    script_episode_id: episodeId,
                    prompt,
                    storyboard_json: { nodes },
                    storyboard_text: rawResult && rawResult.storyboard_text ? rawResult.storyboard_text : '',
                    images_json: images || imageMap
                };
                await fetch('/api/storyboard-episodes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            };

            const generateItemImages = async (item) => {
                const maxImages = Math.max(1, Number(imageCount) || 1);
                const storyboard = {
                    episodes: [
                        {
                            index: 1,
                            title: '',
                            scenes: [
                                {
                                    scene_index: item.index,
                                    location_time: item.location_time || '',
                                    summary: item.text || '',
                                    shot: item.shot || '',
                                    duration_seconds: item.duration_seconds || ''
                                }
                            ]
                        }
                    ]
                };
                const resp = await fetch('/api/storyboard-sample-images', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ storyboard, max_images: maxImages })
                });
                const data = await resp.json();
                if (!data.success) {
                    alert(data.error || '生成图片失败');
                    return;
                }
                setImageMap(prev => {
                    const next = {
                        ...prev,
                        [item.id]: [...(prev[item.id] || []), ...(data.images || [])]
                    };
                    saveStoryboardEpisode(storyboardItems, null, next, selectedEpisodeId);
                    return next;
                });
            };

            const generateAllImages = async () => {
                for (const item of storyboardItems) {
                    await generateItemImages(item);
                }
            };

            const handleDrop = async (e) => {
                e.preventDefault();
                const files = Array.from(e.dataTransfer.files || []).filter(f => f.type.startsWith('image/'));
                if (files.length === 0) return;
                await uploadMaterials(files);
            };

            const uploadMaterials = async (files) => {
                setUploading(true);
                const formData = new FormData();
                files.forEach(file => formData.append('file', file));
                formData.append('category', 'ref');  // 分镜参考图仅上传到 OSS，不入人物库/场景库
                const resp = await fetch('/api/upload-sample-image', {
                    method: 'POST',
                    body: formData
                });
                const data = await resp.json();
                setUploading(false);
                if (!data.success) {
                    alert(data.error || '上传失败');
                    return;
                }
                const list = data.uploaded || [];
                if (list.length > 0) {
                    setSelectedReferences(prev => prev.concat(list.map(u => ({
                        id: u.key || u.url,
                        url: u.url,
                        filename: u.filename
                    }))));
                }
                // 参考图不写入库，无需刷新人物/场景库列表
            };

            const loadMaterials = async (type) => {
                const resp = await fetch(`/api/content-library?type=${type}`);
                const data = await resp.json();
                if (data.success) {
                    setMaterials(data.assets || []);
                }
            };

            const openLibraryPicker = (type) => {
                if (showMaterialPicker && materialType === type) {
                    setShowMaterialPicker(false);
                    return;
                }
                setMaterialType(type);
                loadMaterials(type);
                setShowMaterialPicker(true);
            };

            const toggleMaterial = (item) => {
                const key = item.id || item.url;
                setSelectedReferences(prev => {
                    const has = prev.some(r => (r.id || r.url) === key);
                    if (has) return prev.filter(r => (r.id || r.url) !== key);
                    return prev.concat([{ id: item.id, url: item.url, filename: item.filename }]);
                });
            };

            const isMaterialSelected = (item) => {
                const key = item.id || item.url;
                return selectedReferences.some(r => (r.id || r.url) === key);
            };

            const removeReference = (index) => {
                setSelectedReferences(prev => prev.filter((_, i) => i !== index));
            };

            return (
                <>
                <div className="studio-grid">
                    <div className="flow-column">
                        <div className="studio-card">
                            <div className="card-title">Step 1 · 选择剧本</div>
                            <div className="card-hint">点击按钮后选择分集，生成或加载已保存的分镜</div>
                            <div className="btn-row">
                                <button className="btn btn-secondary" onClick={() => setShowEpisodePicker(!showEpisodePicker)}>
                                    选择剧本分集
                                </button>
                            </div>
                            {showEpisodePicker && (
                                <select
                                    style={{ marginTop: '10px' }}
                                    value={selectedEpisodeId || ''}
                                    onChange={(e) => {
                                        const id = Number(e.target.value);
                                        const ep = episodes.find(item => item.id === id);
                                        if (ep) handleSelectEpisode(ep);
                                    }}
                                >
                                    <option value="">请选择分集</option>
                                    {episodes.map(ep => (
                                        <option key={ep.id} value={ep.id}>
                                            第{ep.episode_index || '?'}集 · {ep.title || '未命名'}
                                        </option>
                                    ))}
                                </select>
                            )}
                            {selectedEpisodeMeta && (
                                <div className="flow-item active" style={{ marginTop: '10px' }}>
                                    <div className="flow-item-title">第{selectedEpisodeMeta.episode_index || '?'}集 · {selectedEpisodeMeta.title || '未命名'}</div>
                                    <div className="flow-item-meta">ID {selectedEpisodeMeta.id} · {selectedEpisodeMeta.created_at || ''}</div>
                                    <div className="flow-item-summary">{selectedEpisodeMeta.summary || '暂无概览'}</div>
                                </div>
                            )}
                            <div className="card-title" style={{ marginTop: 16 }}>分镜提示词</div>
                            <textarea
                                value={prompt}
                                onChange={(e) => setPrompt(e.target.value)}
                                placeholder="编辑分镜生成提示词..."
                                style={{ minHeight: '120px' }}
                            />
                            <div className="btn-row">
                                <button className="btn btn-primary" onClick={() => generateStoryboard()}>生成分镜</button>
                                <button className="btn btn-secondary" onClick={() => saveStoryboardEpisode(storyboardItems)}>保存分镜</button>
                                <span className="progress-text">{progressText}</span>
                            </div>
                        </div>

                        <div className="studio-card">
                            <div className="card-title">Step 2 · 分镜列表</div>
                            <div className="card-hint">分镜从 1 开始垂直向下排列，可编辑内容</div>
                            <div className="storyboard-list">
                                {storyboardItems.length === 0 && <div className="card-hint">暂无分镜，请先选择剧本分集</div>}
                                {storyboardItems.map(item => (
                                    <div className="storyboard-node" key={item.id}>
                                        <div className="storyboard-node-header">
                                            <div className="node-title">分镜 {item.index}</div>
                                            <div className="node-meta">{item.location_time || ''}</div>
                                        </div>
                                        <textarea
                                            value={item.text}
                                            onChange={(e) => updateItemText(item.id, e.target.value)}
                                            placeholder="编辑该分镜内容..."
                                        />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="flow-column">
                        <div className="studio-card">
                            <div className="card-title">Step 3 · 参考图</div>
                            <div className="card-hint">点击「人物库」或「场景库」选择参考图，选中后将显示在下方缩略图</div>
                            <div className="btn-row">
                                <button className="btn btn-secondary" onClick={() => openLibraryPicker('person')}>人物库</button>
                                <button className="btn btn-secondary" onClick={() => openLibraryPicker('scene')}>场景库</button>
                            </div>
                            {selectedReferences.length > 0 && (
                                <div style={{ marginTop: '12px' }}>
                                    <div className="card-title" style={{ fontSize: '0.9rem', marginBottom: '8px' }}>已选参考图</div>
                                    <div className="reference-grid">
                                        {selectedReferences.map((ref, idx) => (
                                            <div className="image-card" key={`ref-${ref.url}-${idx}`} style={{ position: 'relative', cursor: 'pointer' }} onClick={() => setPreviewRefUrl(ref.url)}>
                                                <img src={ref.url} alt={ref.filename || '参考图'} />
                                                <div className="card-hint">{ref.filename || ''}</div>
                                                <button
                                                    type="button"
                                                    className="remove-ref-btn"
                                                    onClick={(e) => { e.stopPropagation(); removeReference(idx); }}
                                                    title="移除"
                                                    style={{ position: 'absolute', top: '4px', right: '4px', width: '22px', height: '22px', borderRadius: '50%', border: 'none', background: 'rgba(0,0,0,0.6)', color: '#fff', fontSize: '14px', cursor: 'pointer', lineHeight: 1 }}
                                                >×</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {showMaterialPicker && (
                                <>
                                    <div className="card-title" style={{ marginTop: '16px', fontSize: '0.9rem' }}>{materialType === 'person' ? '人物库' : '场景库'} · 点击选择</div>
                                    <div className="btn-row" style={{ marginTop: '6px' }}>
                                        <button className="btn btn-secondary" onClick={() => setShowMaterialPicker(false)}>完成选择</button>
                                    </div>
                                    <div className="reference-grid" style={{ marginTop: '8px' }}>
                                        {materials.length === 0 && <div className="card-hint">加载中或暂无素材</div>}
                                        {materials.map((m, idx) => {
                                            const key = m.id || m.url || idx;
                                            const active = isMaterialSelected(m);
                                            return (
                                                <div
                                                    className={`image-card ${active ? 'is-selected' : ''}`}
                                                    key={key}
                                                    onClick={() => toggleMaterial(m)}
                                                >
                                                    <img src={m.url} alt={m.filename || 'asset'} />
                                                    <div className="card-hint">{m.filename || ''}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </>
                            )}
                            <div
                                className="preview-list"
                                onDragOver={(e) => e.preventDefault()}
                                onDrop={handleDrop}
                                style={{ marginTop: '12px', textAlign: 'center' }}
                            >
                                {uploading ? '上传中...' : '拖拽图片到此处'}
                                <div className="btn-row" style={{ justifyContent: 'center', marginTop: '10px' }}>
                                    <label className="btn btn-secondary file-input">
                                        选择图片
                                        <input
                                            type="file"
                                            accept="image/*"
                                            multiple
                                            style={{ display: 'none' }}
                                            onChange={(e) => uploadMaterials(Array.from(e.target.files || []))}
                                        />
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div className="studio-card">
                            <div className="card-title">Step 4 · 生成图片</div>
                            <div className="card-hint">为每个分镜生成多张图片</div>
                            <div className="btn-row">
                                <input
                                    type="number"
                                    min="1"
                                    max="8"
                                    value={imageCount}
                                    onChange={(e) => setImageCount(e.target.value)}
                                    style={{ maxWidth: '120px' }}
                                />
                                <button className="btn btn-secondary" onClick={generateAllImages} disabled={storyboardItems.length === 0}>
                                    批量生成
                                </button>
                            </div>
                            <div className="storyboard-list" style={{ marginTop: 12 }}>
                                {storyboardItems.length === 0 && <div className="card-hint">暂无可生成的分镜</div>}
                                {storyboardItems.map(item => (
                                    <div className="storyboard-node" key={`img-${item.id}`}>
                                        <div className="storyboard-node-header">
                                            <div className="node-title">分镜 {item.index}</div>
                                            <button className="btn btn-secondary" onClick={() => generateItemImages(item)}>生成图片</button>
                                        </div>
                                        <div className="image-grid">
                                            {(imageMap[item.id] || []).length === 0 && (
                                                <div className="card-hint">暂无图片</div>
                                            )}
                                            {(imageMap[item.id] || []).map((img, idx) => (
                                                <div className="image-card" key={`${img.url}-${idx}`}>
                                                    <img src={img.url} alt="storyboard output" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
                {previewRefUrl && (
                    <div
                        style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 2000 }}
                        onClick={() => setPreviewRefUrl(null)}
                    >
                        <img src={previewRefUrl} alt="预览" onClick={(e) => e.stopPropagation()} style={{ maxWidth: '92vw', maxHeight: '92vh', objectFit: 'contain' }} />
                    </div>
                )}
            </>
            );
        }

        ReactDOM.createRoot(document.getElementById('storyboardStudioRoot')).render(<StoryboardStudio />);
    </script>
    {% endraw %}
    <script>
        async function loadProjects() {
            const select = document.getElementById('projectSelect');
            if (!select) return;
            try {
                const resp = await fetch('/api/projects');
                const data = await resp.json();
                if (!data.success) throw new Error(data.error || '加载失败');
                select.innerHTML = '';
                data.projects.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    if (String(p.id) === String(data.current_project_id)) {
                        opt.selected = true;
                    }
                    select.appendChild(opt);
                });
            } catch (e) {
                select.innerHTML = '<option>项目加载失败</option>';
            }
        }

        async function switchProject(projectId) {
            const resp = await fetch('/api/projects/switch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ project_id: projectId })
            });
            const data = await resp.json();
            if (data.success) {
                location.reload();
            } else {
                alert(data.error || '切换失败');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('projectSelect');
            if (select) {
                select.addEventListener('change', () => switchProject(select.value));
                loadProjects();
            }
        });
    </script>
    <script src="/static/react-app.js"></script>
    <script src="/static/sidebar-nav.js"></script>
</body>
</html>
