# Nginx 反向代理配置 - short.wyydym.cc
# HTTPS (443) -> 本地 8090 端口

server {
    listen 443 ssl;
    server_name short.wyydym.cc;

    # SSL 证书配置（需要替换为实际证书路径）
    ssl_certificate /etc/nginx/ssl/short.wyydym.cc.pem;
    ssl_certificate_key /etc/nginx/ssl/short.wyydym.cc.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 反向代理到本地 8090 端口
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 缓冲配置（对大文件上传/下载有帮助）
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 文件上传大小限制
    client_max_body_size 500M;

    # 日志配置
    access_log /var/log/nginx/short.wyydym.cc.access.log;
    error_log /var/log/nginx/short.wyydym.cc.error.log;
}

# HTTP (80) 重定向到 HTTPS (443)
server {
    listen 80;
    server_name short.wyydym.cc;

    location / {
        return 301 https://$host$request_uri;
    }

    access_log /var/log/nginx/short.wyydym.cc.access.log;
    error_log /var/log/nginx/short.wyydym.cc.error.log;
}